<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#172016" />
  <title>Dragons vs Monsters</title>
  <style>
    :root { --ui-scale: 1; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      height: 100vh;
      background: #172016;
      color: #f3f4df;
      font-family: Arial, Helvetica, sans-serif;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #f3c94f;
      color: #251d0a;
      font-weight: 800;
      padding: 10px 14px;
      cursor: pointer;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button, .card, .bench-slot, canvas { -webkit-tap-highlight-color: transparent; }
    .card, .bench-slot.filled {
      -webkit-user-select: none;
      user-select: none;
    }
    button.secondary { background: #314634; color: #f3f4df; border: 1px solid #58745b; }
    button.xp-button {
      background: linear-gradient(135deg, #49306b, #2c1d42);
      color: #f3eaff;
      border: 1px solid #a46cff;
      box-shadow: inset 0 -2px 0 rgba(56, 30, 120, .45);
    }
    .app {
      width: min(1500px, 100vw);
      height: 100vh;
      margin: 0 auto;
      padding: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }
    .topbar {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 8px;
      align-items: center;
    }
    .pill {
      min-height: 40px;
      border-radius: 8px;
      background: #233226;
      border: 1px solid #3b523c;
      padding: 6px 9px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .pill strong { display: block; font-size: 16px; }
    .wave-pill .wave-timer {
      margin-left: auto;
      color: #ffe08a;
      min-width: 38px;
      text-align: right;
    }
    .wave-pill .wave-timer:empty {
      display: none;
    }
    .icon { width: 22px; height: 22px; image-rendering: pixelated; object-fit: contain; }
    .main {
      display: grid;
      grid-template-columns: 310px minmax(640px, 1fr) 150px;
      gap: 8px;
      align-items: stretch;
      min-height: 0;
      overflow: hidden;
    }
    .main > section, .main > aside {
      min-height: 0;
      overflow: hidden;
    }
    .panel {
      border-radius: 8px;
      background: #223026;
      border: 1px solid #415942;
      padding: 8px;
      max-height: 100%;
      overflow: hidden;
    }
    .panel h2 {
      font-size: 18px;
      margin: 0 0 8px;
      color: #ffe08a;
    }
    .left-panel {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 8px;
    }
    .trait {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 15px;
      cursor: help;
    }
    .trait:last-child { border-bottom: 0; }
    .trait img { width: 32px; height: 32px; object-fit: contain; image-rendering: pixelated; }
    .trait b { font-size: 13px; color: #b8caa7; }
    .trait.active b { color: #ffe08a; }
    .trait-empty {
      color: #8fa58e;
      font-size: 13px;
      padding: 8px 0;
    }
    .trait-stacks {
      display: inline-flex;
      gap: 3px;
      justify-content: flex-end;
    }
    .trait-stack {
      min-width: 22px;
      padding: 2px 4px;
      border-radius: 5px;
      background: rgba(255,255,255,.07);
      color: #9fb39b;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
    }
    .trait-stack.active {
      background: #f3c94f;
      color: #251d0a;
      box-shadow: 0 0 8px rgba(243,201,79,.55);
    }
    .drop-rate-panel {
      border-top: 1px solid rgba(255,255,255,.12);
      padding-top: 8px;
    }
    .drop-rate-panel h2 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 16px;
    }
    .drop-rate-table {
      display: grid;
      gap: 3px;
      font-size: 10px;
    }
    .drop-rate-row {
      display: grid;
      grid-template-columns: 36px repeat(5, 1fr);
      align-items: center;
      gap: 3px;
      min-height: 20px;
      padding: 2px 0;
      color: #dceacb;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .drop-rate-row:last-child { border-bottom: 0; }
    .drop-rate-row.header {
      color: #ffe08a;
      font-weight: 900;
    }
    .drop-rate-row.active {
      color: #fff7c7;
      background: rgba(243, 201, 79, .09);
      border-radius: 5px;
    }
    .drop-rate-row span {
      text-align: center;
      white-space: nowrap;
    }
    .drop-rate-row span:first-child {
      text-align: left;
      font-weight: 900;
    }
    .gold-cost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      line-height: 1;
      vertical-align: middle;
      white-space: nowrap;
    }
    .gold-cost img {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    button .gold-cost {
      position: relative;
      top: -1px;
      gap: 4px;
      margin-left: 2px;
      font-size: inherit;
    }
    button .gold-cost img {
      width: 18px;
      height: 18px;
      flex-basis: 18px;
    }
    .drop-tier-1 { color: #cfd4d8; }
    .drop-tier-2 { color: #63d87a; }
    .drop-tier-3 { color: #5db4ff; }
    .drop-tier-4 { color: #b783ff; }
    .drop-tier-5 { color: #f3c94f; }
    .board-wrap {
      position: relative;
      border-radius: 8px;
      background: #101912;
      border: 1px solid #405940;
      padding: 8px;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto auto auto auto;
      gap: 5px;
    }
    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      min-height: 0;
      max-width: 100%;
      justify-self: center;
      align-self: center;
      display: block;
      border-radius: 6px;
      background: #1c2a1e;
      cursor: default;
      touch-action: manipulation;
    }
    .shop-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 0;
      align-items: stretch;
    }
    .bench-title, .shop-title {
      margin: 0;
      color: #ffe08a;
      font-size: 12px;
      font-weight: 900;
      line-height: 12px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .card {
      position: relative;
      height: 146px;
      min-height: 146px;
      border-radius: 8px;
      background: #233226;
      border: 3px solid #456047;
      padding: 7px;
      cursor: grab;
      display: grid;
      grid-template-columns: 94px 1fr;
      grid-template-rows: 20px 78px 24px;
      gap: 3px;
      overflow: hidden;
      touch-action: pan-x;
    }
    .card.selected { outline: 3px solid #f3c94f; }
    .card:active { cursor: grabbing; }
    .card.dragging .dragon-img { opacity: 0; }
    .card.merge-ready {
      animation: shopMergePulse .58s ease-in-out infinite alternate;
      box-shadow: 0 0 0 2px rgba(243,201,79,.9), 0 0 18px rgba(243,201,79,.75);
    }
    @keyframes shopMergePulse {
      from {
        border-color: #f3c94f;
        box-shadow: 0 0 0 2px rgba(243,201,79,.65), 0 0 10px rgba(243,201,79,.45);
      }
      to {
        border-color: #ffe050;
        box-shadow: 0 0 0 3px rgba(255,224,80,1), 0 0 22px rgba(255,224,80,.95);
      }
    }
    .card.empty {
      cursor: default;
      background: #18221b;
      border: 2px dashed #3c513e;
      opacity: .65;
    }
    .card.unaffordable {
      background: linear-gradient(135deg, #303533, #171b19);
      border-color: #6d7470;
      filter: grayscale(.85);
      opacity: .72;
    }
    .tier-1 { background: linear-gradient(135deg, #31363a, #1f2427); border-color: #858b91; }
    .tier-2 { background: linear-gradient(135deg, #1f4a2e, #162d20); border-color: #4ec06a; }
    .tier-3 { background: linear-gradient(135deg, #1d4165, #14283d); border-color: #4aa3ff; }
    .tier-4 { background: linear-gradient(135deg, #49306b, #2c1d42); border-color: #a46cff; }
    .tier-5 { background: linear-gradient(135deg, #776018, #3f310d); border-color: #f3c94f; }
    .card-title {
      font-size: 12px;
      line-height: 1.15;
      min-height: 24px;
      font-weight: 800;
      grid-column: 1 / 3;
      position: relative;
      z-index: 1;
      padding-right: 24px;
    }
    .shop-lock-badge {
      position: absolute;
      top: 6px;
      right: 7px;
      z-index: 3;
      width: 20px;
      height: 20px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 5px rgba(255, 224, 128, .9)) drop-shadow(0 0 10px rgba(243, 201, 79, .55));
      opacity: .95;
      pointer-events: none;
    }
    .dragon-img {
      position: absolute;
      left: 100px;
      top: 36px;
      width: 82px;
      height: 82px;
      object-fit: contain;
      image-rendering: pixelated;
      transform: scaleX(-1);
      margin-left: 0;
    }
    .cost, .elements {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .elements {
      align-self: start;
      grid-column: 1;
      grid-row: 2;
      width: 88px;
      height: 78px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      align-content: start;
      gap: 1px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .cost {
      grid-column: 1;
      grid-row: 3;
      align-self: center;
      margin-left: 3px;
      width: 58px;
      height: 24px;
      padding: 3px 6px;
      border-radius: 7px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 900;
      font-size: 13px;
      line-height: 1;
      flex-wrap: nowrap;
      white-space: nowrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .cost .icon { width: 18px; height: 18px; flex: 0 0 auto; }
    .merge-star-hint {
      grid-column: 1;
      grid-row: 3;
      align-self: center;
      justify-self: start;
      margin-left: 68px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 5px rgba(220,230,255,.8));
    }
    .merge-star-hint span {
      display: block;
      width: 14px;
      height: 14px;
      clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
    }
    .merge-star-hint.silver span {
      background: linear-gradient(135deg, #ffffff, #9aa7bb);
      box-shadow: 0 0 8px rgba(220,230,255,.75);
    }
    .merge-star-hint.gold span {
      background: linear-gradient(135deg, #fff8a8, #ffd33f 55%, #f59e0b);
      box-shadow: 0 0 10px rgba(255,224,80,.95), 0 0 16px rgba(245,158,11,.7);
    }
    .element-tag {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      max-width: 88px;
      height: 25px;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
      white-space: nowrap;
    }
    .element-dot {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .control-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }
    .side-actions {
      display: grid;
      gap: 8px;
      grid-template-rows: minmax(86px, 1fr) 52px 52px 52px 52px 52px;
      min-height: 0;
    }
    .side-actions button {
      padding: 10px 8px;
      font-size: 14px;
      min-height: 52px;
    }
    .tool-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    #lockShopBtn {
      display: grid;
      grid-template-columns: 24px 56px;
      justify-content: center;
      align-items: center;
      column-gap: 7px;
    }
    #lockShopBtn span {
      text-align: left;
    }
    .tool-button img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
    .tool-button { cursor: grab; }
    .tool-button:active { cursor: grabbing; }
    .bench {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 5px;
    }
    .bench-heal-hint {
      position: absolute;
      top: 12px;
      left: 50%;
      z-index: 8;
      display: block;
      width: min(420px, calc(100% - 24px));
      margin: 0;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid rgba(142, 228, 131, .6);
      background: rgba(39, 99, 52, .46);
      color: #d9ffd5;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0,0,0,.55);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, -6px);
      transition: opacity .16s ease, transform .16s ease;
    }
    .bench-heal-hint.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);
    }
    .bench-slot {
      min-width: 0;
      height: 78px;
      min-height: 78px;
      border-radius: 6px;
      background: #18241c;
      border: 1px dashed #486149;
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      padding: 3px;
      font-size: 11px;
      color: #8fa58e;
      cursor: default;
      overflow: hidden;
    }
    .bench-slot.filled { cursor: grab; border-style: solid; border-width: 3px; background: #203026; }
    .bench-slot.filled { touch-action: none; }
    .bench-slot.filled.tier-1 { border-color: #858b91; }
    .bench-slot.filled.tier-2 { border-color: #4ec06a; }
    .bench-slot.filled.tier-3 { border-color: #4aa3ff; }
    .bench-slot.filled.tier-4 { border-color: #a46cff; }
    .bench-slot.filled.tier-5 { border-color: #f3c94f; }
    .bench-slot.dragging img {
      opacity: 0;
    }
    .bench-slot.drag-over { outline: 3px solid #f3c94f; }
    .bench-slot.selected {
      outline: 3px solid #ffe050;
      box-shadow: 0 0 16px rgba(255, 224, 80, .78);
    }
    .bench-slot.merge-ready {
      animation: shopMergePulse .58s ease-in-out infinite alternate;
      box-shadow: 0 0 0 2px rgba(243,201,79,.85), 0 0 16px rgba(243,201,79,.7);
    }
    .bench-slot img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      image-rendering: pixelated;
      transform: scaleX(-1);
    }
    .bench-name {
      width: 100%;
      max-width: 100%;
      border-radius: 6px;
      background: rgba(0,0,0,.58);
      color: #ffe08a;
      font-size: 11px;
      font-weight: 800;
      line-height: 15px;
      padding: 0 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
      white-space: nowrap;
    }
    .bench-name span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-icon {
      flex: 0 0 auto;
      display: inline-block;
      position: relative;
      width: 14px;
      height: 14px;
      text-align: center;
      line-height: 15px;
      font-size: 9px;
      font-weight: 1000;
      font-family: "Arial Black", Impact, sans-serif;
    }
    .rank-icon::after {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(.5px);
      text-shadow: 0 1px 1px rgba(255,255,255,.35), 0 -1px 1px rgba(0,0,0,.5);
    }
    .rank-1 {
      width: 15px;
      height: 15px;
      background: linear-gradient(135deg, #d7954a, #8d4f22);
      clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.7)) drop-shadow(0 0 4px rgba(181,119,53,.45));
      color: #2b1608;
    }
    .rank-1::after { content: "1"; }
    .rank-2 {
      width: 15px;
      height: 15px;
      background: linear-gradient(135deg, #f5f7ff, #9aa7bb);
      clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
      filter: drop-shadow(0 0 6px rgba(220,230,255,.7));
      color: #26313f;
    }
    .rank-2::after { content: "2"; }
    .rank-3 {
      width: 15px;
      height: 15px;
      background: #ffe65a;
      clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
      filter: drop-shadow(0 0 6px #fff1a8) drop-shadow(0 0 10px #ffd33f);
      color: #5a4200;
    }
    .rank-3::after { content: "3"; }
    .sell-zone {
      min-height: 68px;
      margin-top: 0;
      border-radius: 8px;
      border: 2px dashed #d95b5b;
      background: rgba(112, 22, 22, .28);
      color: #ffd6d6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      font-size: 11px;
    }
    .sell-zone img { width: 20px; height: 20px; object-fit: contain; image-rendering: pixelated; }
    .sell-zone.drag-over {
      border-color: #65e66f;
      background: rgba(80, 180, 92, .18);
      box-shadow: inset 0 0 14px rgba(101,230,111,.32);
    }
    .sell-zone.tap-ready {
      border-color: #f3c94f;
      box-shadow: inset 0 0 12px rgba(243, 201, 79, .25);
    }
    .log {
      display: none;
    }
    .stat-popover {
      position: fixed;
      z-index: 10;
      min-width: 230px;
      max-width: 380px;
      border-radius: 8px;
      background: #172016;
      border: 1px solid #f3c94f;
      box-shadow: 0 12px 28px rgba(0,0,0,.38);
      padding: 10px;
      display: none;
      pointer-events: auto;
      overflow: hidden;
    }
    .play-again {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: none;
      min-width: 148px;
      min-height: 54px;
      border: 2px solid #ffe08a;
      box-shadow: 0 8px 22px rgba(0,0,0,.38);
      font-size: 18px;
    }
    .mobile-toolbar { display: none; }
    .mobile-toast {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 100;
      width: min(420px, calc(100vw - 24px));
      padding: 11px 14px;
      border-radius: 8px;
      background: rgba(18, 28, 20, .96);
      border: 1px solid #ffe08a;
      color: #fff7d1;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .45);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .mobile-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }
    .stat-popover h3 {
      margin: 0 0 8px;
      color: #ffe08a;
      font-size: 15px;
    }
    .stat-title-meta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .stat-title-meta .gold-cost {
      font-size: 14px;
      font-weight: 900;
    }
    .stat-title-meta .gold-cost img {
      width: 17px;
      height: 17px;
      flex-basis: 17px;
    }
    .stat-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 13px;
    }
    .trait-tier-line {
      border-radius: 6px;
      padding: 4px 6px;
      background: rgba(255,255,255,.04);
    }
    .trait-tier-line.active {
      background: #f3c94f;
      color: #251d0a;
      font-weight: 900;
      box-shadow: 0 0 10px rgba(243,201,79,.55);
    }
    .stat-line img { width: 20px; height: 20px; image-rendering: pixelated; object-fit: contain; }
    .sell-value-line {
      justify-content: flex-end;
      margin-top: 7px;
      border-color: rgba(243,201,79,.34);
      background: rgba(243,201,79,.09);
      color: #ffe08a;
      text-align: right;
    }
    .sell-value-line img {
      width: 16px;
      height: 16px;
    }
    .stat-elements {
      display: inline-flex;
      align-items: center;
      gap: 7px;

    const CELL_W = FIELD_W / COLS;

    const cellLeft = col => FIELD_X + col * CELL_W;

      if (!clamp && (rawRow < 0 || rawRow >= ROWS || rawCol < 0 || rawCol >= COLS)) return null;

      const wrap = document.querySelector(".board-wrap");
      if (!wrap) return;
      const style = getComputedStyle(wrap);
      const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
      const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
      const availableW = Math.max(320, wrap.clientWidth - padX);
      const stackedLayout = window.matchMedia("(max-width: 800px), (max-width: 1180px) and (pointer: coarse)").matches;
      const layoutKey = `${window.innerWidth}x${window.innerHeight}:${Math.round(wrap.clientWidth)}:${stackedLayout}`;
      if (canvasLayoutCache?.key === layoutKey) {
        canvas.style.width = `${canvasLayoutCache.width}px`;
        canvas.style.height = `${canvasLayoutCache.height}px`;
        return;
      }
      let drawW = availableW;
      if (!stackedLayout) {
        const siblings = Array.from(wrap.children).filter(child => {
          if (child === canvas) return false;
          const childStyle = getComputedStyle(child);
          return childStyle.display !== "none" && childStyle.position !== "absolute" && childStyle.position !== "fixed";

        const rowGap = parseFloat(style.rowGap) || 0;
        const fixedHeight = siblings.reduce((sum, child) => sum + child.offsetHeight, 0)

        const availableH = Math.max(180, wrap.clientHeight - padY - fixedHeight);
        drawW = Math.min(availableW, availableH * 16 / 9);

      const drawH = Math.floor(drawW * 9 / 16);
      canvasLayoutCache = { key: layoutKey, width: Math.floor(drawW), height: drawH };

          if (requestFullscreen) {

            fullscreenStarted = true;

      if (!isTouchUi() || state.gameOver || ev.pointerType === "mouse" || !source?.unit) return;

        log(`Need ${source.unit.cost} Gold to buy ${displayDragonName(source.unit)}.`);
        renderUi();

      touchPointerDrag = {
        pointerId: ev.pointerId,
        startX: ev.clientX,
        startY: ev.clientY,
        source,
        element: ev.currentTarget,
        active: false,
      };
      ev.currentTarget.setPointerCapture?.(ev.pointerId);

    function moveTouchPointerDrag(ev) {
      const drag = touchPointerDrag;
      if (!drag || drag.pointerId !== ev.pointerId) return;
      if (!drag.active && Math.hypot(ev.clientX - drag.startX, ev.clientY - drag.startY) < 10) return;
      if (!drag.active) {
        drag.active = true;
        state.selected = null;
        state.dragging = drag.source;
        drag.element.classList.add("dragging");
        makeBoardDragGhost(drag.source.unit, ev.clientX, ev.clientY);
        document.getElementById("selectedText").textContent = displayDragonName(drag.source.unit);
      }
      ev.preventDefault();
      moveBoardDragGhost(ev.clientX, ev.clientY);
      updateTouchDropTargets(ev.clientX, ev.clientY);
    }

      const drag = touchPointerDrag;
      if (!drag || drag.pointerId !== ev.pointerId) return;
      touchPointerDrag = null;
      if (!drag.active) return;
      ev.preventDefault();
      suppressTouchClickUntil = performance.now() + 450;
      const source = drag.source;

    function img(path) {
      if (!images.has(path)) {

    function canDrawImage(image) {
      if (!image) return false;
      if (image instanceof HTMLCanvasElement) return image.width > 0 && image.height > 0;
      return !image.__loadFailed && image.complete && image.naturalWidth > 0 && image.naturalHeight > 0;
    }

    function isNeutralBackgroundPixel(r, g, b, a) {
      if (a < 18) return true;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const sat = max - min;
      const bright = (r + g + b) / 3;
      return (bright > 222 && sat < 44) || (bright < 30 && sat < 42) || (sat < 24 && bright > 92);
    }

    function getCutoutImage(path) {
      if (cutoutImages.has(path)) return cutoutImages.get(path);
      const source = img(path);
      if (!canDrawImage(source)) return null;
      const w = source.naturalWidth || source.width;
      const h = source.naturalHeight || source.height;
      const off = document.createElement("canvas");
      off.width = w;
      off.height = h;
      const offCtx = off.getContext("2d", { willReadFrequently: true });
      let imageData;
      try {
        offCtx.drawImage(source, 0, 0, w, h);
        imageData = offCtx.getImageData(0, 0, w, h);
      } catch {
        // file:// pages cannot read image pixels; the transparent source remains safe to draw.
        cutoutImages.set(path, source);
        return source;
      }
      const data = imageData.data;
      const visited = new Uint8Array(w * h);
      const queue = [];
      const tryAdd = (x, y) => {
        if (x < 0 || y < 0 || x >= w || y >= h) return;
        const idx = y * w + x;
        if (visited[idx]) return;
        const p = idx * 4;
        if (!isNeutralBackgroundPixel(data[p], data[p + 1], data[p + 2], data[p + 3])) return;
        visited[idx] = 1;
        queue.push(idx);
      };
      for (let x = 0; x < w; x++) {
        tryAdd(x, 0);
        tryAdd(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryAdd(0, y);
        tryAdd(w - 1, y);
      }
      for (let i = 0; i < queue.length; i++) {
        const idx = queue[i];
        const x = idx % w;
        const y = Math.floor(idx / w);
        tryAdd(x + 1, y);
        tryAdd(x - 1, y);
        tryAdd(x, y + 1);
        tryAdd(x, y - 1);
      }
      for (let i = 0; i < visited.length; i++) {
        if (visited[i]) data[i * 4 + 3] = 0;
      }
      offCtx.putImageData(imageData, 0, 0);
      cutoutImages.set(path, off);
      return off;
    }

        if (roll <= 0) return i + 1;

      return rates.length;

      if (state.keeperLevel >= MAX_KEEPER_LEVEL) {

      state.keeperXp += amount;
      while (state.keeperLevel < MAX_KEEPER_LEVEL && state.keeperXp >= xpNeededForCurrentLevel()) {
        state.keeperXp -= xpNeededForCurrentLevel();
        state.keeperLevel += 1;
        levelsGained += 1;
        log(`Keeper reached Level ${state.keeperLevel}. Shop odds improved.`);

      if (state.keeperLevel >= MAX_KEEPER_LEVEL) state.keeperXp = 0;
      return levelsGained;

      return planningTimerActive() ? `${Math.ceil(state.planningTimer)}s` : "";
    }

    function rollShopDragon() {
      const available = shopPool();
      const targetCost = rollCostForLevel();
      const costPool = available.filter(unit => unit.cost === targetCost);
      return rand(costPool.length ? costPool : available);
    }

    function shopHasCards() {
      return state.shop.some(Boolean);
    }

    function occupiedDragonRows() {
      return [...new Set(state.dragons.map(d => d.row))].sort((a, b) => a - b);
    }

    function spendGold(amount, failMessage = "Not enough Gold.") {
      if (UNLIMITED_GOLD) return true;
      if (state.gold < amount) {
        log(failMessage);
        return false;
      }
      state.gold -= amount;
      return true;
    }

    function spendForShopUnit(source, unit) {
      if (source?.source !== "shop") return true;
      if (!spendGold(unit.cost, `Need ${unit.cost} Gold to buy ${displayDragonName(unit)}.`)) return false;
      state.shop[source.index] = null;
      return true;
    }

    function waveEnemyCount(wave = state.wave) {
      if (giantBossTypes[wave]) return bossPrepEnemyCount(wave) + 1;
      if (wave === 1) {
        const laneCount = Math.max(1, occupiedDragonRows().length);
        return laneCount * 3;
      }
      return Math.min(50, 11 + Math.floor(wave * 2.15));
    }

    function bossPrepEnemyCount(wave = state.wave) {
      if (wave === 10) return 14;
      if (wave === 20) return 22;
      return 0;
    }

    function waveClearReward(wave = state.wave) {
      if (wave >= 20) return 40;
      if (wave === 10) return 30;
      return 8 + Math.floor(wave * 2);
    }

    function availableEnemyTypes(wave = state.wave) {
      const pool = enemyTypes.filter(type => type.unlock <= wave && (wave >= 5 || !type.special));
      return pool.length ? pool : enemyTypes.slice(0, 2);
    }

    function availableSpecialEnemyTypes(wave = state.wave) {
      return enemyTypes.filter(type => type.special && type.unlock <= wave);
    }

    function chooseEnemyTypeForSpawn() {
      const specialPool = availableSpecialEnemyTypes();
      if (state.wave >= 5 && specialPool.length) {
        const specialCadence = Math.max(3, 6 - Math.floor((state.wave - 5) / 2));
        if (state.enemiesSpawned % specialCadence === 1) return rand(specialPool);
      }
      return rand(availableEnemyTypes());
    }

    function completeRun(result) {
      state.waveRunning = false;
      state.planningTimer = 0;
      state.gameOver = true;
      state.gameResult = result;
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(result === "won" ? "You Won" : "You Lost");
      renderUi();
    }

    function finishWave() {
      const reward = waveClearReward();
      state.gold += reward;
      const levelsGained = addKeeperXp(FREE_WAVE_XP);
      const benchHealed = healBenchDragons();
      if (state.wave >= 20) {
        completeRun("won");
        return;
      }
      state.wave += 1;
      state.waveRunning = false;
      state.planningTimer = PLANNING_TIME > 0 && state.wave > 1 ? PLANNING_TIME : 0;
      state.enemiesSpawned = 0;
      state.enemiesToSpawn = 0;
      state.waveReward = 0;
      if (!state.shopLocked) {
        rollShop(true);
        log(`Wave cleared: +${reward} Gold, +${FREE_WAVE_XP} XP${levelsGained ? `, Keeper Lv.${state.keeperLevel}` : ""}${benchHealed ? `, ${benchHealed} bench dragon${benchHealed > 1 ? "s" : ""} healed` : ""}. Shop refreshed for free.`);
      } else {
        renderUi();
        log(`Wave cleared: +${reward} Gold, +${FREE_WAVE_XP} XP${levelsGained ? `, Keeper Lv.${state.keeperLevel}` : ""}${benchHealed ? `, ${benchHealed} bench dragon${benchHealed > 1 ? "s" : ""} healed` : ""}. Shop stayed locked.`);
      }
    }

    function startWave(auto = false) {
      if (state.gameOver) return;
      if (state.waveRunning) {
        log("This wave is already running.");
        return;
      }
      if (state.wave === 1 && !occupiedDragonRows().length) {
        log("Place at least one dragon before starting Wave 1.");
        return;
      }
      state.waveRunning = true;
      state.planningTimer = 0;
      state.spawnTimer = 0;
      state.enemiesSpawned = 0;
      state.enemiesToSpawn = waveEnemyCount();
      state.waveReward = waveClearReward();
      log(giantBossTypes[state.wave]
        ? `${auto ? "Planning time ended. " : ""}Boss wave ${state.wave} started: clear ${bossPrepEnemyCount()} monsters before the boss appears.`
        : `${auto ? "Planning time ended. " : ""}Wave ${state.wave} started: ${state.enemiesToSpawn} monsters incoming.`);
      renderUi();
    }

    function resetGame() {
      state.shop = [];
      state.shopLocked = false;
      state.selected = null;
      state.dragging = null;
      state.suppressCanvasClick = false;
      state.hoverCell = null;
      state.pendingMerge = null;
      state.bench = Array(10).fill(null);
      state.dragons = [];
      state.enemies = [];
      state.projectiles = [];
      state.enemyProjectiles = [];
      state.effects = [];
      state.portalLanePulses = Array(ROWS).fill(0);
      state.bossPortalPulse = 0;
      state.hp = MAX_CASTLE_HP;
      state.gold = UNLIMITED_GOLD ? Infinity : STARTING_GOLD;
      state.keeperLevel = CHEAT_MODE ? MAX_KEEPER_LEVEL : 1;
      state.keeperXp = 0;
      state.wave = START_WAVE;
      state.nextId = 1;
      state.spawnTimer = 0;
      state.enemiesSpawned = 0;
      state.enemiesToSpawn = 0;
      state.waveReward = 0;
      state.planningTimer = 0;
      state.gameSpeed = 1;
      state.waveRunning = false;
      state.gameOver = false;
      state.gameResult = null;
      clearDragGhost();
      rollShop(true);
      renderUi();
    }

    function removeMaxedDragonsFromShop() {
      const maxed = maxedDragonNames();
      if (!maxed.size) return;
      state.shop = state.shop.map(unit => unit && maxed.has(unit.name) ? null : unit);
    }

    function makeOwnedUnit(template) {
      const ownedUnit = {
        ...template,
        star: template.star || 1,
        ownedId: state.nextId++,
      };
      img(attackSheetForUnit(ownedUnit));
      return ownedUnit;
    }

    function rollShop(free = false) {
      if (!free && !spendGold(REROLL_COST, `Need ${REROLL_COST} Gold to reroll.`)) {
        renderUi();
        return;
      }
      state.shop = Array.from({ length: 5 }, () => rollShopDragon());
      state.selected = null;
      renderUi();
      log(free ? "Starting shop is ready." : `Shop rerolled for ${REROLL_COST} Gold.`);
    }

    function statsFor(unit) {
      const base = baseStats[unit.cost];
      const starHp = unit.star === 3 ? 3.2 : unit.star === 2 ? 1.8 : 1;
      const starDamage = unit.star === 3 ? 3.0 : unit.star === 2 ? 1.7 : 1;
      const starAttackSpeed = unit.star === 3 ? 1.5 : unit.star === 2 ? 1.25 : 1;
      return {
        damage: Math.round(base.damage * starDamage),
        attackSpeed: +(base.attackSpeed * starAttackSpeed).toFixed(2),
        hp: Math.round(base.hp * starHp),
      };
    }

    function syncDragonHp(unit, keepRatio = true) {
      const nextMax = statsFor(unit).hp;
      const ratio = keepRatio && unit.maxHp ? Math.max(0, unit.hp || unit.maxHp) / unit.maxHp : 1;
      unit.maxHp = nextMax;
      unit.hp = Math.max(1, Math.round(nextMax * Math.min(1, ratio)));
    }

    function healBenchDragons() {
      let healed = 0;
      for (const unit of state.bench) {
        if (!unit) continue;
        if (!unit.maxHp || !unit.hp) continue;
        syncDragonHp(unit, true);
        if (unit.hp >= unit.maxHp) continue;
        unit.hp = Math.min(unit.maxHp, Math.ceil(unit.hp + unit.maxHp * 0.5));
        healed += 1;
      }
      return healed;
    }

    function hasInjuredBoardDragon() {
      return state.dragons.some(unit => {
        if (!unit.maxHp) syncDragonHp(unit, true);
        return unit.hp < unit.maxHp;
      });
    }

    function ownedSlots() {
      return [
        ...state.dragons.map((unit, index) => ({ place: "board", index, unit })),
        ...state.bench.map((unit, index) => unit ? { place: "bench", index, unit } : null).filter(Boolean),
      ];
    }

    function removeOwnedSlot(slot) {
      if (slot.place === "bench") {
        state.bench[slot.index] = null;
        return;
      }
      state.dragons = state.dragons.filter(d => d.id !== slot.unit.id);
    }

    function promoteSlot(slot) {
      const unit = slot.unit;
      unit.star = Math.min(3, (unit.star || 1) + 1);
      if (slot.place === "board") syncDragonHp(unit, false);
      return unit;
    }

    function boardMergeCandidates(unit) {
      if (!unit || (unit.star || 1) >= 3) return [];
      return state.dragons.filter(d => d.name === unit.name && (d.star || 1) === (unit.star || 1));
    }

    function matchingOwnedMergeSlots(unit) {
      if (!unit || (unit.star || 1) >= 3) return [];
      return ownedSlots().filter(slot => slot.unit.name === unit.name && (slot.unit.star || 1) === (unit.star || 1));
    }

    function isShopMergeReady(unit) {
      return !!shopMergeInfo(unit);
    }

    function shopMergeInfo(unit) {
      const chainPlan = shopChainThreeStarPlan(unit);
      if (chainPlan) return { targetStar: 2, finalStar: 3, chain: true };
      if (!unit || (unit.star || 1) >= 3 || matchingOwnedMergeSlots(unit).length < 2) return null;
      const targetStar = Math.min(3, (unit.star || 1) + 1);
      const targetSlots = ownedSlots().filter(slot => slot.unit.name === unit.name && (slot.unit.star || 1) === targetStar);
      const finalStar = targetStar < 3 && targetSlots.length >= 2 ? targetStar + 1 : targetStar;
      return { targetStar, finalStar };
    }

    function shopChainThreeStarPlan(unit, clickedShopIndex = null) {
      if (!unit || (unit.star || 1) !== 1) return null;
      const star2Slots = ownedSlots().filter(slot => slot.unit.name === unit.name && (slot.unit.star || 1) === 2);
      if (star2Slots.length < 2) return null;
      const ownedStar1 = ownedSlots().filter(slot => slot.unit.name === unit.name && (slot.unit.star || 1) === 1);
      const shopIndexes = state.shop
        .map((shopUnit, index) => shopUnit && shopUnit.name === unit.name && (shopUnit.star || 1) === 1 ? index : -1)
        .filter(index => index >= 0);
      if (clickedShopIndex !== null && !shopIndexes.includes(clickedShopIndex)) return null;
      if (ownedStar1.length + shopIndexes.length < 3) return null;

      const requiredShop = [];
      if (clickedShopIndex !== null) requiredShop.push(clickedShopIndex);
      const ownedToUse = ownedStar1.slice(0, Math.min(ownedStar1.length, 3 - requiredShop.length));
      for (const index of shopIndexes) {
        if (requiredShop.length + ownedToUse.length >= 3) break;
        if (!requiredShop.includes(index)) requiredShop.push(index);
      }
      if (requiredShop.length + ownedToUse.length < 3) return null;

      const boardStar2 = star2Slots.filter(slot => slot.place === "board");
      const keep = boardStar2[0] || star2Slots[0];
      const consumedStar2 = star2Slots.find(slot => slot !== keep);
      if (!keep || !consumedStar2) return null;
      return { keep, consumedStar2, ownedStar1: ownedToUse, shopIndexes: requiredShop, finalStar: 3 };
    }

    function executeShopChainThreeStar(shopIndex) {
      const unit = state.shop[shopIndex];
      const plan = shopChainThreeStarPlan(unit, shopIndex);
      if (!plan) return false;
      const totalCost = unit.cost * plan.shopIndexes.length;
      if (!spendGold(totalCost, `Need ${totalCost} Gold to buy copies for ${displayDragonName(unit)}.`)) {
        renderUi();
        return true;
      }
      for (const index of plan.shopIndexes) state.shop[index] = null;
      for (const slot of plan.ownedStar1) removeOwnedSlot(slot);
      removeOwnedSlot(plan.consumedStar2);
      plan.keep.unit.star = 3;
      syncDragonHp(plan.keep.unit, false);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${displayDragonName(plan.keep.unit)} merged directly to 3-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function isOwnedMergeReadyBlink(unit) {
      if (!unit) return false;
      return state.shop.some(shopUnit => {
        const info = shopMergeInfo(shopUnit);
        if (!info || shopUnit.name !== unit.name) return false;
        const unitStar = unit.star || 1;
        const incomingStar = shopUnit.star || 1;
        return unitStar === incomingStar || (info.finalStar === 3 && unitStar === info.targetStar);
      });
    }

    function isPendingCandidate(unit) {
      return !!state.pendingMerge?.candidateIds.includes(unit.id);
    }

    function isBlinkCandidate(unit) {
      if (isPendingCandidate(unit)) return true;
      if (isOwnedMergeReadyBlink(unit)) return true;
      const draggingUnit = state.dragging?.unit;
      if (!draggingUnit) return false;
      const candidates = boardMergeCandidates(draggingUnit);
      return candidates.length >= 2 && candidates.some(d => d.id === unit.id);
    }

    function completeBoardMerge(keepDragon) {
      const pending = state.pendingMerge;
      if (!pending || !keepDragon || !pending.candidateIds.includes(keepDragon.id)) return false;
      const consumedBoard = pending.candidateIds.find(id => id !== keepDragon.id);
      state.dragons = state.dragons.filter(d => d.id !== consumedBoard);
      keepDragon.star = Math.min(3, (keepDragon.star || 1) + 1);
      syncDragonHp(keepDragon, false);
      state.pendingMerge = null;
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${displayDragonName(keepDragon)} merged to ${keepDragon.star}-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function startBoardMergeChoice(unit, source) {
      const ownedUnit = source?.source === "shop" ? makeOwnedUnit(unit) : unit;
      const candidates = boardMergeCandidates(ownedUnit);
      if (candidates.length < 2) return false;
      if (!spendForShopUnit(source, unit)) return true;
      if (source?.source === "bench") state.bench[source.index] = null;
      state.pendingMerge = {
        unit: ownedUnit,
        candidateIds: candidates.slice(0, 2).map(d => d.id),
      };
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`Choose a blinking ${displayDragonName(ownedUnit)} on the board to merge to the next star.`);
      renderUi();
      return true;
    }

    function maybeMergeByDroppingOnBoard(unit, source, row, col) {
      const candidates = boardMergeCandidates(unit);
      if (candidates.length < 2) return false;
      const target = dragonAtCell(row, col);
      if (!target || !candidates.some(d => d.id === target.id)) {
        log(`Drop ${displayDragonName(unit)} onto one of the blinking board copies to choose the upgraded dragon.`);
        return true;
      }
      if (!spendForShopUnit(source, unit)) return true;
      if (source?.source === "bench") state.bench[source.index] = null;
      const consumedBoard = candidates.find(d => d.id !== target.id);
      state.dragons = state.dragons.filter(d => d.id !== consumedBoard.id);
      target.star = Math.min(3, (target.star || 1) + 1);
      syncDragonHp(target, false);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${displayDragonName(target)} merged to ${target.star}-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function tryAutoMergeIncoming(unit, source, targetDragon = null) {
      const slots = matchingOwnedMergeSlots(unit);
      const sourceAlreadyOwned = source?.source === "bench" || source?.source === "board";
      if (slots.length < (sourceAlreadyOwned ? 3 : 2)) return false;

      const boardSlots = slots.filter(slot => slot.place === "board");
      if (!targetDragon && boardSlots.length >= 2) return false;

      let keep = null;
      if (targetDragon) {
        keep = slots.find(slot => slot.place === "board" && slot.unit.id === targetDragon.id);
      }
      keep = keep ||
        (boardSlots.length === 1 ? boardSlots[0] : null) ||
        slots.filter(slot => slot.place === "bench").sort((a, b) => a.index - b.index)[0] ||
        boardSlots[0];

      if (!keep) return false;
      if (!spendForShopUnit(source, unit)) {
        renderUi();
        return true;
      }

      const consumed = slots.filter(slot => slot !== keep).slice(0, 2);
      for (const slot of consumed) removeOwnedSlot(slot);
      const promoted = promoteSlot(keep);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${displayDragonName(promoted)} merged to ${promoted.star}-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function autoMerge() {
      const messages = [];
      let merged = true;
      while (merged) {
        merged = false;
        const groups = new Map();
        for (const slot of ownedSlots()) {
          const star = slot.unit.star || 1;
          if (star >= 3) continue;
          const key = `${slot.unit.name}|${star}`;
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(slot);
        }

        for (const slots of groups.values()) {
          if (slots.length < 3) continue;
          const boardSlots = slots.filter(slot => slot.place === "board");
          if (boardSlots.length >= 2) continue;
          const keep =
            slots.find(slot => slot.place === "board") ||
            slots.filter(slot => slot.place === "bench").sort((a, b) => a.index - b.index)[0];
          const consumed = slots.filter(slot => slot !== keep).slice(0, 2);
          for (const slot of consumed) removeOwnedSlot(slot);
          const promoted = promoteSlot(keep);
          messages.push(`${displayDragonName(promoted)} merged to ${promoted.star}-star.`);
          merged = true;
          break;
        }
      }
      if (messages.length) {
        removeMaxedDragonsFromShop();
        log(messages[messages.length - 1]);
      }
      return messages.length > 0;
    }

    function traitStacks() {
      const stacks = {};
      for (const key of Object.keys(elements)) stacks[key] = 0;
      const countedNames = new Set();
      for (const d of state.dragons) {
        if (countedNames.has(d.name)) continue;
        countedNames.add(d.name);
        for (const e of d.elements) stacks[e] += 1;
      }
      return stacks;
    }

    function activeTier(count) {
      if (count >= 8) return 8;
      if (count >= 6) return 6;
      if (count >= 4) return 4;
      if (count >= 2) return 2;
      return 0;
    }

    function traitBonuses() {
      const stacks = traitStacks();
      const tier = Object.fromEntries(Object.entries(stacks).map(([k, v]) => [k, activeTier(v)]));
      return {
        stacks,
        tier,
        damageMult: tier.Plant === 8 ? 1.70 : tier.Plant === 6 ? 1.45 : tier.Plant === 4 ? 1.25 : tier.Plant === 2 ? 1.10 : 1,
        attackSpeedMult: tier.Wind === 8 ? 1.65 : tier.Wind === 6 ? 1.45 : tier.Wind === 4 ? 1.25 : tier.Wind === 2 ? 1.12 : 1,
        critChance: tier.Metal === 8 ? 0.55 : tier.Metal === 6 ? 0.38 : tier.Metal === 4 ? 0.22 : tier.Metal === 2 ? 0.10 : 0,
      };
    }

    function renderUi() {
      if (state.shopLocked && !shopHasCards()) state.shopLocked = false;
      if (state.selected && !selectedDrag()) state.selected = null;
      document.getElementById("waveText").textContent = state.wave;
      document.getElementById("waveTimerText").textContent = waveTimerText();
      document.getElementById("hpText").textContent = state.hp;
      const rewardPreview = waveClearReward();
      document.getElementById("goldText").textContent = UNLIMITED_GOLD ? `∞ (+${rewardPreview})` : `${state.gold} (+${rewardPreview})`;
      const xpNeed = xpNeededForCurrentLevel();
      document.getElementById("levelText").textContent = state.keeperLevel >= MAX_KEEPER_LEVEL
        ? `Lv. ${state.keeperLevel} MAX`
        : `Lv. ${state.keeperLevel} ${state.keeperXp}/${xpNeed} XP`;
      document.getElementById("capText").textContent = `${state.dragons.length} / ${boardCapForLevel()}`;
      const activeSelection = selectedDrag();
      const selectedUnit = state.dragging?.unit || activeSelection?.unit;
      document.getElementById("selectedText").textContent = state.pendingMerge
        ? "Choose merge"
        : selectedUnit ? displayDragonName(selectedUnit) : (isTouchUi() ? "Tap a dragon" : "Shop to board");
      document.getElementById("benchHealHint").classList.toggle("visible", !state.waveRunning && !state.gameOver && hasInjuredBoardDragon());

      const stacks = traitStacks();
      const activeTraits = Object.entries(elements)
        .map(([name, data]) => ({ name, data, count: stacks[name] || 0, tier: activeTier(stacks[name] || 0) }))
        .filter(item => item.count > 0);
      document.getElementById("traitPanel").innerHTML = activeTraits.length ? activeTraits.map(({ name, data, count, tier }) => {
        return `<div class="trait ${tier > 0 ? "active" : ""}" data-trait="${name}">
          <img src="${data.icon}" alt="" />
          <span>${name}</span>
          <div class="trait-stacks">
            ${[2, 4, 6, 8].map(mark => `<span class="trait-stack ${tier === mark ? "active" : ""}">${mark}</span>`).join("")}
          </div>
        </div>`;
      }).join("") : `<div class="trait-empty">No active traits yet.</div>`;

      document.querySelectorAll("[data-trait]").forEach(row => {
        row.addEventListener("click", ev => {
          ev.stopPropagation();
          showTraitNote(row.dataset.trait);
        });
        row.addEventListener("contextmenu", ev => {
          ev.preventDefault();
          ev.stopPropagation();
          showTraitNote(row.dataset.trait, ev.clientX, ev.clientY);
        });
      });

      document.getElementById("dropRatePanel").innerHTML = `
        <div class="drop-rate-row header">
          <span>Lv</span>
          ${[1, 2, 3, 4, 5].map(cost => `<span class="drop-tier-${cost}">${goldCostHtml(cost)}</span>`).join("")}
        </div>
        ${keeperDropRates.map(row => `<div class="drop-rate-row ${row.level === state.keeperLevel ? "active" : ""}">
          <span>Lv.${row.level}</span>
          ${row.rates.map((rate, index) => `<span class="drop-tier-${index + 1}">${rate}%</span>`).join("")}
        </div>`).join("")}
      `;

      document.getElementById("shopRow").innerHTML = state.shop.map((d, i) => {
        if (!d) {
          return `<div class="card empty" data-shop-empty="${i}"></div>`;
        }
        const unaffordable = !UNLIMITED_GOLD && state.gold < d.cost;
        const mergeInfo = shopMergeInfo(d);
        const mergeReady = !!mergeInfo;
        const mergeStars = mergeReady ? Array.from({ length: mergeInfo.finalStar }, () => "<span></span>").join("") : "";
        const mergeClass = mergeInfo?.finalStar === 3 ? "gold" : "silver";
        const selected = state.selected?.source === "shop" && state.selected.index === i;
        return `<div class="card ${tierClass(d.cost)} ${unaffordable ? "unaffordable" : ""} ${mergeReady ? "merge-ready" : ""} ${selected ? "selected" : ""}" data-shop="${i}" draggable="${isTouchUi() ? "false" : "true"}">
          <div class="card-title">${displayDragonName(d)}</div>
          ${state.shopLocked ? `<img class="shop-lock-badge" src="${icon.lock}" alt="Locked" title="Shop locked" />` : ""}
          <div class="elements">${d.elements.map(e => `<span class="element-tag" style="color:${elements[e].color}"><img class="element-dot" src="${elements[e].icon}" title="${e}" alt="" />${e}</span>`).join("")}</div>
          <img class="dragon-img" src="${d.baby}" alt="" />
          <div class="cost"><img class="icon" src="${icon.gold}" alt="" /> ${d.cost}</div>
          ${mergeReady ? `<div class="merge-star-hint ${mergeClass}" title="Merge ready: ${mergeInfo.finalStar}-star">${mergeStars}</div>` : ""}
        </div>`;
      }).join("");

      document.querySelectorAll("[data-shop]").forEach(card => {
        enableTouchPointerDrag(card, () => {
          const index = Number(card.dataset.shop);
          return { source: "shop", index, unit: state.shop[index] };
        });
        card.addEventListener("click", ev => {
          if (state.gameOver) return;
          const index = Number(card.dataset.shop);
          const unit = state.shop[index];
          if (!unit) return;
          if (isTouchUi()) {
            ev.stopPropagation();
            if (state.selected?.source === "shop" && state.selected.index === index) {
              state.selected = null;
              buyToBench(index);
            } else {
              selectForTouch({ source: "shop", index, unit });
            }
            return;
          }
          buyToBench(index);
        });
        card.addEventListener("dragstart", ev => {
          if (state.gameOver) {
            ev.preventDefault();
            return;
          }
          const index = Number(card.dataset.shop);
          const unit = state.shop[index];
          if (!unit) return;
          if (!UNLIMITED_GOLD && state.gold < unit.cost) {
            ev.preventDefault();
            log(`Need ${unit.cost} Gold to buy ${displayDragonName(unit)}.`);
            renderUi();
            return;
          }
          state.dragging = { source: "shop", index, unit };
          ev.dataTransfer.setData("text/plain", JSON.stringify({ source: "shop", index }));
          ev.dataTransfer.effectAllowed = "copy";
          ev.dataTransfer.setDragImage(makeDragGhost(unit), 64, 64);
          card.classList.add("dragging");
          document.getElementById("selectedText").textContent = displayDragonName(unit);
        });
        card.addEventListener("dragend", () => {
          state.dragging = null;
          clearDragGhost();
          renderUi();
        });
        card.addEventListener("contextmenu", ev => {
          ev.preventDefault();
          const unit = state.shop[Number(card.dataset.shop)];
          if (unit) showStats(unit, ev.clientX, ev.clientY);
        });
      });
      const rerollBtn = document.getElementById("rerollBtn");
      rerollBtn.innerHTML = `Reroll ${goldCostHtml(REROLL_COST)}`;
      rerollBtn.disabled = state.gameOver || (!UNLIMITED_GOLD && state.gold < REROLL_COST);
      rerollBtn.onclick = () => rollShop();
      const lockShopBtn = document.getElementById("lockShopBtn");
      const canLockShop = !state.gameOver && shopHasCards();
      if (!canLockShop && state.shopLocked) state.shopLocked = false;
      lockShopBtn.disabled = !canLockShop;
      lockShopBtn.innerHTML = `<img src="${state.shopLocked ? icon.lock : icon.unlock}" alt="" /><span>${state.shopLocked ? "Lock" : "Unlock"}</span>`;
      lockShopBtn.onclick = () => {
        if (state.gameOver || !shopHasCards()) return;
        state.shopLocked = !state.shopLocked;
        log(state.shopLocked ? "Shop locked. It will not refresh after the next wave." : "Shop unlocked. It will refresh after each wave.");
        renderUi();
      };
      const buyXpBtn = document.getElementById("buyXpBtn");
      buyXpBtn.innerHTML = state.keeperLevel >= MAX_KEEPER_LEVEL ? "XP MAX" : `Buy XP ${goldCostHtml(BUY_XP_COST)}`;
      buyXpBtn.disabled = state.gameOver || state.keeperLevel >= MAX_KEEPER_LEVEL || (!UNLIMITED_GOLD && state.gold < BUY_XP_COST);
      buyXpBtn.onclick = buyKeeperXp;
      const spawnBtn = document.getElementById("spawnBtn");
      spawnBtn.textContent = state.waveRunning ? "Wave Running" : giantBossTypes[state.wave] ? "Start Boss" : "Start Wave";
      spawnBtn.disabled = state.gameOver || state.waveRunning;
      spawnBtn.onclick = () => startWave(false);
      const speedBtn = document.getElementById("speedBtn");
      speedBtn.disabled = state.gameOver;
      speedBtn.innerHTML = `<img src="${icon.doubleArrow}" alt="" /> ${speedButtonLabel()}`;
      speedBtn.onclick = () => {
        if (state.gameOver) return;
        state.gameSpeed = state.gameSpeed === 1 ? 2 : state.gameSpeed === 2 ? 3 : 1;
        renderUi();
      };
      document.getElementById("orientationBtn").onclick = requestLandscapeMode;
      const playAgainBtn = document.getElementById("playAgainBtn");
      playAgainBtn.style.display = state.gameOver ? "block" : "none";
      playAgainBtn.onclick = resetGame;

      const bench = document.getElementById("bench");
      bench.innerHTML = state.bench.map((d, i) => {
        const selected = state.selected?.source === "bench" && state.selected.index === i;
        return `<div class="bench-slot ${d ? `filled ${tierClass(d.cost)} ${isOwnedMergeReadyBlink(d) ? "merge-ready" : ""}` : ""} ${selected ? "selected" : ""}" data-bench="${i}" ${d ? `draggable="${isTouchUi() ? "false" : "true"}"` : ""}>
          ${d ? `<img src="${assetForUnit(d)}" alt="" title="${displayDragonName(d)}" /><div class="bench-name" title="${displayDragonName(d)}">${rankIconHtml(d.star)}<span>${displayDragonName(d)}</span></div>` : ""}
        </div>`;
      }).join("");

      document.querySelectorAll("[data-bench]").forEach(slot => {
        enableTouchPointerDrag(slot, () => {
          const index = Number(slot.dataset.bench);
          return { source: "bench", index, unit: state.bench[index] };
        });
        slot.addEventListener("click", ev => {
          if (!isTouchUi() || state.gameOver) return;
          ev.stopPropagation();
          const index = Number(slot.dataset.bench);
          const unit = state.bench[index];
          const selection = selectedDrag();
          if (!selection) {
            if (unit) selectForTouch({ source: "bench", index, unit });
            return;
          }
          if (selection.source === "bench" && selection.index === index) {
            clearTouchSelection();
            showStats(unit, ev.clientX, ev.clientY);
            renderUi();
            return;
          }
          state.selected = null;
          state.dragging = selection;
          dropToBench(index);
          clearTouchSelection();
          renderUi();
        });
        slot.addEventListener("dragover", ev => {
          ev.preventDefault();
          slot.classList.add("drag-over");
          ev.dataTransfer.dropEffect = state.dragging?.source === "bench" ? "move" : "copy";
        });
        slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
        slot.addEventListener("drop", ev => {
          ev.preventDefault();
          slot.classList.remove("drag-over");
          const index = Number(slot.dataset.bench);
          dropToBench(index);
        });
        slot.addEventListener("dragstart", ev => {
          const index = Number(slot.dataset.bench);
          const unit = state.bench[index];
          if (!unit) return;
          state.dragging = { source: "bench", index, unit };
          ev.dataTransfer.setData("text/plain", JSON.stringify({ source: "bench", index }));
          ev.dataTransfer.effectAllowed = "move";
          ev.dataTransfer.setDragImage(makeDragGhost(unit), 64, 64);
          slot.classList.add("dragging");
          document.getElementById("selectedText").textContent = displayDragonName(unit);
        });
        slot.addEventListener("dragend", () => {
          state.dragging = null;
          clearDragGhost();
          renderUi();
        });
        slot.addEventListener("contextmenu", ev => {
          const index = Number(slot.dataset.bench);
          const unit = state.bench[index];
          if (!unit) return;
          ev.preventDefault();
          showStats(unit, ev.clientX, ev.clientY);
        });
      });

      const sellZone = document.getElementById("sellZone");
      sellZone.classList.toggle("tap-ready", isTouchUi() && ["bench", "board"].includes(selectedDrag()?.source));
      sellZone.onclick = ev => {
        if (!isTouchUi() || state.gameOver) return;
        ev.stopPropagation();
        const selection = selectedDrag();
        if (!selection || !["bench", "board"].includes(selection.source)) {
          log("Select a bench or board dragon first.");
          return;
        }
        state.selected = null;
        sellUnit(selection.unit, selection);
      };
      sellZone.ondragover = ev => {
        if (!state.dragging || (state.dragging.source !== "bench" && state.dragging.source !== "board")) return;
        ev.preventDefault();
        sellZone.classList.add("drag-over");
        ev.dataTransfer.dropEffect = "move";
      };
      sellZone.ondragleave = () => sellZone.classList.remove("drag-over");
      sellZone.ondrop = ev => {
        ev.preventDefault();
        sellZone.classList.remove("drag-over");
        sellDraggedDragon();
      };
      requestAnimationFrame(fitCanvasToScreen);
    }

    function log(text) {
      document.getElementById("logText").textContent = text;
    }

    function showStats(unit, x, y) {
      const popover = document.getElementById("statPopover");
      const s = statsFor(unit);
      const nextAttack = 1 / s.attackSpeed;
      const costClass = `drop-tier-${unit.cost}`;
      const refund = refundFor(unit);
      popover.innerHTML = `
        <h3>${displayDragonName(unit)}<span class="stat-title-meta">${rankIconHtml(unit.star)}<span class="${costClass}">${goldCostHtml(unit.cost)}</span></span></h3>
        <div class="stat-line"><img src="${icon.damage}" alt="" /> Damage <strong>${s.damage}</strong></div>
        <div class="stat-line"><img src="${icon.attackSpeed}" alt="" /> Next Attack <strong>${nextAttack.toFixed(2)}s</strong></div>
        <div class="stat-line"><img src="${icon.hp}" alt="" /> HP <strong>${s.hp}</strong></div>
        <div class="stat-line"><img src="${icon.gold}" alt="" /> Cost <strong>${unit.cost}</strong></div>
        <div class="stat-line"><span class="stat-elements">${unit.elements.map(name => `<img src="${elements[name].icon}" alt="${name}" title="${name}" />`).join("")}</span></div>
        <div class="stat-line sell-value-line">Sell for <strong>${goldCostHtml(refund)}</strong></div>
      `;
      popover.style.left = `${Math.min(window.innerWidth - 250, x + 12)}px`;
      popover.style.top = `${Math.min(window.innerHeight - 190, y + 12)}px`;
      popover.style.width = "";
      popover.style.maxHeight = "";
      popover.style.overflowY = "";
      popover.style.display = "block";
      clearTimeout(showStats.hideTimer);
      showStats.hideTimer = setTimeout(() => popover.style.display = "none", 3600);
    }

    function speedButtonLabel() {
      if (state.gameSpeed === 2) return "Speed 2x";
      if (state.gameSpeed === 3) return "Speed 3x";
      return "Speed Up";
    }

    function traitRosterHtml(name) {
      const roster = dragonPool
        .filter(unit => unit.elements.includes(name))
        .sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name));
      const boardNames = new Set(state.dragons.map(unit => unit.name));
      return `<div class="trait-roster">
        <h4>Dragons with this trait</h4>
        <div class="trait-roster-list">
          ${roster.map(unit => `<div class="trait-dragon-row ${boardNames.has(unit.name) ? "" : "inactive"}">
            <img src="${unit.baby}" alt="" />
            <span class="trait-dragon-name">${goldCostHtml(unit.cost)}<span class="name-text">${displayDragonName(unit)}</span></span>
            <span class="trait-dragon-elements">${unit.elements.map(e => `<img src="${elements[e].icon}" alt="${e}" title="${e}" />`).join("")}</span>
          </div>`).join("")}
        </div>
      </div>`;
    }

    function positionTraitPopover(popover) {
      const traitPanel = document.getElementById("traitPanel");
      const panelRect = traitPanel.closest(".panel").getBoundingClientRect();
      const top = Math.max(8, panelRect.top);
      const preferredLeft = panelRect.right + 10;
      const width = Math.min(380, window.innerWidth - 24);
      const left = preferredLeft + width <= window.innerWidth - 8
        ? preferredLeft
        : Math.max(8, panelRect.left);
      popover.style.width = `${width}px`;
      popover.style.left = `${left}px`;
      popover.style.top = `${top}px`;
      popover.style.maxHeight = "";
      popover.style.overflowY = "";
    }

    function positionTraitPopoverAtPointer(popover, x, y) {
      const width = Math.min(380, window.innerWidth - 24);
      popover.style.width = `${width}px`;
      popover.style.left = "-9999px";
      popover.style.top = "-9999px";
      popover.style.display = "block";
      const height = popover.offsetHeight;
      const left = Math.min(window.innerWidth - width - 8, x + 12);
      const top = Math.max(8, Math.min(window.innerHeight - height - 8, y - height / 2));
      popover.style.left = `${Math.max(8, left)}px`;
      popover.style.top = `${top}px`;
      popover.style.maxHeight = "";
      popover.style.overflowY = "";
    }

    function showTraitNote(name, x = null, y = null) {
      const popover = document.getElementById("statPopover");
      const note = traitNotes[name];
      const stacks = traitStacks()[name] || 0;
      const tier = activeTier(stacks);
      popover.innerHTML = `
        <h3><span style="color:${elements[name].color}">${name}</span> Trait</h3>
        <div class="stat-line"><img src="${elements[name].icon}" alt="" /> Current <strong>${stacks} stacks (${tier || "-"}/8)</strong></div>
        <p>${note.summary}</p>
        ${note.tiers.map((text, index) => {
          const mark = Number(text.match(/^(\d+)/)?.[1] || [2, 4, 6, 8][index]);
          return `<div class="stat-line trait-tier-line ${tier === mark ? "active" : ""}">${text}</div>`;
        }).join("")}
        ${traitRosterHtml(name)}
      `;
      if (x !== null && y !== null) {
        positionTraitPopoverAtPointer(popover, x, y);
      } else {
        positionTraitPopover(popover);
      }
      popover.style.display = "block";
      clearTimeout(showStats.hideTimer);
      showStats.hideTimer = setTimeout(() => popover.style.display = "none", 6000);
    }

    function dragonAtPoint(x, y) {
      for (let i = state.dragons.length - 1; i >= 0; i--) {
        const d = state.dragons[i];
        if (Math.hypot(d.x - x, d.y - y) < 64) return d;
      }
      return null;
    }

    function dragonAtCell(row, col) {
      return state.dragons.find(d => d.row === row && d.col === col) || null;
    }

    function dragonAtDropPoint(x, y) {
      const directHit = dragonAtPoint(x, y);
      if (directHit) return directHit;
      const cell = canvasPointToCell(x, y);
      return dragonAtCell(cell.row, cell.col);
    }

    function refundFor(unit) {
      const star = unit.star || 1;
      const totalCost = unit.cost * Math.pow(3, star - 1);
      if (star === 1) return unit.cost;
      if (star === 2) return Math.floor(totalCost * 0.8);
      return Math.floor(totalCost * 0.7);
    }

    function sellUnit(unit, source) {
      if (!unit) return;
      if (state.waveRunning && source?.source === "board") {
        log("Board dragons cannot be sold during a wave.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return;
      }
      const refund = refundFor(unit);
      if (source?.source === "bench") state.bench[source.index] = null;
      if (source?.source === "board") state.dragons = state.dragons.filter(d => d.id !== unit.id);
      state.gold += refund;
      log(`Sold ${displayDragonName(unit)} for ${refund} Gold.`);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      renderUi();
    }

    function sellDraggedDragon() {
      const drag = state.dragging;
      if (!drag?.unit) return log("Drag a bench or board dragon into the sell zone.");
      if (drag.source !== "bench" && drag.source !== "board") return log("Only owned dragons can be sold here.");
      sellUnit(drag.unit, drag);
    }

    function draggedUnitFromEvent(ev) {
      if (state.dragging) return state.dragging;
      try {
        const data = JSON.parse(ev.dataTransfer.getData("text/plain"));
        if (data.source === "shop") return { source: "shop", index: data.index, unit: state.shop[data.index] };
        if (data.source === "bench") return { source: "bench", index: data.index, unit: state.bench[data.index] };
        if (data.source === "board") {
          const unit = state.dragons.find(d => d.id === data.id);
          return { source: "board", id: data.id, unit };
        }
      } catch {}
      return null;
    }

    function dropToBench(index) {
      const drag = state.dragging;
      if (!drag?.unit) return log("Drag a dragon from the shop or bench first.");
      if (drag.source === "shop" && executeShopChainThreeStar(drag.index)) return;
      if (drag.source === "shop" && startBoardMergeChoice(drag.unit, drag)) return;
      if (tryAutoMergeIncoming(drag.unit, drag)) return;
      if (drag.source === "bench" && drag.index === index) {
        state.dragging = null;
        clearDragGhost();
        renderUi();
        return;
      }
      if (state.bench[index]) {
        if (drag.source !== "bench") return log("That bench slot is already occupied.");
        const targetUnit = state.bench[index];
        state.bench[index] = drag.unit;
        state.bench[drag.index] = targetUnit;
        log(`Swapped ${displayDragonName(drag.unit)} with ${displayDragonName(targetUnit)}.`);
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return;
      }
      if (!spendForShopUnit(drag, drag.unit)) {
        renderUi();
        return;
      }
      state.bench[index] = drag.source === "shop" ? makeOwnedUnit(drag.unit) : drag.unit;
      if (drag.source === "bench") state.bench[drag.index] = null;
      log(`${displayDragonName(drag.unit)} moved to bench slot ${index + 1}.`);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      autoMerge();
      renderUi();
    }

    function buyToBench(shopIndex) {
      const unit = state.shop[shopIndex];
      if (!unit) return;
      if (executeShopChainThreeStar(shopIndex)) return;
      if (startBoardMergeChoice(unit, { source: "shop", index: shopIndex })) return;
      if (tryAutoMergeIncoming(unit, { source: "shop", index: shopIndex })) return;
      const benchIndex = state.bench.findIndex(slot => !slot);
      if (benchIndex === -1) return log("Bench is full. Drag directly onto the board or free a slot.");
      if (!spendForShopUnit({ source: "shop", index: shopIndex }, unit)) {
        renderUi();
        return;
      }
      state.bench[benchIndex] = makeOwnedUnit(unit);
      log(`Bought ${displayDragonName(unit)} into bench slot ${benchIndex + 1}.`);
      autoMerge();
      renderUi();
    }

    function setDragonCell(unit, row, col) {
      unit.row = row;
      unit.col = col;
      unit.x = cellCenterX(col);
      unit.y = cellCenterY(row);
    }

    function moveBoardDragon(unit, row, col) {
      if (!unit) return false;
      if (state.waveRunning) {
        log("Board is locked while a wave is running.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      if (isTowerBlockedCell(row, col)) {
        log("This tower area is reserved and cannot hold dragons.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      if (col >= PLACE_COLS) {
        log("Board dragons can only be moved inside the green zone before a wave.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      const target = dragonAtCell(row, col);
      const oldRow = unit.row;
      const oldCol = unit.col;
      if (target && target.id === unit.id) {
        log(`${displayDragonName(unit)} stayed in place.`);
      } else if (target) {
        setDragonCell(unit, row, col);
        setDragonCell(target, oldRow, oldCol);
        log(`Swapped ${displayDragonName(unit)} with ${displayDragonName(target)}.`);
      } else {
        setDragonCell(unit, row, col);
        log(`Moved ${displayDragonName(unit)}.`);
      }
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      renderUi();
      return true;
    }

    function moveBoardDragonToBench(unit, benchIndex) {
      if (!unit || benchIndex < 0) return false;
      if (state.waveRunning) {
        log("Board is locked while a wave is running.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      const target = state.bench[benchIndex];
      state.dragons = state.dragons.filter(d => d.id !== unit.id);
      if (target) {
        const boardUnit = {
          ...target,
          id: target.id || state.nextId++,
          row: unit.row,
          col: unit.col,
          x: unit.x,
          y: unit.y,
          cooldown: target.cooldown || 1 / statsFor(target).attackSpeed,
        };
        syncDragonHp(boardUnit, true);
        state.dragons.push(boardUnit);
        state.bench[benchIndex] = unit;
        log(`Swapped ${displayDragonName(unit)} with ${displayDragonName(target)}.`);
      } else {
        state.bench[benchIndex] = unit;
        log(`${displayDragonName(unit)} moved to bench slot ${benchIndex + 1}.`);
      }
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      renderUi();
      return true;
    }

    function placeUnit(unit, row, col, source = null) {
      if (!unit) return log("Drag a dragon from the shop or bench first.");
      if (source?.source === "shop" && executeShopChainThreeStar(source.index)) return true;
      if (source?.source === "board") return moveBoardDragon(unit, row, col);
      if (col >= PLACE_COLS) return log("Dragons can only be placed in the green zone.");
      if (isTowerBlockedCell(row, col)) return log("This tower area is reserved and cannot hold dragons.");
      if (maybeMergeByDroppingOnBoard(unit, source, row, col)) return true;
      if (tryAutoMergeIncoming(unit, source, dragonAtCell(row, col))) return true;
      const target = dragonAtCell(row, col);
      if (state.waveRunning && target) return log("During a wave, you can add dragons to empty cells or merge, but not replace board dragons.");
      if (target && source?.source === "bench") {
        const incoming = {
          ...unit,
          id: unit.id || state.nextId++,
          star: unit.star || 1,
          row,
          col,
          x: cellCenterX(col),
          y: cellCenterY(row),
          cooldown: unit.cooldown || 1 / statsFor(unit).attackSpeed,
        };
        syncDragonHp(incoming, true);
        state.dragons = state.dragons.filter(d => d.id !== target.id);
        state.dragons.push(incoming);
        state.bench[source.index] = target;
        log(`Swapped ${displayDragonName(incoming)} with ${displayDragonName(target)}.`);
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      const boardCap = boardCapForLevel();
      if (state.dragons.length >= boardCap) return log(`Keeper Level ${state.keeperLevel} board cap reached (${boardCap}). Buy XP to place more dragons.`);
      if (target) return log("That cell already has a dragon.");
      if (!spendForShopUnit(source, unit)) {
        renderUi();
        return true;
      }
      const ownedUnit = source?.source === "shop" ? makeOwnedUnit(unit) : unit;
      const d = {
        ...ownedUnit,
        id: state.nextId++,
        star: ownedUnit.star || 1,
        row,
        col,
        x: cellCenterX(col),
        y: cellCenterY(row),
        cooldown: 1 / statsFor(ownedUnit).attackSpeed,
      };
      syncDragonHp(d, source?.source === "bench");
      state.dragons.push(d);
      if (source?.source === "bench") state.bench[source.index] = null;
      log(`Placed ${displayDragonName(d)}.`);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      autoMerge();
      renderUi();
      return true;
    }

    function spawnEnemy(rowOverride = null, typeOverride = null) {
      const type = typeOverride || chooseEnemyTypeForSpawn();
      const waveOneRows = state.wave === 1 ? occupiedDragonRows() : [];
      const row = rowOverride ?? (waveOneRows.length ? waveOneRows[state.enemiesSpawned % waveOneRows.length] : Math.floor(Math.random() * ROWS));
      const hpScale = type.boss ? 1 : 1 + state.wave * 0.16;
      const maxHp = Math.round(type.hp * hpScale);
      const isWideBoss = !!type.wideBoss;
      state.enemies.push({
        id: state.nextId++,
        ...type,
        row: isWideBoss ? Math.floor(ROWS / 2) : row,
        x: isWideBoss ? FIELD_RIGHT + 260 : FIELD_RIGHT + 50,
        y: isWideBoss ? canvas.height * 0.49 : row * CELL_H + CELL_H * 0.6,
        maxHp,
        hp: maxHp,
        attackCooldown: 0,
        burrowCooldown: type.ability === "burrow" ? 0.35 + Math.random() * 0.75 : 0,
        burrowUsed: false,
        burrowed: 0,
      });
      if (isWideBoss) {
        state.bossPortalPulse = Math.max(state.bossPortalPulse || 0, 1.32);
        state.effects.push({ type: "spawn", x: FIELD_RIGHT + 32, y: canvas.height * 0.5, life: .55 });
      } else {
        state.portalLanePulses[row] = Math.max(state.portalLanePulses[row] || 0, 1.08);
        state.effects.push({ type: "spawn", x: FIELD_RIGHT + 32, y: row * CELL_H + CELL_H * 0.55, life: .45 });
      }
    }

    function laneTarget(dragon) {
      const rangeLimit = dragon.rangeDebuff > 0 ? CELL_W * 3.1 : Infinity;
      return state.enemies
        .filter(e => {
          if (e.enteringTower || e.burrowed || (!e.wideBoss && e.row !== dragon.row)) return false;
          const dx = e.x - dragon.x;
          const inFrontOrTouching = dx >= -CELL_W * 0.5;
          return inFrontOrTouching && dx <= rangeLimit;
        })
        .sort((a, b) => a.x - b.x)[0];
    }

    function dragonBlockingEnemy(enemy) {
      return state.dragons
        .filter(d => d.row === enemy.row && d.x <= enemy.x + 16 && Math.abs(d.x - enemy.x) <= 48)
        .sort((a, b) => b.x - a.x)[0] || null;
    }

    function enemyAttackDamage(enemy) {
      return Math.max(8, Math.round(enemy.maxHp * 0.045 + state.wave * 2));
    }

    function staggerDragonCooldownsForBoss() {
      for (const dragon of state.dragons) {
        const nextAttack = 1 / statsFor(dragon).attackSpeed;
        dragon.cooldown = nextAttack * (0.15 + Math.random() * 0.85);
      }
    }

    function splitEnemy(enemy) {
      if (enemy.splitDone || enemy.ability !== "splitter") return;
      enemy.splitDone = true;
      state.effects.push({ type: "splitter", x: enemy.x, y: enemy.y, life: .42 });
      const rows = [enemy.row, enemy.row - 1, enemy.row + 1].filter(row => row >= 0 && row < ROWS);
      for (const row of rows) {
        const hpScale = 1 + state.wave * 0.08;
        const maxHp = Math.round(miniEnemyType.hp * hpScale);
        const targetY = row * CELL_H + CELL_H * 0.48;
        state.enemies.push({
          id: state.nextId++,
          ...miniEnemyType,
          row,
          x: Math.min(FIELD_RIGHT + 34, enemy.x + (Math.random() * 28 - 14)),
          y: targetY,
          targetY,
          maxHp,
          hp: maxHp,
          attackCooldown: 0,
          laneDrift: 0,
        });
      }
    }

    function shootEnemyProjectile(enemy, targetDragon) {
      const damage = Math.max(5, Math.round(enemyAttackDamage(enemy) * .45));
      state.enemyProjectiles.push({
        id: state.nextId++,
        type: enemy.ability === "rangedDebuff" ? "hexBolt" : "enemyBolt",
        x: enemy.x - 28,
        y: enemy.y - 24,
        targetId: targetDragon.id,
        targetX: targetDragon.x,
        targetY: targetDragon.y - 34,
        speed: 430,
        damage,
        rangeDebuff: enemy.ability === "rangedDebuff" ? 3.2 : 0,
        trail: [],
        life: 1.6,
      });
      state.effects.push({ type: "enemyCast", x: enemy.x - 18, y: enemy.y - 46, life: .25 });
    }

    function shoot(dragon, target) {
      const bonuses = traitBonuses();
      const s = statsFor(dragon);
      const main = dragon.elements[0];
      const profile = projectileProfile(main);
      const crit = Math.random() < bonuses.critChance;
      const damage = Math.round(s.damage * bonuses.damageMult * (crit ? 1.8 : 1));
      dragon.attackAnim = ATTACK_ANIM_DURATION;
      state.projectiles.push({
        id: state.nextId++,
        type: main,
        projectileType: profile.projectileType,
        hitEffect: profile.hitEffect,
        row: dragon.row,
        targetId: target.id,
        x: dragon.x + 28,
        y: dragon.y - 10,
        speed: profile.speed,
        damage,
        crit,
        trail: [],
        trailMax: profile.trail,
        wobble: Math.random() * Math.PI * 2,
        age: 0,
      });
      if (main === "Water" && waterProc(bonuses.tier.Water || 0)) {
