<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dragon vs Monsters Prototype</title>
  <style>
    :root { --ui-scale: 1; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      height: 100vh;
      background: #172016;
      color: #f3f4df;
      font-family: Arial, Helvetica, sans-serif;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #f3c94f;
      color: #251d0a;
      font-weight: 800;
      padding: 10px 14px;
      cursor: pointer;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.secondary { background: #314634; color: #f3f4df; border: 1px solid #58745b; }
    .app {
      width: min(1500px, 100vw);
      height: 100vh;
      margin: 0 auto;
      padding: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }
    .topbar {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 8px;
      align-items: center;
    }
    .pill {
      min-height: 40px;
      border-radius: 8px;
      background: #233226;
      border: 1px solid #3b523c;
      padding: 6px 9px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .pill strong { display: block; font-size: 16px; }
    .wave-pill .wave-timer {
      margin-left: auto;
      color: #ffe08a;
      min-width: 38px;
      text-align: right;
    }
    .wave-pill .wave-timer:empty {
      display: none;
    }
    .icon { width: 22px; height: 22px; image-rendering: pixelated; object-fit: contain; }
    .main {
      display: grid;
      grid-template-columns: 310px minmax(640px, 1fr) 150px;
      gap: 8px;
      align-items: stretch;
      min-height: 0;
      overflow: hidden;
    }
    .main > section, .main > aside {
      min-height: 0;
      overflow: hidden;
    }
    .panel {
      border-radius: 8px;
      background: #223026;
      border: 1px solid #415942;
      padding: 8px;
      max-height: 100%;
      overflow: hidden;
    }
    .panel h2 {
      font-size: 18px;
      margin: 0 0 8px;
      color: #ffe08a;
    }
    .left-panel {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 8px;
    }
    .trait {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 15px;
      cursor: help;
    }
    .trait:last-child { border-bottom: 0; }
    .trait img { width: 32px; height: 32px; object-fit: contain; image-rendering: pixelated; }
    .trait b { font-size: 13px; color: #b8caa7; }
    .trait.active b { color: #ffe08a; }
    .trait-empty {
      color: #8fa58e;
      font-size: 13px;
      padding: 8px 0;
    }
    .trait-stacks {
      display: inline-flex;
      gap: 3px;
      justify-content: flex-end;
    }
    .trait-stack {
      min-width: 22px;
      padding: 2px 4px;
      border-radius: 5px;
      background: rgba(255,255,255,.07);
      color: #9fb39b;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
    }
    .trait-stack.active {
      background: #f3c94f;
      color: #251d0a;
      box-shadow: 0 0 8px rgba(243,201,79,.55);
    }
    .drop-rate-panel {
      border-top: 1px solid rgba(255,255,255,.12);
      padding-top: 8px;
    }
    .drop-rate-panel h2 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 16px;
    }
    .drop-rate-table {
      display: grid;
      gap: 3px;
      font-size: 10px;
    }
    .drop-rate-row {
      display: grid;
      grid-template-columns: 36px repeat(5, 1fr);
      align-items: center;
      gap: 3px;
      min-height: 20px;
      padding: 2px 0;
      color: #dceacb;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .drop-rate-row:last-child { border-bottom: 0; }
    .drop-rate-row.header {
      color: #ffe08a;
      font-weight: 900;
    }
    .drop-rate-row.active {
      color: #fff7c7;
      background: rgba(243, 201, 79, .09);
      border-radius: 5px;
    }
    .drop-rate-row span {
      text-align: center;
      white-space: nowrap;
    }
    .drop-rate-row span:first-child {
      text-align: left;
      font-weight: 900;
    }
    .gold-cost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      line-height: 1;
      vertical-align: middle;
      white-space: nowrap;
    }
    .gold-cost img {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    button .gold-cost {
      position: relative;
      top: -1px;
      gap: 4px;
      margin-left: 2px;
      font-size: inherit;
    }
    button .gold-cost img {
      width: 18px;
      height: 18px;
      flex-basis: 18px;
    }
    .drop-tier-1 { color: #cfd4d8; }
    .drop-tier-2 { color: #63d87a; }
    .drop-tier-3 { color: #5db4ff; }
    .drop-tier-4 { color: #b783ff; }
    .drop-tier-5 { color: #f3c94f; }
    .board-wrap {
      border-radius: 8px;
      background: #101912;
      border: 1px solid #405940;
      padding: 8px;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto auto auto auto;
      gap: 5px;
    }
    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      min-height: 0;
      max-width: 100%;
      justify-self: center;
      align-self: center;
      display: block;
      border-radius: 6px;
      background: #1c2a1e;
      cursor: default;
    }
    .shop-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-top: 0;
      align-items: stretch;
    }
    .bench-title, .shop-title {
      margin: 0;
      color: #ffe08a;
      font-size: 12px;
      font-weight: 900;
      line-height: 12px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .card {
      position: relative;
      height: 146px;
      min-height: 146px;
      border-radius: 8px;
      background: #233226;
      border: 2px solid #456047;
      padding: 7px;
      cursor: grab;
      display: grid;
      grid-template-columns: 94px 1fr;
      grid-template-rows: 20px 78px 24px;
      gap: 3px;
      overflow: hidden;
    }
    .card.selected { outline: 3px solid #f3c94f; }
    .card:active { cursor: grabbing; }
    .card.dragging .dragon-img { opacity: 0; }
    .card.merge-ready {
      animation: shopMergePulse .58s ease-in-out infinite alternate;
      box-shadow: 0 0 0 2px rgba(243,201,79,.9), 0 0 18px rgba(243,201,79,.75);
    }
    @keyframes shopMergePulse {
      from {
        border-color: #f3c94f;
        box-shadow: 0 0 0 2px rgba(243,201,79,.65), 0 0 10px rgba(243,201,79,.45);
      }
      to {
        border-color: #ffe050;
        box-shadow: 0 0 0 3px rgba(255,224,80,1), 0 0 22px rgba(255,224,80,.95);
      }
    }
    .card.empty {
      cursor: default;
      background: #18221b;
      border: 2px dashed #3c513e;
      opacity: .65;
    }
    .card.unaffordable {
      background: linear-gradient(135deg, #303533, #171b19);
      border-color: #6d7470;
      filter: grayscale(.85);
      opacity: .72;
    }
    .tier-1 { background: linear-gradient(135deg, #31363a, #1f2427); border-color: #858b91; }
    .tier-2 { background: linear-gradient(135deg, #1f4a2e, #162d20); border-color: #4ec06a; }
    .tier-3 { background: linear-gradient(135deg, #1d4165, #14283d); border-color: #4aa3ff; }
    .tier-4 { background: linear-gradient(135deg, #49306b, #2c1d42); border-color: #a46cff; }
    .tier-5 { background: linear-gradient(135deg, #776018, #3f310d); border-color: #f3c94f; }
    .card-title {
      font-size: 12px;
      line-height: 1.15;
      min-height: 24px;
      font-weight: 800;
      grid-column: 1 / 3;
      position: relative;
      z-index: 1;
    }
    .dragon-img {
      position: absolute;
      left: 100px;
      top: 36px;
      width: 82px;
      height: 82px;
      object-fit: contain;
      image-rendering: pixelated;
      transform: scaleX(-1);
      margin-left: 0;
    }
    .cost, .elements {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .elements {
      align-self: start;
      grid-column: 1;
      grid-row: 2;
      width: 88px;
      height: 78px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      align-content: start;
      gap: 1px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .cost {
      grid-column: 1;
      grid-row: 3;
      align-self: center;
      margin-left: 3px;
      width: 58px;
      height: 24px;
      padding: 3px 6px;
      border-radius: 7px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 900;
      font-size: 13px;
      line-height: 1;
      flex-wrap: nowrap;
      white-space: nowrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .cost .icon { width: 18px; height: 18px; flex: 0 0 auto; }
    .merge-star-hint {
      grid-column: 1;
      grid-row: 3;
      align-self: center;
      justify-self: start;
      margin-left: 68px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 5px rgba(220,230,255,.8));
    }
    .merge-star-hint span {
      display: block;
      width: 14px;
      height: 14px;
      clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
    }
    .merge-star-hint.silver span {
      background: linear-gradient(135deg, #ffffff, #9aa7bb);
      box-shadow: 0 0 8px rgba(220,230,255,.75);
    }
    .merge-star-hint.gold span {
      background: linear-gradient(135deg, #fff8a8, #ffd33f 55%, #f59e0b);
      box-shadow: 0 0 10px rgba(255,224,80,.95), 0 0 16px rgba(245,158,11,.7);
    }
    .element-tag {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      max-width: 88px;
      height: 25px;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
      white-space: nowrap;
    }
    .element-dot {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .control-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }
    .side-actions {
      display: grid;
      gap: 8px;
      grid-template-rows: minmax(86px, 1fr) 52px 52px 52px 52px 52px;
      min-height: 0;
    }
    .side-actions button {
      padding: 10px 8px;
      font-size: 14px;
      min-height: 52px;
    }
    .tool-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    #lockShopBtn {
      display: grid;
      grid-template-columns: 24px 56px;
      justify-content: center;
      align-items: center;
      column-gap: 7px;
    }
    #lockShopBtn span {
      text-align: left;
    }
    .tool-button img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
    .tool-button { cursor: grab; }
    .tool-button:active { cursor: grabbing; }
    .bench {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 5px;
    }
    .bench-slot {
      min-width: 0;
      min-height: 78px;
      border-radius: 6px;
      background: #18241c;
      border: 1px dashed #486149;
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      padding: 3px;
      font-size: 11px;
      color: #8fa58e;
      cursor: default;
      overflow: hidden;
    }
    .bench-slot.filled { cursor: grab; border-style: solid; background: #203026; }
    .bench-slot.filled.tier-1 { border-color: #858b91; }
    .bench-slot.filled.tier-2 { border-color: #4ec06a; }
    .bench-slot.filled.tier-3 { border-color: #4aa3ff; }
    .bench-slot.filled.tier-4 { border-color: #a46cff; }
    .bench-slot.filled.tier-5 { border-color: #f3c94f; }
    .bench-slot.drag-over { outline: 3px solid #f3c94f; }
    .bench-slot.merge-ready {
      animation: shopMergePulse .58s ease-in-out infinite alternate;
      box-shadow: 0 0 0 2px rgba(243,201,79,.85), 0 0 16px rgba(243,201,79,.7);
    }
    .bench-slot img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      image-rendering: pixelated;
      transform: scaleX(-1);
    }
    .bench-name {
      width: 100%;
      max-width: 100%;
      border-radius: 6px;
      background: rgba(0,0,0,.58);
      color: #ffe08a;
      font-size: 11px;
      font-weight: 800;
      line-height: 15px;
      padding: 0 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
      white-space: nowrap;
    }
    .bench-name span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-icon {
      flex: 0 0 auto;
      display: inline-block;
      width: 14px;
      height: 14px;
    }
    .rank-1 {
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 13px solid #b57735;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.7));
    }
    .rank-2 {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #f5f7ff, #9aa7bb);
      transform: rotate(45deg);
      box-shadow: 0 0 6px rgba(220,230,255,.7);
    }
    .rank-3 {
      width: 15px;
      height: 15px;
      background: #ffe65a;
      clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
      filter: drop-shadow(0 0 6px #fff1a8) drop-shadow(0 0 10px #ffd33f);
    }
    .sell-zone {
      min-height: 68px;
      margin-top: 0;
      border-radius: 8px;
      border: 2px dashed #d95b5b;
      background: rgba(112, 22, 22, .28);
      color: #ffd6d6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      font-size: 11px;
    }
    .sell-zone img { width: 20px; height: 20px; object-fit: contain; image-rendering: pixelated; }
    .sell-zone.drag-over {
      border-color: #65e66f;
      background: rgba(80, 180, 92, .18);
      box-shadow: inset 0 0 14px rgba(101,230,111,.32);
    }
    body.sell-drag .sell-zone {
      animation: sellZonePulse .58s ease-in-out infinite alternate;
      border-color: #65e66f;
      background: rgba(80, 180, 92, .18);
      box-shadow: inset 0 0 14px rgba(101,230,111,.32), 0 0 18px rgba(101,230,111,.55);
    }
    @keyframes sellZonePulse {
      from { box-shadow: inset 0 0 10px rgba(101,230,111,.24), 0 0 8px rgba(101,230,111,.35); }
      to { box-shadow: inset 0 0 18px rgba(101,230,111,.44), 0 0 22px rgba(101,230,111,.75); }
    }
    .log {
      display: none;
    }
    .stat-popover {
      position: fixed;
      z-index: 10;
      min-width: 230px;
      max-width: 380px;
      border-radius: 8px;
      background: #172016;
      border: 1px solid #f3c94f;
      box-shadow: 0 12px 28px rgba(0,0,0,.38);
      padding: 10px;
      display: none;
      pointer-events: auto;
      overflow: hidden;
    }
    .play-again {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: none;
      min-width: 148px;
      min-height: 54px;
      border: 2px solid #ffe08a;
      box-shadow: 0 8px 22px rgba(0,0,0,.38);
      font-size: 18px;
    }
    .stat-popover h3 {
      margin: 0 0 8px;
      color: #ffe08a;
      font-size: 15px;
    }
    .stat-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 13px;
    }
    .trait-tier-line {
      border-radius: 6px;
      padding: 4px 6px;
      background: rgba(255,255,255,.04);
    }
    .trait-tier-line.active {
      background: #f3c94f;
      color: #251d0a;
      font-weight: 900;
      box-shadow: 0 0 10px rgba(243,201,79,.55);
    }
    .stat-line img { width: 20px; height: 20px; image-rendering: pixelated; object-fit: contain; }
    .stat-elements {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .stat-elements img {
      width: 30px;
      height: 30px;
      image-rendering: pixelated;
      object-fit: contain;
    }
    .trait-roster {
      margin-top: 9px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.12);
      display: grid;
      gap: 5px;
    }
    .trait-roster h4 {
      margin: 0 0 2px;
      color: #ffe08a;
      font-size: 13px;
    }
    .trait-roster-list {
      display: grid;
      gap: 4px;
      max-height: none;
      overflow: visible;
      padding-right: 0;
    }
    .trait-dragon-row {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: #e8f1d6;
    }
    .trait-dragon-row.inactive {
      opacity: .36;
      filter: grayscale(1);
    }
    .trait-dragon-row img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      image-rendering: pixelated;
      transform: scaleX(-1);
    }
    .trait-dragon-row b { color: #ffe08a; }
    .trait-dragon-name {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      line-height: 1.1;
    }
    .trait-dragon-name .gold-cost {
      flex: 0 0 28px;
      justify-content: flex-start;
      gap: 2px;
    }
    .trait-dragon-name .gold-cost img {
      width: 12px;
      height: 12px;
      transform: none;
    }
    .trait-dragon-name .name-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .trait-dragon-elements {
      display: inline-flex;
      gap: 2px;
    }
    .trait-dragon-elements img {
      width: 22px;
      height: 22px;
      transform: none;
    }
    .trait-icon-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 8px 0;
    }
    .trait-tier {
      display: grid;
      place-items: center;
      gap: 3px;
      min-width: 48px;
      color: #ffe08a;
      font-size: 12px;
      font-weight: 900;
    }
    .trait-tier img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    @media (max-width: 1000px) {
      .topbar { grid-template-columns: repeat(2, 1fr); }
      .main { grid-template-columns: 1fr; }
      .shop-row { grid-template-columns: repeat(2, 1fr); }
      .side-actions { grid-template-columns: repeat(6, 1fr); grid-template-rows: 42px; }
      .bench { grid-template-columns: repeat(5, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="pill wave-pill"><span>Wave</span><strong id="waveText">1</strong><strong id="waveTimerText" class="wave-timer"></strong></div>
      <div class="pill"><img class="icon" src="Resource Asset/Health_Icon.png" alt="" /><span>Castle HP</span><strong id="hpText">5</strong></div>
      <div class="pill"><img class="icon" src="Resource Asset/Gold_Icon.png" alt="" /><span>Gold</span><strong id="goldText">10</strong></div>
      <div class="pill"><span>Keeper</span><strong id="levelText">Lv. 1 0/4</strong></div>
      <div class="pill"><span>Board Cap</span><strong id="capText">0 / 5</strong></div>
      <div class="pill"><span>Drag</span><strong id="selectedText">Shop to board</strong></div>
    </div>

    <div class="main">
      <aside class="panel left-panel">
        <h2>Traits</h2>
        <div id="traitPanel"></div>
        <div class="drop-rate-panel">
          <h2>Drop Rates</h2>
          <div id="dropRatePanel" class="drop-rate-table"></div>
        </div>
      </aside>

      <section>
        <div class="board-wrap">
          <canvas id="game" width="1280" height="720"></canvas>
          <div class="bench-title">Bench</div>
          <div class="bench" id="bench"></div>

      if (dragGhost) dragGhost.remove();

      image.style.imageRendering = "pixelated";
      image.style.transform = "scaleX(-1)";
      dragGhost.appendChild(image);
      document.body.appendChild(dragGhost);
      return dragGhost;
