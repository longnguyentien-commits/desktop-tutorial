        const tier = bonuses.tier.Water || 0;
        const secondShotMult = waterSecondShotDamage(tier);
        const waterProfile = projectileProfile("Water");
        state.projectiles.push({
          id: state.nextId++,
          type: "Water",
          projectileType: "wave",
          hitEffect: waterProfile.hitEffect,
          row: dragon.row,
          targetId: target.id,
          x: dragon.x + 28,
          y: dragon.y - 10,
          speed: waterProfile.speed,
          damage: Math.round(damage * secondShotMult),
          crit: false,
          secondShot: true,
          delay: 0.10,
          trail: [],
          trailMax: 6,
          wobble: Math.random() * Math.PI * 2,
          age: 0,
        });
      }
    }

    function waterProc(tier) {
      return Math.random() < ({2:.15,4:.30,6:.50,8:.70}[tier] || 0);
    }

    function waterSecondShotDamage(tier) {
      return ({2:.5,4:.6,6:.7,8:.8}[tier] || .5);
    }

    function applyTrait(projectile, enemy) {
      if (enemy.boss) return;
      const bonuses = traitBonuses();
      const tier = bonuses.tier[projectile.type] || 0;
      const roll = Math.random();
      if (projectile.type === "Fire" && roll < ({2:.20,4:.35,6:.55,8:.75}[tier] || 0)) {
        enemy.burn = tier === 8 ? 4 : 3;
      }
      if (projectile.type === "Ice" && roll < ({2:.15,4:.30,6:.50,8:.70}[tier] || 0)) {
        enemy.slow = 2;
      }
      if (projectile.type === "Earth" && roll < ({2:.12,4:.24,6:.38,8:.55}[tier] || 0)) {
        const push = ({2:32,4:48,6:64,8:80}[tier] || 0);
        enemy.x = Math.min(canvas.width + 110, enemy.x + push);
        state.effects.push({ type: "Earth", x: enemy.x, y: enemy.y, life: .24, knockback: true });
      }
      if (projectile.type === "Energy" && roll < ({2:.15,4:.30,6:.50,8:.70}[tier] || 0)) {
        const other = state.enemies.find(e => !e.boss && (enemy.wideBoss || e.wideBoss || e.row === enemy.row) && e.id !== enemy.id);
        if (other) {
          other.hp -= projectile.damage * (tier === 8 ? .65 : .5);
          state.effects.push({ type: "Energy", x: (enemy.x + other.x) / 2, y: enemy.y, life: .25 });
        }
      }
    }

    function update(dt, realDt = dt) {
      if (state.gameOver) return;
      const bonuses = traitBonuses();
      for (let i = 0; i < state.portalLanePulses.length; i++) {
        state.portalLanePulses[i] = Math.max(0, state.portalLanePulses[i] - dt * 0.9);
      }
      state.bossPortalPulse = Math.max(0, state.bossPortalPulse - dt * 0.72);
      if (planningTimerActive()) {
        state.planningTimer = Math.max(0, state.planningTimer - realDt);
        if (state.planningTimer <= 0) {
          startWave(true);
          return;
        }
      }
      if (state.waveRunning) {
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0 && state.enemiesSpawned < state.enemiesToSpawn) {
          const bossType = giantBossTypes[state.wave];
          const prepCount = bossPrepEnemyCount();
          const bossReady = bossType && state.enemiesSpawned >= prepCount;
          if (bossReady && state.enemies.length) {
            state.spawnTimer = 0.18;
          } else if (bossReady) {
            spawnEnemy(null, bossType);
            staggerDragonCooldownsForBoss();
            state.enemiesSpawned += 1;
            state.spawnTimer = Math.max(0.26, 0.78 - state.wave * 0.018);
          } else {
            spawnEnemy();
            state.enemiesSpawned += 1;
            state.spawnTimer = Math.max(0.26, 0.78 - state.wave * 0.018);
          }
        }
      }

      for (const d of state.dragons) {
        if (d.rangeDebuff) d.rangeDebuff = Math.max(0, d.rangeDebuff - dt);
        if (d.damageFlash) d.damageFlash = Math.max(0, d.damageFlash - dt);
        if (d.attackAnim) d.attackAnim = Math.max(0, d.attackAnim - dt);
        const s = statsFor(d);
        const target = laneTarget(d);
        if (!target) {
          d.cooldown = Math.max(d.cooldown, 1 / s.attackSpeed);
          continue;
        }
        d.cooldown -= dt * bonuses.attackSpeedMult;
        if (d.cooldown <= 0) {
          shoot(d, target);
          d.cooldown = 1 / s.attackSpeed;
        }
      }

      for (const e of state.enemies) {
        if (e.burn) { e.hp -= e.maxHp * 0.015 * dt; e.burn -= dt; }
        if (e.slow) e.slow -= dt;
        if (e.stun) e.stun -= dt;
        if (e.damageFlash) e.damageFlash = Math.max(0, e.damageFlash - dt);
        e.attackCooldown = Math.max(0, (e.attackCooldown || 0) - dt);
        if (e.enteringTower) {
          const target = e.towerTarget || currentTowerEntryPoint();
          e.towerTarget = target;
          const dx = target.x - e.x;
          const dy = target.y - e.y;
          const dist = Math.max(1, Math.hypot(dx, dy));
          const step = Math.max(e.speed * 1.45, 70) * dt;
          if (dist <= step + 10) {
            e.x = target.x;
            e.y = target.y;
            e.enteredTower = true;
          } else {
            e.x += dx / dist * step;
            e.y += dy / dist * step;
          }
          continue;
        }
        if (e.ability === "burrow") {
          if (e.burrowed > 0) {
            e.burrowed -= dt;
            e.x -= Math.max(e.speed * 1.45, CELL_W * 1.65) * dt;
            if (e.burrowed <= 0) {
              e.burrowed = 0;
              e.burrowUsed = true;
              e.burrowCooldown = Infinity;
              state.effects.push({ type: "burrowPop", x: e.x, y: e.y + 18, life: .34 });
            }
            continue;
          }
          e.burrowCooldown = Math.max(0, (e.burrowCooldown || 0) - dt);
          const inOpeningCells = e.x > FIELD_RIGHT - CELL_W * 4 && e.x < FIELD_RIGHT - CELL_W * 0.35;
          if (!e.burrowUsed && e.burrowCooldown <= 0 && inOpeningCells) {
            e.burrowed = 2;
            e.burn = 0;
            e.slow = 0;
            state.effects.push({ type: "burrowDive", x: e.x, y: e.y + 22, life: .32 });
            continue;
          }
        }
        if (e.ability === "rangedDebuff" && !(e.stun > 0)) {
          const targetDragon = state.dragons
            .filter(d => d.row === e.row && d.x < e.x && e.x - d.x <= (e.attackRange || 320))
            .sort((a, b) => b.x - a.x)[0];
          if (targetDragon) {
            if (e.attackCooldown <= 0) {
              shootEnemyProjectile(e, targetDragon);
              e.attackCooldown = 1.45;
            }
            continue;
          }
        }
        const blocker = dragonBlockingEnemy(e);
        if (blocker && !(e.stun > 0)) {
          if (e.attackCooldown <= 0) {
            blocker.hp -= enemyAttackDamage(e);
            blocker.damageFlash = 0.28;
            e.attackCooldown = 0.85;
            state.effects.push({ type: "hitDragon", x: blocker.x, y: blocker.y - 34, life: .22 });
          }
          continue;
        }
        const speedMod = e.stun > 0 ? 0 : e.slow > 0 ? 0.65 : 1;
        e.x -= e.speed * speedMod * dt;
        if (e.mini && e.laneDrift) {
          e.y += e.laneDrift * dt;
          const targetY = e.targetY ?? (e.row * CELL_H + CELL_H * 0.48);
          if ((e.laneDrift > 0 && e.y >= targetY) || (e.laneDrift < 0 && e.y <= targetY)) {
            e.y = targetY;
            e.laneDrift = 0;
          }
        }
      }

      const dragonDeaths = state.dragons.filter(d => d.hp <= 0);
      if (dragonDeaths.length) {
        for (const d of dragonDeaths) {
          state.effects.push({ type: "dragonDeath", x: d.x, y: d.y, life: .35 });
        }
        state.dragons = state.dragons.filter(d => d.hp > 0);
        log(`${displayDragonName(dragonDeaths[0])} was defeated.`);
      }

      for (const p of state.projectiles) {
        if (p.delay && p.delay > 0) {
          p.delay -= dt;
          continue;
        }
        p.age = (p.age || 0) + dt;
        p.trail = [...(p.trail || []), { x: p.x, y: p.y }].slice(-(p.trailMax || 7));
        const prevX = p.x;
        const prevY = p.y;
        p.x += p.speed * dt;
        const profile = projectileProfile(p.type);
        if (p.projectileType !== "lightning") {
          p.y += Math.sin(performance.now() / 90 + p.wobble) * (profile.wobble || 0);
        }
        const enemy = state.enemies.find(e => {
          const radiusX = e.wideBoss ? (e.size || 860) * 0.34 : e.maxHp > 300 ? 42 : 31;
          const radiusY = e.wideBoss ? canvas.height * 0.5 : radiusX + 12;
          if (e.enteringTower || e.burrowed || (!e.wideBoss && e.row !== p.row)) return false;
          const minX = Math.min(prevX, p.x) - radiusX;
          const maxX = Math.max(prevX, p.x) + radiusX;
          const yLine = p.projectileType === "lightning" ? prevY : p.y;
          const trackedTargetInSameCell = e.id === p.targetId && e.x <= prevX && prevX - e.x <= CELL_W * 0.72;
          return (trackedTargetInSameCell || (e.x >= minX && e.x <= maxX)) && Math.abs(e.y - yLine) <= radiusY;
        });
        if (enemy) {
          enemy.hp -= p.damage;
          if (enemy.wideBoss) {
            const size = enemy.size || 860;
            const profileColor = projectileProfile(p.type).color;
            for (let i = 0; i < 12; i++) {
              state.effects.push({
                type: "bossImpact",
                elementType: p.type,
                color: profileColor,
                x: enemy.x + (Math.random() * 2 - 1) * size * 0.28,
                y: enemy.y + (Math.random() * 2 - 1) * size * 0.38,
                life: 0.28 + Math.random() * 0.14,
                delay: Math.random() * 0.1,
                size: 4 + Math.random() * 5,
                crit: p.crit,
              });
            }
          } else {
            enemy.damageFlash = 0.16;
            state.effects.push({ type: p.hitEffect || p.type, elementType: p.type, x: enemy.x, y: enemy.y, life: .38, crit: p.crit });
          }
          applyTrait(p, enemy);
          p.hit = true;
        }
      }
      state.projectiles = state.projectiles.filter(p => !p.hit && p.x < canvas.width + 80);

      for (const p of state.enemyProjectiles) {
        p.life -= dt;
        p.trail = [...(p.trail || []), { x: p.x, y: p.y }].slice(-8);
        const target = state.dragons.find(d => d.id === p.targetId);
        if (target) {
          p.targetX = target.x;
          p.targetY = target.y - 34;
        }
        const dx = p.targetX - p.x;
        const dy = p.targetY - p.y;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const step = p.speed * dt;
        if (dist <= step + 12) {
          const hitDragon = target || state.dragons.find(d => d.row === Math.max(0, Math.min(ROWS - 1, Math.floor(p.y / CELL_H))) && Math.hypot(d.x - p.targetX, d.y - p.targetY) < 76);
          if (hitDragon) {
            hitDragon.hp -= p.damage;
            hitDragon.damageFlash = 0.28;
            if (p.rangeDebuff) hitDragon.rangeDebuff = p.rangeDebuff;
            state.effects.push({ type: p.type === "hexBolt" ? "hexImpact" : "enemyImpact", x: hitDragon.x, y: hitDragon.y - 42, life: .35 });
          }
          p.hit = true;
        } else {
          p.x += dx / dist * step;
          p.y += dy / dist * step;
        }
      }
      state.enemyProjectiles = state.enemyProjectiles.filter(p => !p.hit && p.life > 0);

      const towerBreachX = cellLeft(1);
      const towerTarget = currentTowerEntryPoint();
      for (const enemy of state.enemies) {
        if (!enemy.enteringTower && enemy.x < towerBreachX) {
          enemy.enteringTower = true;
          enemy.burrowed = 0;
          enemy.stun = 0;
          enemy.slow = 0;
          enemy.towerTarget = { ...towerTarget };
        }
      }
      const entered = state.enemies.filter(e => e.enteredTower).length;
      if (entered) {
        addTowerDamageNumbers(entered);
        state.hp = Math.max(0, state.hp - entered);
        state.enemies = state.enemies.filter(e => !e.enteredTower);
        if (state.hp <= 0) {
          completeRun("lost");
        }
      }

      const defeatedEnemies = state.enemies.filter(e => e.hp <= 0);
      for (const enemy of defeatedEnemies) splitEnemy(enemy);
      state.enemies = state.enemies.filter(e => e.hp > 0);
      if (!state.gameOver && state.waveRunning && state.enemiesSpawned >= state.enemiesToSpawn && !state.enemies.length) {
        finishWave();
      }

      for (const fx of state.effects) {
        if (fx.delay > 0) {
          fx.delay -= dt;
        } else {
          fx.life -= dt;
        }
      }
      state.effects = state.effects.filter(fx => fx.life > 0 || fx.delay > 0);
    }

    function drawCastle() {
      const t = performance.now() / 1000;
      ctx.save();
      ctx.fillStyle = "rgba(11, 17, 13, .45)";
      ctx.fillRect(0, 0, CASTLE_W, canvas.height);
      const ground = ctx.createLinearGradient(0, 0, CASTLE_W, 0);
      ground.addColorStop(0, "#1d241e");
      ground.addColorStop(1, "#33422d");
      ctx.fillStyle = ground;
      ctx.fillRect(0, 0, CASTLE_W, canvas.height);
      for (let r = 0; r < ROWS; r++) {
        const y = r * CELL_H + CELL_H * 0.54;
        ctx.fillStyle = "rgba(255, 226, 140, .16)";
        ctx.beginPath();
        ctx.ellipse(CASTLE_W - 24, y + 28, 38, 10, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      const baseX = 16;
      const baseY = canvas.height * 0.18;
      const baseW = 76;
      const baseH = canvas.height * 0.64;
      ctx.shadowColor = "rgba(0,0,0,.45)";
      ctx.shadowBlur = 12;
      ctx.fillStyle = "#6d6b62";
      ctx.fillRect(baseX, baseY + 72, baseW, baseH - 72);
      ctx.fillStyle = "#8f8b7d";
      ctx.fillRect(baseX + 10, baseY + 34, baseW - 20, baseH - 34);
      ctx.fillStyle = "#55524d";
      for (let y = baseY + 54; y < baseY + baseH - 8; y += 34) {
        for (let x = baseX + 12; x < baseX + baseW - 8; x += 26) {
          ctx.fillRect(x, y, 20, 9);
        }
      }
      ctx.fillStyle = "#3f3c37";
      ctx.fillRect(baseX + 23, baseY + baseH - 84, 30, 84);
      ctx.fillStyle = "#27221c";
      ctx.beginPath();
      ctx.arc(baseX + 38, baseY + baseH - 84, 15, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = "#a7a08b";
      for (let i = 0; i < 4; i++) ctx.fillRect(baseX + 6 + i * 19, baseY + 18, 13, 28);
      ctx.fillStyle = "#c2483d";
      ctx.beginPath();
      ctx.moveTo(baseX + 2, baseY + 18);
      ctx.lineTo(baseX + 82, baseY + 18);
      ctx.lineTo(baseX + 42, baseY - 14);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = `rgba(255, 224, 128, ${0.22 + Math.sin(t * 2.2) * 0.08})`;
      ctx.fillRect(baseX + 28, baseY + 112, 20, 26);
      ctx.restore();
    }

    function drawPortal() {
      const t = performance.now() / 1000;
      const bossPulse = state.bossPortalPulse || 0;
      if (bossPulse > 0) {
        const alpha = Math.min(1, bossPulse);
        const x = FIELD_RIGHT + PORTAL_W * 0.5;
        const y = canvas.height * 0.5;
        const scale = 0.95 + alpha * 0.18 + Math.sin(t * 4) * 0.018;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.globalCompositeOperation = "lighter";

        const glow = ctx.createRadialGradient(0, 0, 12, 0, 0, CELL_H * 2.55);
        glow.addColorStop(0, "rgba(220, 248, 255, .95)");
        glow.addColorStop(.28, "rgba(116, 235, 255, .6)");
        glow.addColorStop(.64, "rgba(139, 95, 255, .34)");
        glow.addColorStop(1, "rgba(33, 20, 70, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.ellipse(0, 0, 72, CELL_H * 2.34, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = "source-over";
        const core = ctx.createRadialGradient(0, 0, 10, 0, 0, CELL_H * 1.72);
        core.addColorStop(0, "rgba(12, 6, 28, .94)");
        core.addColorStop(.62, "rgba(36, 18, 84, .68)");
        core.addColorStop(1, "rgba(20, 10, 60, 0)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.ellipse(0, 0, 42, CELL_H * 1.88, Math.sin(t) * 0.03, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < 4; i++) {
          ctx.strokeStyle = `rgba(${120 + i * 32}, ${220 - i * 16}, 255, ${0.72 - i * 0.11})`;
          ctx.lineWidth = 12 - i * 1.8;
          ctx.beginPath();
          ctx.ellipse(Math.sin(t * 2 + i) * 8, 0, 50 + i * 18, CELL_H * (1.92 - i * 0.12), Math.sin(t + i) * 0.04, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.strokeStyle = `rgba(230, 255, 255, ${0.7 + alpha * 0.2})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(Math.sin(t * 3) * 5, 0, 74, CELL_H * 2.18, -0.025, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      for (let r = 0; r < ROWS; r++) {
        const pulse = state.portalLanePulses[r] || 0;
        if (pulse <= 0) continue;
        const alpha = Math.min(1, pulse);
        const x = FIELD_RIGHT + PORTAL_W * 0.52;
        const y = r * CELL_H + CELL_H * 0.5;
        const scale = 0.86 + alpha * 0.22 + Math.sin(t * 5 + r) * 0.025;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.globalCompositeOperation = "lighter";

        const glow = ctx.createRadialGradient(0, 0, 6, 0, 0, 72);
        glow.addColorStop(0, "rgba(215, 245, 255, .9)");
        glow.addColorStop(.3, "rgba(116, 235, 255, .62)");
        glow.addColorStop(.62, "rgba(139, 95, 255, .36)");
        glow.addColorStop(1, "rgba(33, 20, 70, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.ellipse(0, 0, 34, CELL_H * 0.43, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = "source-over";
        const core = ctx.createRadialGradient(0, 0, 3, 0, 0, CELL_H * 0.28);
        core.addColorStop(0, "rgba(14, 8, 32, .88)");
        core.addColorStop(.58, "rgba(36, 18, 84, .58)");
        core.addColorStop(1, "rgba(20, 10, 60, 0)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.ellipse(0, 0, 18, CELL_H * 0.3, Math.sin(t + r) * 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < 3; i++) {
          ctx.strokeStyle = `rgba(${120 + i * 45}, ${220 - i * 20}, 255, ${0.66 - i * 0.13})`;
          ctx.lineWidth = 7 - i * 1.8;
          ctx.beginPath();
          ctx.ellipse(Math.sin(t * 2 + i + r) * 4, 0, 22 + i * 9, CELL_H * (0.32 - i * 0.025), Math.sin(t + i) * 0.1, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.strokeStyle = `rgba(230, 255, 255, ${0.62 + alpha * 0.18})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(Math.sin(t * 3 + r) * 3, 0, 32, CELL_H * 0.4, -0.06, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const castleGround = ctx.createLinearGradient(0, 0, FIELD_X, 0);
      castleGround.addColorStop(0, "#1d241e");
      castleGround.addColorStop(1, "#33422d");
      ctx.fillStyle = castleGround;
      ctx.fillRect(0, 0, FIELD_X, canvas.height);
      const grass = img(icon.battleMap);
      if (canDrawImage(grass)) {
        drawImageCover(grass, FIELD_X, 0, FIELD_W, canvas.height, 1.28);
      } else {
        const fallback = ctx.createLinearGradient(0, 0, 0, canvas.height);
        fallback.addColorStop(0, "#263620");
        fallback.addColorStop(.48, "#385330");
        fallback.addColorStop(1, "#24351f");
        ctx.fillStyle = fallback;
        ctx.fillRect(FIELD_X, 0, FIELD_W, canvas.height);
      }
      drawTowerAsset();
      drawPortal();
      if (state.dragging || state.pendingMerge || state.selected) {
        const pulse = 0.45 + Math.sin(performance.now() / 120) * 0.25;
        ctx.save();
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            if (isTowerBlockedCell(r, c)) continue;
            const x = cellLeft(c);
            const y = r * CELL_H;
            const cellDragon = dragonAtCell(r, c);
            const isHover = state.hoverCell?.row === r && state.hoverCell?.col === c;
            const isMergeTarget = cellDragon && isBlinkCandidate(cellDragon);
            const isOccupied = !!cellDragon;
            const baseAlpha = isHover || isMergeTarget ? .92 : isOccupied ? .32 : .42;
            ctx.strokeStyle = isMergeTarget
              ? `rgba(255, 224, 80, ${Math.min(1, baseAlpha + pulse * .35)})`
              : isHover
                ? "rgba(255, 236, 166, .95)"
                : `rgba(255, 244, 190, ${baseAlpha})`;
            ctx.lineWidth = isHover || isMergeTarget ? 4 : 2;
            ctx.shadowColor = isMergeTarget ? "#ffe050" : isHover ? "#fff0a8" : "rgba(255, 224, 138, .65)";
            ctx.shadowBlur = isHover || isMergeTarget ? 16 : 7;
            ctx.strokeRect(x + 7, y + 7, CELL_W - 14, CELL_H - 14);
          }
        }
        ctx.restore();
      }
    }

    function drawRankIcon(x, y, star = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.lineWidth = 2;
      if (star === 1) {
        ctx.fillStyle = "#b57735";
        ctx.strokeStyle = "#5f3517";
        ctx.shadowColor = "rgba(181,119,53,.55)";
        ctx.shadowBlur = 6;
      } else if (star === 2) {
        ctx.fillStyle = "#dfe7f5";
        ctx.strokeStyle = "#8290a6";
        ctx.shadowColor = "rgba(220,230,255,.8)";
        ctx.shadowBlur = 8;
      } else {
        ctx.fillStyle = "#ffe65a";
        ctx.strokeStyle = "#fff6b8";
        ctx.shadowColor = "#ffd33f";
        ctx.shadowBlur = 16;
      }
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = -Math.PI / 2 + i * Math.PI / 5;
        const radius = i % 2 === 0 ? 15 : 6;
        const px = Math.cos(angle) * radius;
        const py = Math.sin(angle) * radius;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = star === 1 ? "#2b1608" : star === 2 ? "#26313f" : "#5a4200";
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.lineWidth = 2;
      ctx.font = "900 13px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.strokeText(String(Math.min(3, Math.max(1, star))), 0, 1);
      ctx.fillText(String(Math.min(3, Math.max(1, star))), 0, 1);
      ctx.restore();
    }

    function drawDragonHealthBar(d, x, y) {
      if (!d.maxHp) syncDragonHp(d, false);
      const width = 54;
      const height = 8;
      const ratio = Math.max(0, Math.min(1, d.hp / d.maxHp));
      ctx.save();
      ctx.fillStyle = "rgba(33, 8, 8, .88)";
      ctx.fillRect(x, y, width, height);
      ctx.fillStyle = ratio > .55 ? "#68d66f" : ratio > .25 ? "#f3c94f" : "#ff5a5a";
      ctx.fillRect(x, y, width * ratio, height);
      ctx.strokeStyle = "rgba(255,255,255,.65)";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, width, height);
      ctx.restore();
    }

    function drawImageContained(image, boxSize) {
      if (!canDrawImage(image)) return { width: boxSize, height: boxSize };
      const iw = image.naturalWidth || image.width || boxSize;
      const ih = image.naturalHeight || image.height || boxSize;
      const scale = Math.min(boxSize / iw, boxSize / ih);
      const drawW = iw * scale;
      const drawH = ih * scale;
      ctx.drawImage(image, -drawW / 2, -drawH / 2, drawW, drawH);
      return { width: drawW, height: drawH };
    }

    function drawSheetFrameContained(image, frameIndex, frameCount, boxSize) {
      if (!canDrawImage(image)) return { width: boxSize, height: boxSize };
      const iw = image.naturalWidth || image.width || boxSize * frameCount;
      const ih = image.naturalHeight || image.height || boxSize;
      const frameW = iw / frameCount;
      const frameH = ih;
      const scale = Math.min(boxSize / frameW, boxSize / frameH);
      const drawW = frameW * scale;
      const drawH = frameH * scale;
      ctx.drawImage(image, frameW * frameIndex, 0, frameW, frameH, -drawW / 2, -drawH / 2, drawW, drawH);
      return { width: drawW, height: drawH };
    }

    function drawWithAlpha(alpha, drawCall) {
      ctx.save();
      ctx.globalAlpha *= Math.max(0, Math.min(1, alpha));
      const result = drawCall();
      ctx.restore();
      return result;
    }

    function drawDragonImage(d, size) {
      const baseImage = img(assetForUnit(d));
      const attackActive = d.attackAnim > 0;
      if (attackActive) {
        const sheet = img(attackSheetForUnit(d));
        if (canDrawImage(sheet)) {
          const progress = 1 - Math.max(0, Math.min(1, d.attackAnim / ATTACK_ANIM_DURATION));
          const frame = Math.max(0, Math.min(5, Math.floor(progress * 6)));
          const transitionWindow = 0.16;
          const blendRaw = Math.min(1, progress / transitionWindow, (1 - progress) / transitionWindow);
          const attackAlpha = blendRaw * blendRaw * (3 - 2 * blendRaw);
          let drawn = { width: size, height: size };
          if (attackAlpha < 1 && canDrawImage(baseImage)) {
            drawn = drawWithAlpha(1 - attackAlpha, () => drawImageContained(baseImage, size));
          }
          if (attackAlpha > 0) {
            const attackDrawn = drawWithAlpha(attackAlpha, () => drawSheetFrameContained(sheet, frame, 6, size));
            if (attackAlpha >= 0.5) drawn = attackDrawn;
          }
          return drawn;
        }
      }
      return drawImageContained(baseImage, size);
    }

    function drawImageCover(image, x, y, w, h, zoom = 1) {
      if (!canDrawImage(image)) return false;
      const iw = image.naturalWidth || image.width || w;
      const ih = image.naturalHeight || image.height || h;
      const scale = Math.max(w / iw, h / ih) * zoom;
      const drawW = iw * scale;
      const drawH = ih * scale;
      ctx.drawImage(image, x + (w - drawW) / 2, y + (h - drawH) / 2, drawW, drawH);
      return true;
    }

    function towerLayout(tower) {
      const targetH = canvas.height * 0.34;
      const targetW = targetH * (tower.width / tower.height);
      return {
        x: Math.max(-18, FIELD_X - targetW * 0.9),
        y: canvas.height * 0.5 - targetH * 0.5 + 8,
        w: targetW,
        h: targetH,
      };
    }

    function towerEggPoint(layout) {
      return {
        x: layout.x + layout.w * 0.5,
        y: layout.y + layout.h * 0.34,
      };
    }

    function currentTowerEntryPoint() {
      const tower = getCutoutImage(icon.tower);
      if (tower) return towerEggPoint(towerLayout(tower));
      return { x: FIELD_X * 0.48, y: canvas.height * 0.5 };
    }

    function addTowerDamageNumbers(count) {
      const tower = getCutoutImage(icon.tower);
      if (!tower) return;
      const origin = towerEggPoint(towerLayout(tower));
      for (let i = 0; i < count; i++) {
        const spread = (i - (count - 1) / 2) * 14;
        state.effects.push({
          type: "towerDamageText",
          text: "-1",
          x: origin.x + spread,
          y: origin.y + Math.abs(spread) * 0.12,
          delay: i * 0.13,
          life: 1.05,
          maxLife: 1.05,
        });
      }
    }

    function drawCastleHealthBar(layout) {
      const hp = Math.max(0, Math.min(MAX_CASTLE_HP, state.hp));
      const ratio = hp / MAX_CASTLE_HP;
      const segments = MAX_CASTLE_HP;
      const barW = 132;
      const barH = 12;
      const x = layout.x + layout.w * 0.5 - barW * 0.5 - 38;
      const y = Math.min(canvas.height - 24, layout.y + layout.h + 2);
      ctx.save();
      ctx.fillStyle = "rgba(18, 20, 24, .46)";
      ctx.fillRect(x - 4, y - 4, barW + 8, barH + 8);
      ctx.strokeStyle = "rgba(238, 222, 176, .42)";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - 4, y - 4, barW + 8, barH + 8);
      for (let i = 0; i < segments; i++) {
        const gap = 3;
        const segW = (barW - gap * (segments - 1)) / segments;
        const sx = x + i * (segW + gap);
        ctx.fillStyle = i < hp
          ? ratio > .5 ? "#8ee483" : ratio > .2 ? "#f1c65e" : "#ff6a3f"
          : "rgba(236, 232, 214, .14)";
        ctx.fillRect(sx, y, segW, barH);
        ctx.strokeStyle = "rgba(10, 16, 10, .55)";
        ctx.lineWidth = 1;
        ctx.strokeRect(sx + .5, y + .5, segW - 1, barH - 1);
      }
      ctx.restore();
    }

    function drawTowerDamageEffects(layout) {
      const ratio = Math.max(0, Math.min(1, state.hp / MAX_CASTLE_HP));
      if (ratio >= .5) return;
      const t = performance.now() / 1000;
      const burning = ratio <= .2;
      const intensity = burning ? 1.9 : 1.45;
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      const smokeCount = burning ? 28 : 24;
      for (let i = 0; i < smokeCount; i++) {
        const phase = (t * (burning ? .78 : .64) + i * 0.087) % 1;
        const sourceBand = burning ? 0.18 : 0.14;
        const sx = layout.x + layout.w * (0.5 + Math.sin(i * 1.73) * sourceBand);
        const sy = layout.y + layout.h * (burning ? 0.42 : 0.38) + Math.cos(i * 1.2) * 10;
        const drift = Math.sin(t * 1.8 + i * 0.9) * (10 + phase * 18);
        const smokeY = sy - phase * (burning ? 218 : 190);
        const smokeR = (13 + i % 4 * 4) * (0.68 + phase * 1.08) * intensity;
        ctx.globalAlpha = (1 - phase) * (burning ? .74 : .62);
        ctx.fillStyle = burning ? "rgba(39, 35, 35, .9)" : "rgba(91, 89, 88, .78)";
        ctx.beginPath();
        ctx.ellipse(sx + drift, smokeY, smokeR * 1.34, smokeR, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (burning) {
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(
          layout.x + layout.w * 0.42,
          layout.y + layout.h * 0.57,
          layout.w * 0.34,
          layout.h * 0.28,
          0,
          0,
          Math.PI * 2
        );
        ctx.clip();
        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < 13; i++) {
          const flame = 0.82 + Math.sin(t * 9 + i) * 0.22;
          const fx = layout.x + layout.w * (0.12 + i * 0.047);
          const fy = layout.y + layout.h * (0.67 + Math.sin(i) * 0.035);
          const flameH = 32 * flame;
          const flameW = 16 * flame;
          const grad = ctx.createRadialGradient(fx, fy, 2, fx, fy, flameH);
          grad.addColorStop(0, "rgba(255, 246, 170, .95)");
          grad.addColorStop(.28, "rgba(255, 156, 44, .86)");
          grad.addColorStop(.58, "rgba(255, 70, 24, .5)");
          grad.addColorStop(1, "rgba(255, 40, 12, 0)");
          ctx.globalAlpha = .95;
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(fx, fy - flameH);
          ctx.bezierCurveTo(fx - flameW, fy - 5 * flame, fx - flameW * .7, fy + 18 * flame, fx, fy + 22 * flame);
          ctx.bezierCurveTo(fx + flameW * .85, fy + 10 * flame, fx + flameW, fy - 8 * flame, fx, fy - flameH);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawTowerAsset() {
      const tower = getCutoutImage(icon.tower);
      if (!tower) return;
      const layout = towerLayout(tower);
      ctx.save();
      ctx.shadowColor = "rgba(0, 0, 0, .48)";
      ctx.shadowBlur = 15;
      ctx.shadowOffsetY = 9;
      ctx.drawImage(tower, layout.x, layout.y, layout.w, layout.h);
      ctx.restore();
      drawTowerDamageEffects(layout);
      drawCastleHealthBar(layout);
    }

    function boardDragonNameLayout(name, maxWidth) {
      const font = "900 11px Arial";
      ctx.font = font;
      if (ctx.measureText(name).width <= maxWidth) return { text: name, font };
      const ellipsis = "...";
      let lo = 0;
      let hi = name.length;
      while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        if (ctx.measureText(name.slice(0, mid) + ellipsis).width <= maxWidth) lo = mid;
        else hi = mid - 1;
      }
      return { text: name.slice(0, lo) + ellipsis, font };
    }

    function drawDragon(d) {
      const size = d.star === 3 ? 116 : d.star === 2 ? 104 : 92;
      const visualY = d.row === 0 ? Math.max(d.y, size / 2 + 32) : d.y;
      let drawn = { width: size, height: size };
      const rarityColor = tierColor(d.cost);
      ctx.imageSmoothingEnabled = false;
      ctx.save();
      if (state.dragging?.source === "board" && state.dragging.id === d.id) ctx.globalAlpha = .35;
      ctx.translate(d.x, visualY);
      ctx.scale(-1, 1);
      if (d.star === 3) {
        const glow = ctx.createRadialGradient(0, 0, size * 0.12, 0, 0, size * 0.64);
        glow.addColorStop(0, "rgba(255, 246, 138, .48)");
        glow.addColorStop(.52, "rgba(255, 216, 64, .2)");
        glow.addColorStop(1, "rgba(255, 216, 64, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.64, 0, Math.PI * 2);
        ctx.fill();
      }
      drawn = drawDragonImage(d, size);
      if (d.damageFlash > 0) {
        const flashAlpha = Math.min(.78, d.damageFlash / .28);
        ctx.globalCompositeOperation = "source-atop";
        ctx.fillStyle = `rgba(255, 42, 42, ${flashAlpha})`;
        ctx.fillRect(-drawn.width / 2 - 6, -drawn.height / 2 - 6, drawn.width + 12, drawn.height + 12);
        ctx.globalCompositeOperation = "source-over";
      }
      ctx.restore();
      const topIconY = Math.max(24, visualY - size / 2 - 14);
      const rankWidth = 30;
      const hpWidth = 54;
      const gap = 0.5;
      const clusterX = d.x - (rankWidth + gap + hpWidth) / 2;
      drawRankIcon(clusterX + rankWidth / 2, topIconY, d.star || 1);
      drawDragonHealthBar(d, clusterX + rankWidth + gap, topIconY - 4);
      const dragonCellLeft = cellLeft(d.col);
      const labelPad = 7;
      const labelW = CELL_W - 8;
      const labelX = dragonCellLeft + 4;
      const textX = labelX + labelPad;
      const textMaxW = labelW - labelPad * 2;
      const nameLayout = boardDragonNameLayout(displayDragonName(d), textMaxW);
      const labelH = 20;
      const labelY = (d.row + 1) * CELL_H - labelH - 4;
      ctx.save();
      ctx.fillStyle = "rgba(7, 10, 12, .78)";
      ctx.fillRect(labelX, labelY, labelW, labelH);
      ctx.strokeStyle = rarityColor;
      ctx.lineWidth = d.cost >= 4 ? 4.5 : 3.5;
      ctx.strokeRect(labelX + 2, labelY + 2, labelW - 4, labelH - 4);
      ctx.restore();
      ctx.fillStyle = "#ffe08a";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.font = nameLayout.font;
      ctx.save();
      ctx.beginPath();
      ctx.rect(textX, labelY, textMaxW, labelH);
      ctx.clip();
      ctx.fillText(nameLayout.text, labelX + labelW / 2, labelY + 15);
      ctx.restore();
      ctx.textAlign = "left";

      if (state.selected?.source === "board" && state.selected.id === d.id) {
        const pulse = 0.72 + Math.sin(performance.now() / 130) * 0.18;
        ctx.save();
        ctx.strokeStyle = `rgba(255, 224, 80, ${pulse})`;
        ctx.lineWidth = 5;
        ctx.shadowColor = "#ffe050";
        ctx.shadowBlur = 18;
        ctx.strokeRect(cellLeft(d.col) + 7, d.row * CELL_H + 7, CELL_W - 14, CELL_H - 14);
        ctx.restore();
      }

      if (isBlinkCandidate(d)) {
        const pulse = 0.45 + Math.sin(performance.now() / 85) * 0.25;
        ctx.save();
        ctx.strokeStyle = `rgba(255, 224, 80, ${pulse + 0.35})`;
        ctx.lineWidth = 5;
        ctx.shadowColor = "#ffe050";
        ctx.shadowBlur = 18;
        ctx.strokeRect(cellLeft(d.col) + 8, d.row * CELL_H + 8, CELL_W - 16, CELL_H - 16);
        ctx.restore();
      }
    }

    function drawEnemy(e) {
      const image = img(e.img);
      const size = e.size || (e.boss ? 138 : e.maxHp > 700 ? 110 : e.maxHp > 300 ? 96 : 82);
      ctx.imageSmoothingEnabled = false;
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.flying || e.ability === "flying") {
        ctx.translate(0, Math.sin(performance.now() / 130 + e.id) * 5 - 8);
      }
      if (e.burrowed > 0) {
        ctx.scale(1, 0.32);
        ctx.fillStyle = "rgba(66, 42, 25, .82)";
        ctx.beginPath();
        ctx.ellipse(0, size * 0.9, size * 0.48, size * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(173, 121, 72, .55)";
        ctx.beginPath();
        ctx.ellipse(Math.sin(performance.now() / 120) * 5, size * 0.76, size * 0.26, size * 0.08, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
      }
      if (!e.faceLeft) ctx.scale(-1, 1);
      if (e.ability === "rangedDebuff") {
        ctx.shadowColor = "#a78bfa";
        ctx.shadowBlur = 18;
      } else if (e.ability === "splitter") {
        ctx.shadowColor = "#77ff8f";
        ctx.shadowBlur = 14;
      }
      if (canDrawImage(image)) ctx.drawImage(image, -size / 2, -size / 2, size, size);
      ctx.restore();
      if (e.damageFlash > 0 && !e.wideBoss) {
        const maxFlash = 0.16;
        const flashAlpha = Math.min(.5, e.damageFlash / maxFlash);
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = `rgba(255, 70, 42, ${flashAlpha * .8})`;
        ctx.beginPath();
        ctx.ellipse(e.x, e.y, size * .42, size * .46, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      if (e.flying || e.ability === "flying") {
        ctx.fillStyle = "rgba(10, 10, 10, .26)";
        ctx.beginPath();
        ctx.ellipse(e.x, e.y + size * .42, size * .34, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (e.ability === "fast") {
        ctx.strokeStyle = "rgba(255, 230, 130, .55)";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(e.x + size * .18 + i * 8, e.y - 18 + i * 12);
          ctx.lineTo(e.x + size * .58 + i * 9, e.y - 24 + i * 10);
          ctx.stroke();
        }
      }
      if (e.ability === "burrow") {
        ctx.fillStyle = "rgba(173, 121, 72, .5)";
        ctx.beginPath();
        ctx.ellipse(e.x, e.y + size * .43, size * .36, 7, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (e.ability === "rangedDebuff") {
        ctx.strokeStyle = "rgba(167, 139, 250, .78)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y - size * .42, 10 + Math.sin(performance.now() / 140) * 2, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (e.ability === "splitter") {
        ctx.fillStyle = "rgba(107, 255, 128, .78)";
        ctx.beginPath();
        ctx.arc(e.x + size * .22, e.y - size * .32, 6 + Math.sin(performance.now() / 90) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = "#260c0c";
      const barW = e.wideBoss ? 520 : e.boss ? 96 : 72;
      const barH = e.wideBoss ? 14 : 8;
      const barY = e.wideBoss ? 18 : e.y - size * 0.58;
      ctx.fillRect(e.x - barW / 2, barY, barW, barH);
      ctx.fillStyle = e.stun > 0 ? "#ffe08a" : e.slow > 0 ? "#8ce7ff" : "#e85d4d";
      ctx.fillRect(e.x - barW / 2, barY, barW * Math.max(0, e.hp / e.maxHp), barH);
      if (e.wideBoss) {
        ctx.strokeStyle = "rgba(255,255,255,.78)";
        ctx.lineWidth = 2;
        ctx.strokeRect(e.x - barW / 2, barY, barW, barH);
        ctx.font = "900 15px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        ctx.fillStyle = "#fff6dd";
        ctx.strokeStyle = "rgba(45, 10, 10, .8)";
        ctx.lineWidth = 4;
        ctx.strokeText(e.name, e.x, barY - 4);
        ctx.fillText(e.name, e.x, barY - 4);
      }
    }

    function drawProjectile(p) {
      if (p.delay && p.delay > 0) return;
      const profile = projectileProfile(p.type);
      const color = profile.color;
      const t = performance.now() / 1000 + (p.wobble || 0);
      ctx.save();
      if (p.trail?.length) {
        ctx.lineCap = "round";
        for (let i = 1; i < p.trail.length; i++) {
          const a = p.trail[i - 1];
          const b = p.trail[i];
          const ratio = i / p.trail.length;
          ctx.globalAlpha = ratio * .55;
          ctx.strokeStyle = profile.trailColor || color;
          ctx.lineWidth = (profile.trailWidth || 14) * ratio;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
      ctx.translate(p.x, p.y);
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.shadowColor = color;
      ctx.shadowBlur = p.crit ? 24 : 14;
      if (p.projectileType === "fire") {
        const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 20);
        g.addColorStop(0, profile.core);
        g.addColorStop(.38, "#ffad35");
        g.addColorStop(.72, color);
        g.addColorStop(1, "rgba(255,68,0,0)");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(255, 242, 168, .92)";
        ctx.beginPath(); ctx.arc(-4, -2, 7, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = "rgba(255, 245, 160, .65)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-22, -8); ctx.quadraticCurveTo(-8, -18, 10, -8); ctx.stroke();
      } else if (p.projectileType === "bubble" || p.projectileType === "wave") {
        const radius = p.projectileType === "wave" ? 15 : 18;
        const swirl = t * 6;
        const g = ctx.createRadialGradient(-5, -6, 2, 0, 0, radius + 5);
        g.addColorStop(0, "rgba(255,255,255,.9)");
        g.addColorStop(.38, "rgba(114,207,255,.55)");
        g.addColorStop(1, "rgba(30,110,255,.08)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(213, 246, 255, .9)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, radius, -1.1 + Math.sin(swirl) * .2, 1.4 + Math.cos(swirl) * .2); ctx.stroke();
        ctx.beginPath(); ctx.arc(-4, 3, radius * .48, 1.1, 5.4); ctx.stroke();
      } else if (p.projectileType === "ice") {
        ctx.fillStyle = "#dff8ff";
        ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-8, -9); ctx.lineTo(-18, 0); ctx.lineTo(-8, 9); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,.9)";
        for (let i = 0; i < 4; i++) {
          const a = t * 3 + i * 1.7;
          ctx.beginPath();
          ctx.arc(Math.cos(a) * 20 - 10, Math.sin(a) * 10, 2.2, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (p.projectileType === "wind") {
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, 16, .4, 5.2); ctx.stroke();
        ctx.beginPath(); ctx.arc(-8, 2, 9, .2, 4.8); ctx.stroke();
      } else if (p.projectileType === "poison") {
        const spike = ctx.createLinearGradient(-16, 0, 18, 0);
        spike.addColorStop(0, "#245f2c");
        spike.addColorStop(.48, profile.core);
        spike.addColorStop(1, color);
        ctx.fillStyle = spike;
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.quadraticCurveTo(2, -13, -18, -5);
        ctx.quadraticCurveTo(-8, 2, -18, 10);
        ctx.quadraticCurveTo(4, 9, 20, 0);
        ctx.fill();
        ctx.strokeStyle = "#d8ffb8"; ctx.stroke();
        ctx.fillStyle = "rgba(180, 255, 88, .82)";
        ctx.beginPath(); ctx.arc(-4, -3, 4, 0, Math.PI * 2); ctx.fill();
      } else if (p.projectileType === "stone") {
        ctx.shadowColor = "#6f4528";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "rgba(49, 31, 20, .38)";
        ctx.beginPath();
        ctx.ellipse(-4, 10, 20, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        const rock = ctx.createLinearGradient(-18, -12, 18, 14);
        rock.addColorStop(0, "#f0c48a");
        rock.addColorStop(.45, "#a9784b");
        rock.addColorStop(1, "#5d3c27");
        ctx.fillStyle = rock;
        ctx.strokeStyle = "#3d291c";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-18, -4);
        ctx.lineTo(-7, -15);
        ctx.lineTo(12, -11);
        ctx.lineTo(20, 2);
        ctx.lineTo(9, 16);
        ctx.lineTo(-12, 12);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 228, 174, .55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-6, -10);
        ctx.lineTo(3, -1);
        ctx.lineTo(13, -4);
        ctx.stroke();
        ctx.fillStyle = "rgba(226, 178, 122, .75)";
        ctx.beginPath();
        ctx.arc(-16, 8, 3, 0, Math.PI * 2);
        ctx.arc(-24, 2, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.projectileType === "lightning") {
        const bolt = [
          [-40, 0],
          [-27, -12 + Math.sin(t * 18) * 3],
          [-15, 7 + Math.cos(t * 15) * 3],
          [-3, -9 + Math.sin(t * 16) * 4],
          [10, 8 + Math.cos(t * 17) * 3],
          [24, -6 + Math.sin(t * 14) * 3],
          [42, 0],
        ];
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.shadowColor = "#f9d34a";
        ctx.shadowBlur = 22;
        ctx.strokeStyle = "rgba(249, 211, 74, .5)";
        ctx.lineWidth = 13;
        ctx.beginPath();
        bolt.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
        ctx.stroke();
        ctx.strokeStyle = "#f8fbff";
        ctx.lineWidth = 6;
        ctx.beginPath();
        bolt.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
        ctx.stroke();
        ctx.strokeStyle = "#ffe66d";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-26, 13);
        ctx.lineTo(-10, 1);
        ctx.lineTo(-15, -17);
        ctx.lineTo(8, -2);
        ctx.lineTo(3, 17);
        ctx.lineTo(28, 4);
        ctx.stroke();
      } else if (p.projectileType === "metal") {
        ctx.shadowColor = "#e8f2ff";
        ctx.shadowBlur = 18;
        const metal = ctx.createLinearGradient(-20, -8, 22, 8);
        metal.addColorStop(0, "#596573");
        metal.addColorStop(.35, "#f6fbff");
        metal.addColorStop(.7, "#a8b4c4");
        metal.addColorStop(1, "#ffffff");
        ctx.fillStyle = metal;
        ctx.strokeStyle = "#516071";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(24, 0);
        ctx.lineTo(-4, -10);
        ctx.lineTo(-20, -4);
        ctx.lineTo(-11, 0);
        ctx.lineTo(-20, 4);
        ctx.lineTo(-4, 10);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,.82)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-6, -5);
        ctx.lineTo(16, 0);
        ctx.lineTo(-6, 5);
        ctx.stroke();
        ctx.strokeStyle = "rgba(210, 224, 240, .5)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-30, -6);
        ctx.lineTo(-12, -2);
        ctx.moveTo(-31, 6);
        ctx.lineTo(-12, 2);
        ctx.stroke();
      } else {
        ctx.fillRect(-14, -8, 28, 16);
      }
      ctx.restore();
    }

    function drawEnemyProjectile(p) {
      ctx.save();
      if (p.trail?.length) {
        ctx.lineCap = "round";
        for (let i = 1; i < p.trail.length; i++) {
          const a = p.trail[i - 1];
          const b = p.trail[i];
          const ratio = i / p.trail.length;
          ctx.globalAlpha = ratio * .46;
          ctx.strokeStyle = p.type === "hexBolt" ? "rgba(167, 139, 250, .72)" : "rgba(255, 92, 92, .6)";
          ctx.lineWidth = 12 * ratio;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
      ctx.translate(p.x, p.y);
      ctx.shadowColor = p.type === "hexBolt" ? "#a78bfa" : "#ff6b6b";
      ctx.shadowBlur = 18;
      if (p.type === "hexBolt") {
        const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 18);
        g.addColorStop(0, "#f5efff");
        g.addColorStop(.4, "#a78bfa");
        g.addColorStop(1, "rgba(95, 55, 180, 0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(0, 0, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#efe7ff";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 6 + i * Math.PI / 3;
          const x = Math.cos(a) * 13;
          const y = Math.sin(a) * 13;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,.75)";
        ctx.beginPath();
        ctx.moveTo(-17, 0);
        ctx.lineTo(17, 0);
        ctx.moveTo(0, -17);
        ctx.lineTo(0, 17);
        ctx.stroke();
      } else {
        ctx.fillStyle = "#ff6b6b";
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawEffects() {
      for (const fx of state.effects) {
        if (fx.delay > 0) continue;
        if (fx.type === "towerDamageText") {
          const maxLife = fx.maxLife || 1.05;
          const progress = 1 - Math.max(0, fx.life) / maxLife;
          const alpha = fx.life < .32 ? Math.max(0, fx.life / .32) : 1;
          const y = fx.y - progress * 58;
          const x = fx.x + Math.sin(progress * Math.PI) * 5;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "900 30px Arial";
          ctx.lineWidth = 5;
          ctx.strokeStyle = "rgba(70, 8, 8, .82)";
          ctx.fillStyle = "#ff5a5a";
          ctx.shadowColor = "rgba(255, 40, 40, .75)";
          ctx.shadowBlur = 12;
          ctx.strokeText(fx.text || "-1", x, y);
          ctx.fillText(fx.text || "-1", x, y);
          ctx.restore();
          continue;
        }
        if (fx.type === "bossImpact") {
          const maxLife = fx.maxLife || 0.42;
          const alpha = Math.max(0, Math.min(1, fx.life / maxLife));
          const pulse = Math.sin((1 - alpha) * Math.PI);
          const x = fx.x;
          const y = fx.y;
          const color = fx.color || elements[fx.elementType]?.color || "#ffe08a";
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = alpha;
          ctx.shadowColor = color;
          ctx.shadowBlur = fx.crit ? 18 : 10;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.ellipse(x, y, (fx.size || 5) * (1.25 + pulse), (fx.size || 5) * (0.82 + pulse * .45), 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,.85)";
          ctx.beginPath();
          ctx.arc(x - 1, y - 1, Math.max(1.6, (fx.size || 5) * .34), 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = fx.crit ? 3.5 : 2;
          ctx.globalCompositeOperation = "lighter";
          ctx.beginPath();
          ctx.arc(x, y, (fx.size || 5) * (2.4 + pulse * 1.1), 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          continue;
        }
        const alpha = Math.min(1, Math.max(0, fx.life / .38));
        const progress = 1 - alpha;
        const specialColor = {
          spawn: "#8b5fff",
          burrowDive: "#ad7948",
          burrowPop: "#e2b27a",
          rangeHex: "#a78bfa",
          enemyCast: "#a78bfa",
          hexImpact: "#a78bfa",
          enemyImpact: "#ff6b6b",
          splitter: "#74ff8d",
          fireBurst: "#ff6a2a",
          iceFreeze: "#8ce7ff",
          poisonSplash: "#71d36b",
          lightningSnap: "#f9d34a",
          waterSplash: "#43a7ff",
          windGust: "#eff6ff",
          stoneCrack: "#a9784b",
          metalSpark: "#a8b4c4",
        }[fx.type];
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = specialColor || (fx.type === "hitDragon" ? "#ff5a5a" : fx.type === "dragonDeath" ? "#ffe65a" : elements[fx.type]?.color || "#fff");
        ctx.lineWidth = fx.crit ? 5 : 3;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = fx.type === "spawn" || fx.type === "rangeHex" || fx.type === "enemyCast" || fx.type === "hexImpact" ? 18 : 8;
        if (fx.type === "enemyCast") {
          ctx.strokeStyle = "#efe7ff";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 18 + 10 * progress, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 7 + 6 * progress, 0, Math.PI * 2);
          ctx.stroke();
        } else if (fx.type === "hexImpact") {
          ctx.strokeStyle = "#efe7ff";
          ctx.lineWidth = 3;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = Math.PI / 6 + i * Math.PI / 3;
            const x = fx.x + Math.cos(a) * (28 + 14 * progress);
            const y = fx.y + Math.sin(a) * (28 + 14 * progress);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.stroke();
          ctx.strokeStyle = "rgba(167,139,250,.85)";
          ctx.beginPath();
          ctx.moveTo(fx.x - 28, fx.y);
          ctx.lineTo(fx.x + 28, fx.y);
          ctx.moveTo(fx.x, fx.y - 24);
          ctx.lineTo(fx.x, fx.y + 24);
          ctx.stroke();
        } else if (fx.type === "fireBurst") {
          const g = ctx.createRadialGradient(fx.x, fx.y, 2, fx.x, fx.y, 52 * progress);
          g.addColorStop(0, "rgba(255, 246, 176, .95)");
          g.addColorStop(.42, "rgba(255, 126, 42, .65)");
          g.addColorStop(1, "rgba(255, 60, 20, 0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 54 * progress, 0, Math.PI * 2);
          ctx.fill();
          for (let i = 0; i < 7; i++) {
            const a = i * Math.PI * 2 / 7 + progress;
            ctx.beginPath();
            ctx.moveTo(fx.x, fx.y);
            ctx.lineTo(fx.x + Math.cos(a) * 42 * progress, fx.y + Math.sin(a) * 28 * progress);
            ctx.stroke();
          }
        } else if (fx.type === "iceFreeze") {
          ctx.fillStyle = "rgba(210, 250, 255, .18)";
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 28 + 18 * progress, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#dff8ff";
          for (let i = 0; i < 6; i++) {
            const a = i * Math.PI / 3;
            ctx.beginPath();
            ctx.moveTo(fx.x, fx.y);
            ctx.lineTo(fx.x + Math.cos(a) * (34 + 18 * progress), fx.y + Math.sin(a) * (34 + 18 * progress));
            ctx.stroke();
          }
          ctx.fillStyle = "#ffffff";
          for (let i = 0; i < 8; i++) {
            const a = i * 1.9;
            ctx.beginPath();
            ctx.arc(fx.x + Math.cos(a) * 36 * progress, fx.y + Math.sin(a) * 26 * progress, 2.2, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (fx.type === "poisonSplash") {
          ctx.fillStyle = "rgba(113, 211, 107, .26)";
          ctx.beginPath();
          ctx.ellipse(fx.x, fx.y + 8, 46 * progress, 21 * progress, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(212, 255, 108, .75)";
          for (let i = 0; i < 8; i++) {
            const a = i * Math.PI * .75;
            ctx.beginPath();
            ctx.arc(fx.x + Math.cos(a) * 38 * progress, fx.y + Math.sin(a) * 22 * progress, 3 + (i % 2), 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (fx.type === "lightningSnap") {
          ctx.strokeStyle = "#f8fbff";
          ctx.lineWidth = fx.crit ? 6 : 4;
          for (let i = 0; i < 3; i++) {
            const off = (i - 1) * 11;
            ctx.beginPath();
            ctx.moveTo(fx.x - 42, fx.y + off);
            ctx.lineTo(fx.x - 12, fx.y - 14 - off * .3);
            ctx.lineTo(fx.x + 3, fx.y + 12 + off * .2);
            ctx.lineTo(fx.x + 42, fx.y - off);
            ctx.stroke();
          }
          ctx.strokeStyle = "#f9d34a";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 38 * progress, 0, Math.PI * 2);
          ctx.stroke();
        } else if (fx.type === "waterSplash") {
          ctx.strokeStyle = "#d8f3ff";
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(fx.x, fx.y, 18 + i * 10 + progress * 14, -1.9 + i * .5, 1.7 + i * .3);
            ctx.stroke();
          }
          ctx.fillStyle = "rgba(122, 212, 255, .85)";
          for (let i = 0; i < 9; i++) {
            const a = i * Math.PI * 2 / 9;
            ctx.beginPath();
            ctx.arc(fx.x + Math.cos(a) * 38 * progress, fx.y + Math.sin(a) * 25 * progress, 2.4, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (fx.type === "windGust") {
          ctx.strokeStyle = "rgba(255,255,255,.9)";
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(fx.x - i * 8, fx.y + i * 4, 18 + progress * 34 + i * 8, -.5, 4.4);
            ctx.stroke();
          }
        } else if (fx.type === "stoneCrack") {
          ctx.fillStyle = `rgba(93, 60, 39, ${0.32 * alpha})`;
          ctx.beginPath();
          ctx.ellipse(fx.x, fx.y + 16, 34 * progress, 10 * progress, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#f0c48a";
          ctx.lineWidth = 3.5;
          ctx.lineCap = "round";
          for (let i = 0; i < 6; i++) {
            const a = -Math.PI * .82 + i * Math.PI * .33;
            const length = (22 + (i % 2) * 10) * progress;
            ctx.beginPath();
            ctx.moveTo(fx.x + Math.cos(a) * 5, fx.y + 8 + Math.sin(a) * 3);
            ctx.lineTo(fx.x + Math.cos(a) * length, fx.y + 10 + Math.sin(a) * length * .45);
            ctx.stroke();
          }
          ctx.fillStyle = `rgba(226, 178, 122, ${0.85 * alpha})`;
          for (let i = 0; i < 7; i++) {
            const a = i * 1.7;
            ctx.beginPath();
            ctx.arc(fx.x + Math.cos(a) * 28 * progress, fx.y + 8 + Math.sin(a) * 14 * progress, 2 + (i % 3), 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (fx.type === "metalSpark") {
          ctx.strokeStyle = "#f6fbff";
          ctx.lineWidth = 2.5;
          ctx.shadowBlur = 16;
          for (let i = 0; i < 12; i++) {
            const a = i * Math.PI * 2 / 12;
            const long = i % 3 === 0 ? 42 : 30;
            ctx.beginPath();
            ctx.moveTo(fx.x + Math.cos(a) * 7, fx.y + Math.sin(a) * 7);
            ctx.lineTo(fx.x + Math.cos(a) * long * progress, fx.y + Math.sin(a) * long * progress);
            ctx.stroke();
          }
          ctx.strokeStyle = "#a8b4c4";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 16 + 18 * progress, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, (fx.type === "dragonDeath" ? 48 : fx.type === "splitter" ? 58 : 34) * progress, 0, Math.PI * 2);
          ctx.stroke();
          if (fx.type === "rangeHex") {
            ctx.beginPath();
            ctx.moveTo(fx.x - 24, fx.y);
            ctx.lineTo(fx.x + 24, fx.y);
            ctx.stroke();
          }
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }
    }

    function drawGameOver() {
      if (!state.gameOver) return;
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, .72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = state.gameResult === "won" ? "#65e66f" : "#ff5a5a";
      ctx.font = "900 92px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(state.gameResult === "won" ? "You Won" : "You Lost", canvas.width / 2, canvas.height / 2);
      ctx.restore();
    }

    function drawPlanningCountdown() {
      if (!planningTimerActive() || state.planningTimer > 10) return;
      const seconds = Math.ceil(state.planningTimer);
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, .34)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 112px Arial";
      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(45, 12, 12, .85)";
      ctx.fillStyle = seconds <= 3 ? "#ff3b30" : "#ffe08a";
      ctx.shadowColor = seconds <= 3 ? "#ff1f1f" : "#f3c94f";
      ctx.shadowBlur = 24;
      ctx.strokeText(seconds, canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillText(seconds, canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = "900 24px Arial";
      ctx.shadowBlur = 10;
      ctx.fillStyle = "#fff4c4";
      ctx.fillText("Next wave starts soon", canvas.width / 2, canvas.height / 2 + 62);
      ctx.restore();
    }

    function safelyDraw(layer, drawCall) {
      try {
        drawCall();
      } catch (error) {
        if (!renderWarnings.has(layer)) {
          renderWarnings.add(layer);
          console.warn(`Skipped ${layer} render after an asset error.`, error);
        }
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
        ctx.shadowBlur = 0;
      }
    }

    function draw() {
      safelyDraw("board", drawBoard);
      for (const d of state.dragons) safelyDraw("dragon", () => drawDragon(d));
      for (const e of state.enemies) safelyDraw("enemy", () => drawEnemy(e));
      for (const p of state.projectiles) safelyDraw("projectile", () => drawProjectile(p));
      for (const p of state.enemyProjectiles) safelyDraw("enemy projectile", () => drawEnemyProjectile(p));
      safelyDraw("effects", drawEffects);
      safelyDraw("planning countdown", drawPlanningCountdown);
      safelyDraw("game over", drawGameOver);
    }

    function loop(ts) {
      requestAnimationFrame(loop);
      const dt = Math.min(0.05, (ts - state.lastTs) / 1000 || 0);
      state.lastTs = ts;
      try {
        update(dt * state.gameSpeed, dt);
        draw();
        document.getElementById("hpText").textContent = state.hp;
        document.getElementById("waveText").textContent = state.wave;
        document.getElementById("waveTimerText").textContent = waveTimerText();
        document.getElementById("capText").textContent = `${state.dragons.length} / ${boardCapForLevel()}`;
      } catch (error) {
        if (!renderWarnings.has("game loop")) {
          renderWarnings.add("game loop");
          console.error("Game loop recovered from an unexpected error.", error);
        }
      }
    }

    document.addEventListener("pointermove", moveTouchPointerDrag, { passive: false });
    document.addEventListener("pointerup", ev => finishTouchPointerDrag(ev, false), { passive: false });
    document.addEventListener("pointercancel", ev => finishTouchPointerDrag(ev, true), { passive: false });
    document.addEventListener("click", ev => {
      if (isTouchUi() && performance.now() < suppressTouchClickUntil) {
        ev.preventDefault();
        ev.stopImmediatePropagation();
      }
    }, true);

    canvas.addEventListener("click", ev => {
      if (state.gameOver) return;
      if (state.suppressCanvasClick) {
        state.suppressCanvasClick = false;
        return;
      }
      if (state.dragging?.source === "board") return;
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      if (state.pendingMerge) {
        const cell = canvasPointToCell(x, y, false);
        const dragon = cell ? dragonAtCell(cell.row, cell.col) : null;
        if (!completeBoardMerge(dragon)) {
          log("Click one of the blinking dragons on the board to choose the upgraded copy.");
        }
        return;
      }
      if (isTouchUi()) {
        ev.stopPropagation();
        const selection = selectedDrag();
        if (selection) {
          const cell = canvasPointToCell(x, y, false);
          clearTouchSelection();
          if (!cell) {
            log("Tap a battlefield cell to place the selected dragon.");
            renderUi();
            return;
          }
          state.dragging = selection;
          placeUnit(selection.unit, cell.row, cell.col, selection);
          clearTouchSelection();
          renderUi();
          return;
        }
        const dragon = dragonAtPoint(x, y);
        if (dragon) {
          if (state.waveRunning) {
            showStats(dragon, ev.clientX, ev.clientY);
            log("Board dragons are locked during a wave.");
          } else {
            selectForTouch({ source: "board", id: dragon.id, unit: dragon });
          }
        } else {
          log("Tap a shop or bench dragon, then tap a battlefield cell.");
        }
        return;
      }
      log("Drag a dragon from the shop or bench onto the board to place it.");
    });

    canvas.addEventListener("mousedown", ev => {
      if (isTouchUi() || state.gameOver || state.pendingMerge || ev.button !== 0) return;
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const dragon = dragonAtPoint(x, y);
      if (!dragon) return;
      if (state.waveRunning) {
        state.suppressCanvasClick = true;
        log("Board dragons cannot be moved or sold during a wave. You can still place new dragons or merge.");
        return;
      }
      ev.preventDefault();
      state.dragging = { source: "board", id: dragon.id, unit: dragon };
      state.suppressCanvasClick = true;
      state.hoverCell = null;
      makeBoardDragGhost(dragon, ev.clientX, ev.clientY);
      document.getElementById("selectedText").textContent = displayDragonName(dragon);
      log(`Drag ${displayDragonName(dragon)} to the bench, another board cell, or Sell Dragon.`);
    });

    document.addEventListener("mousemove", ev => {
      if (state.dragging?.source !== "board") return;
      moveBoardDragGhost(ev.clientX, ev.clientY);
      setSellZoneHover(isPointerOverSellZone(ev.clientX, ev.clientY));
      setBenchHover(benchIndexFromPoint(ev.clientX, ev.clientY));
    });

    document.addEventListener("mouseup", ev => {
      if (state.dragging?.source !== "board") return;
      const drag = state.dragging;
      const benchIndex = benchIndexFromPoint(ev.clientX, ev.clientY);
      if (isPointerOverSellZone(ev.clientX, ev.clientY)) {
        sellUnit(drag.unit, drag);
      } else if (benchIndex >= 0) {
        moveBoardDragonToBench(drag.unit, benchIndex);
      } else if (!state.waveRunning) {
        const rect = canvas.getBoundingClientRect();
        const isOverCanvas = ev.clientX >= rect.left && ev.clientX <= rect.right && ev.clientY >= rect.top && ev.clientY <= rect.bottom;
        if (isOverCanvas) {
          const x = (ev.clientX - rect.left) / rect.width * canvas.width;
          const y = (ev.clientY - rect.top) / rect.height * canvas.height;
          const cell = canvasPointToCell(x, y, false);
          if (cell) {
            moveBoardDragon(drag.unit, cell.row, cell.col);
          } else {
            log(`${displayDragonName(drag.unit)} returned to the board.`);
            state.dragging = null;
            state.hoverCell = null;
            clearDragGhost();
            renderUi();
          }
        } else {
          log(`${displayDragonName(drag.unit)} returned to the board.`);
          state.dragging = null;
          state.hoverCell = null;
          clearDragGhost();
          renderUi();
        }
      } else {
        log(`${displayDragonName(drag.unit)} returned to the board. Board is locked while a wave is running.`);
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
      }
    });

    canvas.addEventListener("dragover", ev => {
      if (state.gameOver) return;
      ev.preventDefault();
      ev.dataTransfer.dropEffect = state.dragging?.source === "board" ? "none" : state.dragging?.source === "bench" ? "move" : "copy";
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const cell = canvasPointToCell(x, y, false);
      state.hoverCell = cell && !isTowerBlockedCell(cell.row, cell.col) ? cell : null;
    });

    canvas.addEventListener("dragleave", () => {
      state.hoverCell = null;
    });

    canvas.addEventListener("drop", ev => {
      if (state.gameOver) return;
      ev.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const drag = draggedUnitFromEvent(ev);
      const cell = canvasPointToCell(x, y, false);
      if (drag?.source === "board") {
        log("Board dragons can only be dropped into Sell Dragon.");
        state.dragging = null;
        clearDragGhost();
        state.hoverCell = null;
        return;
      }
      if (!cell) {
        log("Drop dragons inside the battlefield grid.");
      } else if (isTowerBlockedCell(cell.row, cell.col)) {
        log("This tower area is reserved and cannot hold dragons.");
      } else {
        placeUnit(drag?.unit, cell.row, cell.col, drag);
      }
      state.hoverCell = null;
    });

    canvas.addEventListener("contextmenu", ev => {
      ev.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const dragon = dragonAtPoint(x, y);
      if (dragon) {
        showStats(dragon, ev.clientX, ev.clientY);
      } else {
        log("Right-click directly on a dragon to inspect its base stats.");
      }
    });

    document.addEventListener("click", () => {
      document.getElementById("statPopover").style.display = "none";
    });
    document.getElementById("statPopover").addEventListener("click", ev => ev.stopPropagation());
    document.getElementById("statPopover").addEventListener("wheel", ev => ev.stopPropagation(), { passive: true });

    window.addEventListener("resize", () => requestAnimationFrame(fitCanvasToScreen));
    window.visualViewport?.addEventListener("resize", () => requestAnimationFrame(fitCanvasToScreen));
    screen.orientation?.addEventListener?.("change", () => requestAnimationFrame(fitCanvasToScreen));
    coarsePointer.addEventListener?.("change", () => renderUi());

    rollShop(true);
    renderUi();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
