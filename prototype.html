      if (!dragGhost || state.dragging?.source !== "board") return;
      dragGhost.style.left = `${x - 64}px`;
      dragGhost.style.top = `${y - 64}px`;
    }

    function isPointerOverSellZone(x, y) {
      const sellZone = document.getElementById("sellZone");
      if (!sellZone) return false;
      const rect = sellZone.getBoundingClientRect();
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function setSellZoneHover(active) {
      const sellZone = document.getElementById("sellZone");
      if (sellZone) sellZone.classList.toggle("drag-over", !!active);
    }

    function clearDragGhost() {
      if (dragGhost) {
        dragGhost.remove();
        dragGhost = null;
      }
      document.querySelectorAll(".card.dragging").forEach(card => card.classList.remove("dragging"));
      document.body.classList.remove("sell-drag");
      setSellZoneHover(false);
    }

    function img(path) {
      if (!images.has(path)) {
        const image = new Image();
        image.src = path;
        images.set(path, image);
      }
      return images.get(path);
    }

    function rand(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function maxedDragonNames() {
      return new Set(ownedSlots()
        .filter(slot => (slot.unit.star || 1) >= 3)
        .map(slot => slot.unit.name));
    }

    function shopPool() {
      const maxed = maxedDragonNames();
      const available = dragonPool.filter(unit => !maxed.has(unit.name));
      return available.length ? available : dragonPool;
    }

    function xpNeededForCurrentLevel() {
      return xpToNextLevel[state.keeperLevel] || 0;
    }

    function boardCapForLevel(level = state.keeperLevel) {
      return keeperBoardCaps[level] || MAX_BOARD;
    }

    function dropRatesForLevel(level = state.keeperLevel) {
      return keeperDropRates.find(row => row.level === level)?.rates || keeperDropRates[keeperDropRates.length - 1].rates;
    }

    function rollCostForLevel(level = state.keeperLevel) {
      const rates = dropRatesForLevel(level);
      let roll = Math.random() * 100;
      for (let i = 0; i < rates.length; i++) {
        roll -= rates[i];
        if (roll <= 0) return i + 1;
      }
      return rates.length;
    }

    function addKeeperXp(amount) {
      if (state.keeperLevel >= MAX_KEEPER_LEVEL) {
        state.keeperXp = 0;
        return 0;
      }
      let levelsGained = 0;
      state.keeperXp += amount;
      while (state.keeperLevel < MAX_KEEPER_LEVEL && state.keeperXp >= xpNeededForCurrentLevel()) {
        state.keeperXp -= xpNeededForCurrentLevel();
        state.keeperLevel += 1;
        levelsGained += 1;
        log(`Keeper reached Level ${state.keeperLevel}. Shop odds improved.`);
      }
      if (state.keeperLevel >= MAX_KEEPER_LEVEL) state.keeperXp = 0;
      return levelsGained;
    }

    function buyKeeperXp() {
      if (state.keeperLevel >= MAX_KEEPER_LEVEL) {
        log("Keeper is already max level.");
        return;
      }
      if (!spendGold(BUY_XP_COST, `Need ${BUY_XP_COST} Gold to buy XP.`)) {
        renderUi();
        return;
      }
      addKeeperXp(BUY_XP_AMOUNT);
      renderUi();
    }

    function planningTimerActive() {
      return state.wave > 1 && !state.waveRunning && !state.gameOver && state.planningTimer > 0;
    }

    function waveTimerText() {
      return planningTimerActive() ? `${Math.ceil(state.planningTimer)}s` : "";
    }

    function rollShopDragon() {
      const available = shopPool();
      const targetCost = rollCostForLevel();
      const costPool = available.filter(unit => unit.cost === targetCost);
      return rand(costPool.length ? costPool : available);
    }

    function spendGold(amount, failMessage = "Not enough Gold.") {
      if (CHEAT_MODE) return true;
      if (state.gold < amount) {
        log(failMessage);
        return false;
      }
      state.gold -= amount;
      return true;
    }

    function spendForShopUnit(source, unit) {
      if (source?.source !== "shop") return true;
      if (!spendGold(unit.cost, `Need ${unit.cost} Gold to buy ${unit.name}.`)) return false;
      state.shop[source.index] = null;
      return true;
    }

    function waveEnemyCount(wave = state.wave) {
      if (wave >= 20) return ROWS;
      return Math.min(50, 11 + Math.floor(wave * 2.15));
    }

    function waveClearReward(wave = state.wave) {
      if (wave >= 20) return 40;
      return 5 + Math.floor(wave * 1.5);
    }

    function availableEnemyTypes(wave = state.wave) {
      const pool = enemyTypes.filter(type => type.unlock <= wave);
      return pool.length ? pool : enemyTypes.slice(0, 2);
    }

    function completeRun(result) {
      state.waveRunning = false;
      state.planningTimer = 0;
      state.gameOver = true;
      state.gameResult = result;
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(result === "won" ? "You Won" : "You Lost");
      renderUi();
    }

    function finishWave() {
      const reward = waveClearReward();
      state.gold += reward;
      const levelsGained = addKeeperXp(FREE_WAVE_XP);
      if (state.wave >= 20) {
        completeRun("won");
        return;
      }
      state.wave += 1;
      state.waveRunning = false;
      state.planningTimer = state.wave > 1 ? PLANNING_TIME : 0;
      state.enemiesSpawned = 0;
      state.enemiesToSpawn = 0;
      state.waveReward = 0;
      if (!state.shopLocked) {
        rollShop(true);
        log(`Wave ${state.wave - 1} cleared: +${reward} Gold, +${FREE_WAVE_XP} XP${levelsGained ? `, Keeper Lv.${state.keeperLevel}` : ""}. Shop refreshed for free.`);
      } else {
        renderUi();
        log(`Wave ${state.wave - 1} cleared: +${reward} Gold, +${FREE_WAVE_XP} XP${levelsGained ? `, Keeper Lv.${state.keeperLevel}` : ""}. Shop stayed locked.`);
      }
    }

    function startWave(auto = false) {
      if (state.gameOver) return;
      if (state.waveRunning) {
        log("This wave is already running.");
        return;
      }
      state.waveRunning = true;
      state.planningTimer = 0;
      state.spawnTimer = 0;
      state.enemiesSpawned = 0;
      state.enemiesToSpawn = waveEnemyCount();
      state.waveReward = waveClearReward();
      log(state.wave >= 20
        ? "Final wave started. Five bosses are attacking every lane."
        : `${auto ? "Planning time ended. " : ""}Wave ${state.wave} started: ${state.enemiesToSpawn} monsters incoming.`);
      renderUi();
    }

    function resetGame() {
      state.shop = [];
      state.shopLocked = false;
      state.selected = null;
      state.dragging = null;
      state.suppressCanvasClick = false;
      state.hoverCell = null;
      state.pendingMerge = null;
      state.bench = Array(10).fill(null);
      state.dragons = [];
      state.enemies = [];
      state.projectiles = [];
      state.effects = [];
      state.hp = 5;
      state.gold = CHEAT_MODE ? Infinity : STARTING_GOLD;
      state.keeperLevel = CHEAT_MODE ? MAX_KEEPER_LEVEL : 1;
      state.keeperXp = 0;
      state.wave = 1;
      state.nextId = 1;
      state.spawnTimer = 0;
      state.enemiesSpawned = 0;
      state.enemiesToSpawn = 0;
      state.waveReward = 0;
      state.planningTimer = 0;
      state.gameSpeed = 1;
      state.waveRunning = false;
      state.gameOver = false;
      state.gameResult = null;
      clearDragGhost();
      rollShop(true);
      renderUi();
    }

    function removeMaxedDragonsFromShop() {
      const maxed = maxedDragonNames();
      if (!maxed.size) return;
      state.shop = state.shop.map(unit => unit && maxed.has(unit.name) ? null : unit);
    }

    function makeOwnedUnit(template) {
      return {
        ...template,
        star: template.star || 1,
        ownedId: state.nextId++,
      };
    }

    function rollShop(free = false) {
      if (!free && !spendGold(REROLL_COST, `Need ${REROLL_COST} Gold to reroll.`)) {
        renderUi();
        return;
      }
      state.shop = Array.from({ length: 5 }, () => rollShopDragon());
      state.selected = null;
      renderUi();
      log(free ? "Starting shop is ready." : `Shop rerolled for ${REROLL_COST} Gold.`);
    }

    function statsFor(unit) {
      const base = baseStats[unit.cost];
      const starHp = unit.star === 3 ? 3.2 : unit.star === 2 ? 1.8 : 1;
      const starDamage = unit.star === 3 ? 3.0 : unit.star === 2 ? 1.7 : 1;
      const starAttackSpeed = unit.star === 3 ? 1.5 : unit.star === 2 ? 1.25 : 1;
      return {
        damage: Math.round(base.damage * starDamage),
        attackSpeed: +(base.attackSpeed * starAttackSpeed).toFixed(2),
        hp: Math.round(base.hp * starHp),
      };
    }

    function syncDragonHp(unit, keepRatio = true) {
      const nextMax = statsFor(unit).hp;
      const ratio = keepRatio && unit.maxHp ? Math.max(0, unit.hp || unit.maxHp) / unit.maxHp : 1;
      unit.maxHp = nextMax;
      unit.hp = Math.max(1, Math.round(nextMax * Math.min(1, ratio)));
    }

    function ownedSlots() {
      return [
        ...state.dragons.map((unit, index) => ({ place: "board", index, unit })),
        ...state.bench.map((unit, index) => unit ? { place: "bench", index, unit } : null).filter(Boolean),
      ];
    }

    function removeOwnedSlot(slot) {
      if (slot.place === "bench") {
        state.bench[slot.index] = null;
        return;
      }
      state.dragons = state.dragons.filter(d => d.id !== slot.unit.id);
    }

    function promoteSlot(slot) {
      const unit = slot.unit;
      unit.star = Math.min(3, (unit.star || 1) + 1);
      if (slot.place === "board") syncDragonHp(unit, false);
      return unit;
    }

    function boardMergeCandidates(unit) {
      if (!unit || (unit.star || 1) >= 3) return [];
      return state.dragons.filter(d => d.name === unit.name && (d.star || 1) === (unit.star || 1));
    }

    function matchingOwnedMergeSlots(unit) {
      if (!unit || (unit.star || 1) >= 3) return [];
      return ownedSlots().filter(slot => slot.unit.name === unit.name && (slot.unit.star || 1) === (unit.star || 1));
    }

    function isShopMergeReady(unit) {
      return !!shopMergeInfo(unit);
    }

    function shopMergeInfo(unit) {
      if (!unit || (unit.star || 1) >= 3 || matchingOwnedMergeSlots(unit).length < 2) return null;
      const targetStar = Math.min(3, (unit.star || 1) + 1);
      const targetSlots = ownedSlots().filter(slot => slot.unit.name === unit.name && (slot.unit.star || 1) === targetStar);
      const finalStar = targetStar < 3 && targetSlots.length >= 2 ? targetStar + 1 : targetStar;
      return { targetStar, finalStar };
    }

    function isOwnedMergeReadyBlink(unit) {
      if (!unit) return false;
      return state.shop.some(shopUnit => {
        const info = shopMergeInfo(shopUnit);
        if (!info || shopUnit.name !== unit.name) return false;
        const unitStar = unit.star || 1;
        const incomingStar = shopUnit.star || 1;
        return unitStar === incomingStar || (info.finalStar === 3 && unitStar === info.targetStar);
      });
    }

    function isPendingCandidate(unit) {
      return !!state.pendingMerge?.candidateIds.includes(unit.id);
    }

    function isBlinkCandidate(unit) {
      if (isPendingCandidate(unit)) return true;
      if (isOwnedMergeReadyBlink(unit)) return true;
      const draggingUnit = state.dragging?.unit;
      if (!draggingUnit) return false;
      const candidates = boardMergeCandidates(draggingUnit);
      return candidates.length >= 2 && candidates.some(d => d.id === unit.id);
    }

    function completeBoardMerge(keepDragon) {
      const pending = state.pendingMerge;
      if (!pending || !keepDragon || !pending.candidateIds.includes(keepDragon.id)) return false;
      const consumedBoard = pending.candidateIds.find(id => id !== keepDragon.id);
      state.dragons = state.dragons.filter(d => d.id !== consumedBoard);
      keepDragon.star = Math.min(3, (keepDragon.star || 1) + 1);
      syncDragonHp(keepDragon, false);
      state.pendingMerge = null;
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${keepDragon.name} merged to ${keepDragon.star}-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function startBoardMergeChoice(unit, source) {
      const ownedUnit = source?.source === "shop" ? makeOwnedUnit(unit) : unit;
      const candidates = boardMergeCandidates(ownedUnit);
      if (candidates.length < 2) return false;
      if (!spendForShopUnit(source, unit)) return true;
      if (source?.source === "bench") state.bench[source.index] = null;
      state.pendingMerge = {
        unit: ownedUnit,
        candidateIds: candidates.slice(0, 2).map(d => d.id),
      };
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`Choose a blinking ${ownedUnit.name} on the board to merge to the next star.`);
      renderUi();
      return true;
    }

    function maybeMergeByDroppingOnBoard(unit, source, row, col) {
      const candidates = boardMergeCandidates(unit);
      if (candidates.length < 2) return false;
      const target = dragonAtCell(row, col);
      if (!target || !candidates.some(d => d.id === target.id)) {
        log(`Drop ${unit.name} onto one of the blinking board copies to choose the upgraded dragon.`);
        return true;
      }
      if (!spendForShopUnit(source, unit)) return true;
      if (source?.source === "bench") state.bench[source.index] = null;
      const consumedBoard = candidates.find(d => d.id !== target.id);
      state.dragons = state.dragons.filter(d => d.id !== consumedBoard.id);
      target.star = Math.min(3, (target.star || 1) + 1);
      syncDragonHp(target, false);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${target.name} merged to ${target.star}-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function tryAutoMergeIncoming(unit, source, targetDragon = null) {
      const slots = matchingOwnedMergeSlots(unit);
      const sourceAlreadyOwned = source?.source === "bench" || source?.source === "board";
      if (slots.length < (sourceAlreadyOwned ? 3 : 2)) return false;

      const boardSlots = slots.filter(slot => slot.place === "board");
      if (!targetDragon && boardSlots.length >= 2) return false;

      let keep = null;
      if (targetDragon) {
        keep = slots.find(slot => slot.place === "board" && slot.unit.id === targetDragon.id);
      }
      keep = keep ||
        (boardSlots.length === 1 ? boardSlots[0] : null) ||
        slots.filter(slot => slot.place === "bench").sort((a, b) => a.index - b.index)[0] ||
        boardSlots[0];

      if (!keep) return false;
      if (!spendForShopUnit(source, unit)) {
        renderUi();
        return true;
      }

      const consumed = slots.filter(slot => slot !== keep).slice(0, 2);
      for (const slot of consumed) removeOwnedSlot(slot);
      const promoted = promoteSlot(keep);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      log(`${promoted.name} merged to ${promoted.star}-star.`);
      removeMaxedDragonsFromShop();
      renderUi();
      return true;
    }

    function autoMerge() {
      const messages = [];
      let merged = true;
      while (merged) {
        merged = false;
        const groups = new Map();
        for (const slot of ownedSlots()) {
          const star = slot.unit.star || 1;
          if (star >= 3) continue;
          const key = `${slot.unit.name}|${star}`;
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(slot);
        }

        for (const slots of groups.values()) {
          if (slots.length < 3) continue;
          const boardSlots = slots.filter(slot => slot.place === "board");
          if (boardSlots.length >= 2) continue;
          const keep =
            slots.find(slot => slot.place === "board") ||
            slots.filter(slot => slot.place === "bench").sort((a, b) => a.index - b.index)[0];
          const consumed = slots.filter(slot => slot !== keep).slice(0, 2);
          for (const slot of consumed) removeOwnedSlot(slot);
          const promoted = promoteSlot(keep);
          messages.push(`${promoted.name} merged to ${promoted.star}-star.`);
          merged = true;
          break;
        }
      }
      if (messages.length) {
        removeMaxedDragonsFromShop();
        log(messages[messages.length - 1]);
      }
      return messages.length > 0;
    }

    function traitStacks() {
      const stacks = {};
      for (const key of Object.keys(elements)) stacks[key] = 0;
      for (const d of state.dragons) {
        for (const e of d.elements) stacks[e] += 1;
      }
      return stacks;
    }

    function activeTier(count) {
      if (count >= 8) return 8;
      if (count >= 6) return 6;
      if (count >= 4) return 4;
      if (count >= 2) return 2;
      return 0;
    }

    function traitBonuses() {
      const stacks = traitStacks();
      const tier = Object.fromEntries(Object.entries(stacks).map(([k, v]) => [k, activeTier(v)]));
      return {
        stacks,
        tier,
        damageMult: tier.Plant === 8 ? 1.70 : tier.Plant === 6 ? 1.45 : tier.Plant === 4 ? 1.25 : tier.Plant === 2 ? 1.10 : 1,
        attackSpeedMult: tier.Wind === 8 ? 1.65 : tier.Wind === 6 ? 1.45 : tier.Wind === 4 ? 1.25 : tier.Wind === 2 ? 1.12 : 1,
        critChance: tier.Metal === 8 ? 0.55 : tier.Metal === 6 ? 0.38 : tier.Metal === 4 ? 0.22 : tier.Metal === 2 ? 0.10 : 0,
      };
    }

    function renderUi() {
      document.getElementById("waveText").textContent = state.wave;
      document.getElementById("waveTimerText").textContent = waveTimerText();
      document.getElementById("hpText").textContent = state.hp;
      document.getElementById("goldText").textContent = CHEAT_MODE ? "∞" : state.gold;
      const xpNeed = xpNeededForCurrentLevel();
      document.getElementById("levelText").textContent = state.keeperLevel >= MAX_KEEPER_LEVEL
        ? `Lv. ${state.keeperLevel} MAX`
        : `Lv. ${state.keeperLevel} ${state.keeperXp}/${xpNeed}`;
      document.getElementById("capText").textContent = `${state.dragons.length} / ${boardCapForLevel()}`;
      document.getElementById("selectedText").textContent = state.pendingMerge ? "Choose merge" : state.dragging?.unit ? state.dragging.unit.name : "Shop to board";

      const stacks = traitStacks();
      const activeTraits = Object.entries(elements)
        .map(([name, data]) => ({ name, data, count: stacks[name] || 0, tier: activeTier(stacks[name] || 0) }))
        .filter(item => item.count > 0);
      document.getElementById("traitPanel").innerHTML = activeTraits.length ? activeTraits.map(({ name, data, count, tier }) => {
        return `<div class="trait ${tier > 0 ? "active" : ""}" data-trait="${name}">
          <img src="${data.icon}" alt="" />
          <span>${name}</span>
          <div class="trait-stacks">
            ${[2, 4, 6, 8].map(mark => `<span class="trait-stack ${tier === mark ? "active" : ""}">${mark}</span>`).join("")}
          </div>
        </div>`;
      }).join("") : `<div class="trait-empty">No active traits yet.</div>`;

      document.querySelectorAll("[data-trait]").forEach(row => {
        row.addEventListener("click", ev => {
          ev.stopPropagation();
          showTraitNote(row.dataset.trait);
        });
        row.addEventListener("contextmenu", ev => {
          ev.preventDefault();
          ev.stopPropagation();
          showTraitNote(row.dataset.trait, ev.clientX, ev.clientY);
        });
      });

      document.getElementById("dropRatePanel").innerHTML = `
        <div class="drop-rate-row header">
          <span>Lv</span>
          ${[1, 2, 3, 4, 5].map(cost => `<span class="drop-tier-${cost}">${goldCostHtml(cost)}</span>`).join("")}
        </div>
        ${keeperDropRates.map(row => `<div class="drop-rate-row ${row.level === state.keeperLevel ? "active" : ""}">
          <span>Lv.${row.level}</span>
          ${row.rates.map((rate, index) => `<span class="drop-tier-${index + 1}">${rate}%</span>`).join("")}
        </div>`).join("")}
      `;

      document.getElementById("shopRow").innerHTML = state.shop.map((d, i) => {
        if (!d) {
          return `<div class="card empty" data-shop-empty="${i}"></div>`;
        }
        const unaffordable = !CHEAT_MODE && state.gold < d.cost;
        const mergeInfo = shopMergeInfo(d);
        const mergeReady = !!mergeInfo;
        const mergeStars = mergeReady ? Array.from({ length: mergeInfo.finalStar }, () => "<span></span>").join("") : "";
        const mergeClass = mergeInfo?.finalStar === 3 ? "gold" : "silver";
        return `<div class="card ${tierClass(d.cost)} ${unaffordable ? "unaffordable" : ""} ${mergeReady ? "merge-ready" : ""}" data-shop="${i}" draggable="true">
          <div class="card-title">${d.name}</div>
          <div class="elements">${d.elements.map(e => `<span class="element-tag" style="color:${elements[e].color}"><img class="element-dot" src="${elements[e].icon}" title="${e}" alt="" />${e}</span>`).join("")}</div>
          <img class="dragon-img" src="${d.baby}" alt="" />
          <div class="cost"><img class="icon" src="${icon.gold}" alt="" /> ${d.cost}</div>
          ${mergeReady ? `<div class="merge-star-hint ${mergeClass}" title="Merge ready: ${mergeInfo.finalStar}-star">${mergeStars}</div>` : ""}
        </div>`;
      }).join("");

      document.querySelectorAll("[data-shop]").forEach(card => {
        card.addEventListener("click", () => {
          if (state.gameOver) return;
          const index = Number(card.dataset.shop);
          const unit = state.shop[index];
          if (!unit) return;
          buyToBench(index);
        });
        card.addEventListener("dragstart", ev => {
          if (state.gameOver) {
            ev.preventDefault();
            return;
          }
          const index = Number(card.dataset.shop);
          const unit = state.shop[index];
          if (!unit) return;
          if (!CHEAT_MODE && state.gold < unit.cost) {
            ev.preventDefault();
            log(`Need ${unit.cost} Gold to buy ${unit.name}.`);
            renderUi();
            return;
          }
          state.dragging = { source: "shop", index, unit };
          ev.dataTransfer.setData("text/plain", JSON.stringify({ source: "shop", index }));
          ev.dataTransfer.effectAllowed = "copy";
          ev.dataTransfer.setDragImage(makeDragGhost(unit), 64, 64);
          card.classList.add("dragging");
          document.getElementById("selectedText").textContent = unit.name;
        });
        card.addEventListener("dragend", () => {
          state.dragging = null;
          clearDragGhost();
          renderUi();
        });
        card.addEventListener("contextmenu", ev => {
          ev.preventDefault();
          const unit = state.shop[Number(card.dataset.shop)];
          if (unit) showStats(unit, ev.clientX, ev.clientY, "Shop unit");
        });
      });
      const rerollBtn = document.getElementById("rerollBtn");
      rerollBtn.innerHTML = `Reroll ${goldCostHtml(REROLL_COST)}`;
      rerollBtn.disabled = state.gameOver || (!CHEAT_MODE && state.gold < REROLL_COST);
      rerollBtn.onclick = () => rollShop();
      const lockShopBtn = document.getElementById("lockShopBtn");
      lockShopBtn.disabled = state.gameOver;
      lockShopBtn.innerHTML = `<img src="${state.shopLocked ? icon.lock : icon.unlock}" alt="" /><span>${state.shopLocked ? "Lock" : "Unlock"}</span>`;
      lockShopBtn.onclick = () => {
        if (state.gameOver) return;
        state.shopLocked = !state.shopLocked;
        log(state.shopLocked ? "Shop locked. It will not refresh after the next wave." : "Shop unlocked. It will refresh after each wave.");
        renderUi();
      };
      const buyXpBtn = document.getElementById("buyXpBtn");
      buyXpBtn.innerHTML = state.keeperLevel >= MAX_KEEPER_LEVEL ? "XP MAX" : `Buy XP ${goldCostHtml(BUY_XP_COST)}`;
      buyXpBtn.disabled = state.gameOver || state.keeperLevel >= MAX_KEEPER_LEVEL || (!CHEAT_MODE && state.gold < BUY_XP_COST);
      buyXpBtn.onclick = buyKeeperXp;
      const spawnBtn = document.getElementById("spawnBtn");
      spawnBtn.textContent = state.waveRunning ? "Wave Running" : state.wave >= 20 ? "Start Boss" : "Start Wave";
      spawnBtn.disabled = state.gameOver || state.waveRunning;
      spawnBtn.onclick = () => startWave(false);
      const speedBtn = document.getElementById("speedBtn");
      speedBtn.disabled = state.gameOver;
      speedBtn.innerHTML = `<img src="${icon.doubleArrow}" alt="" /> ${state.gameSpeed > 1 ? "Speed 2x" : "Speed Up"}`;
      speedBtn.onclick = () => {
        if (state.gameOver) return;
        state.gameSpeed = state.gameSpeed > 1 ? 1 : 2;
        renderUi();
      };
      const playAgainBtn = document.getElementById("playAgainBtn");
      playAgainBtn.style.display = state.gameOver ? "block" : "none";
      playAgainBtn.onclick = resetGame;

      const bench = document.getElementById("bench");
      bench.innerHTML = state.bench.map((d, i) => {
        return `<div class="bench-slot ${d ? `filled ${tierClass(d.cost)} ${isOwnedMergeReadyBlink(d) ? "merge-ready" : ""}` : ""}" data-bench="${i}" ${d ? 'draggable="true"' : ""}>
          ${d ? `<img src="${assetForUnit(d)}" alt="" title="${d.name}" /><div class="bench-name" title="${d.name}">${rankIconHtml(d.star)}<span>${d.name}</span></div>` : ""}
        </div>`;
      }).join("");

      document.querySelectorAll("[data-bench]").forEach(slot => {
        slot.addEventListener("dragover", ev => {
          ev.preventDefault();
          slot.classList.add("drag-over");
          ev.dataTransfer.dropEffect = state.dragging?.source === "bench" ? "move" : "copy";
        });
        slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
        slot.addEventListener("drop", ev => {
          ev.preventDefault();
          slot.classList.remove("drag-over");
          const index = Number(slot.dataset.bench);
          dropToBench(index);
        });
        slot.addEventListener("dragstart", ev => {
          const index = Number(slot.dataset.bench);
          const unit = state.bench[index];
          if (!unit) return;
          state.dragging = { source: "bench", index, unit };
          document.body.classList.add("sell-drag");
          ev.dataTransfer.setData("text/plain", JSON.stringify({ source: "bench", index }));
          ev.dataTransfer.effectAllowed = "move";
          ev.dataTransfer.setDragImage(makeDragGhost(unit), 64, 64);
          document.getElementById("selectedText").textContent = unit.name;
        });
        slot.addEventListener("dragend", () => {
          state.dragging = null;
          clearDragGhost();
          renderUi();
        });
        slot.addEventListener("contextmenu", ev => {
          const index = Number(slot.dataset.bench);
          const unit = state.bench[index];
          if (!unit) return;
          ev.preventDefault();
          showStats(unit, ev.clientX, ev.clientY, "Bench unit");
        });
      });

      const sellZone = document.getElementById("sellZone");
      sellZone.ondragover = ev => {
        if (!state.dragging || (state.dragging.source !== "bench" && state.dragging.source !== "board")) return;
        ev.preventDefault();
        sellZone.classList.add("drag-over");
        ev.dataTransfer.dropEffect = "move";
      };
      sellZone.ondragleave = () => sellZone.classList.remove("drag-over");
      sellZone.ondrop = ev => {
        ev.preventDefault();
        sellZone.classList.remove("drag-over");
        sellDraggedDragon();
      };
      requestAnimationFrame(fitCanvasToScreen);
    }

    function log(text) {
      document.getElementById("logText").textContent = text;
    }

    function showStats(unit, x, y, label = "Dragon") {
      const popover = document.getElementById("statPopover");
      const s = statsFor(unit);
      const nextAttack = 1 / s.attackSpeed;
      popover.innerHTML = `
        <h3>${unit.name} <span style="color:#b8caa7">(${label})</span></h3>
        <div class="stat-line"><img src="${icon.damage}" alt="" /> Damage <strong>${s.damage}</strong></div>
        <div class="stat-line"><img src="${icon.attackSpeed}" alt="" /> Next Attack <strong>${nextAttack.toFixed(2)}s</strong></div>
        <div class="stat-line"><img src="${icon.hp}" alt="" /> HP <strong>${s.hp}</strong></div>
        <div class="stat-line"><img src="${icon.gold}" alt="" /> Cost <strong>${unit.cost}</strong></div>
        <div class="stat-line"><span class="stat-elements">${unit.elements.map(name => `<img src="${elements[name].icon}" alt="${name}" title="${name}" />`).join("")}</span></div>
      `;
      popover.style.left = `${Math.min(window.innerWidth - 250, x + 12)}px`;
      popover.style.top = `${Math.min(window.innerHeight - 190, y + 12)}px`;
      popover.style.width = "";
      popover.style.maxHeight = "";
      popover.style.overflowY = "";
      popover.style.display = "block";
      clearTimeout(showStats.hideTimer);
      showStats.hideTimer = setTimeout(() => popover.style.display = "none", 3600);
    }

    function traitRosterHtml(name) {
      const roster = dragonPool
        .filter(unit => unit.elements.includes(name))
        .sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name));
      const boardNames = new Set(state.dragons.map(unit => unit.name));
      return `<div class="trait-roster">
        <h4>Dragons with this trait</h4>
        <div class="trait-roster-list">
          ${roster.map(unit => `<div class="trait-dragon-row ${boardNames.has(unit.name) ? "" : "inactive"}">
            <img src="${unit.baby}" alt="" />
            <span class="trait-dragon-name">${goldCostHtml(unit.cost)}<span class="name-text">${unit.name}</span></span>
            <span class="trait-dragon-elements">${unit.elements.map(e => `<img src="${elements[e].icon}" alt="${e}" title="${e}" />`).join("")}</span>
          </div>`).join("")}
        </div>
      </div>`;
    }

    function positionTraitPopover(popover) {
      const traitPanel = document.getElementById("traitPanel");
      const panelRect = traitPanel.closest(".panel").getBoundingClientRect();
      const top = Math.max(8, panelRect.top);
      const preferredLeft = panelRect.right + 10;
      const width = Math.min(380, window.innerWidth - 24);
      const left = preferredLeft + width <= window.innerWidth - 8
        ? preferredLeft
        : Math.max(8, panelRect.left);
      popover.style.width = `${width}px`;
      popover.style.left = `${left}px`;
      popover.style.top = `${top}px`;
      popover.style.maxHeight = "";
      popover.style.overflowY = "";
    }

    function positionTraitPopoverAtPointer(popover, x, y) {
      const width = Math.min(380, window.innerWidth - 24);
      popover.style.width = `${width}px`;
      popover.style.left = "-9999px";
      popover.style.top = "-9999px";
      popover.style.display = "block";
      const height = popover.offsetHeight;
      const left = Math.min(window.innerWidth - width - 8, x + 12);
      const top = Math.max(8, Math.min(window.innerHeight - height - 8, y - height / 2));
      popover.style.left = `${Math.max(8, left)}px`;
      popover.style.top = `${top}px`;
      popover.style.maxHeight = "";
      popover.style.overflowY = "";
    }

    function showTraitNote(name, x = null, y = null) {
      const popover = document.getElementById("statPopover");
      const note = traitNotes[name];
      const stacks = traitStacks()[name] || 0;
      const tier = activeTier(stacks);
      popover.innerHTML = `
        <h3><span style="color:${elements[name].color}">${name}</span> Trait</h3>
        <div class="stat-line"><img src="${elements[name].icon}" alt="" /> Current <strong>${stacks} stacks (${tier || "-"}/8)</strong></div>
        <p>${note.summary}</p>
        ${note.tiers.map((text, index) => {
          const mark = Number(text.match(/^(\d+)/)?.[1] || [2, 4, 6, 8][index]);
          return `<div class="stat-line trait-tier-line ${tier === mark ? "active" : ""}">${text}</div>`;
        }).join("")}
        ${traitRosterHtml(name)}
      `;
      if (x !== null && y !== null) {
        positionTraitPopoverAtPointer(popover, x, y);
      } else {
        positionTraitPopover(popover);
      }
      popover.style.display = "block";
      clearTimeout(showStats.hideTimer);
      showStats.hideTimer = setTimeout(() => popover.style.display = "none", 6000);
    }

    function dragonAtPoint(x, y) {
      for (let i = state.dragons.length - 1; i >= 0; i--) {
        const d = state.dragons[i];
        if (Math.hypot(d.x - x, d.y - y) < 64) return d;
      }
      return null;
    }

    function dragonAtCell(row, col) {
      return state.dragons.find(d => d.row === row && d.col === col) || null;
    }

    function dragonAtDropPoint(x, y) {
      const directHit = dragonAtPoint(x, y);
      if (directHit) return directHit;
      const row = Math.max(0, Math.min(ROWS - 1, Math.floor(y / CELL_H)));
      const col = Math.max(0, Math.min(COLS - 1, Math.floor(x / CELL_W)));
      return dragonAtCell(row, col);
    }

    function refundFor(unit) {
      const star = unit.star || 1;
      const totalCost = unit.cost * Math.pow(3, star - 1);
      if (star === 1) return unit.cost;
      if (star === 2) return Math.floor(totalCost * 0.8);
      return Math.floor(totalCost * 0.7);
    }

    function sellUnit(unit, source) {
      if (!unit) return;
      const refund = refundFor(unit);
      if (source?.source === "bench") state.bench[source.index] = null;
      if (source?.source === "board") state.dragons = state.dragons.filter(d => d.id !== unit.id);
      state.gold += refund;
      log(`Sold ${unit.name} for ${refund} Gold.`);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      renderUi();
    }

    function sellDraggedDragon() {
      const drag = state.dragging;
      if (!drag?.unit) return log("Drag a bench or board dragon into the sell zone.");
      if (drag.source !== "bench" && drag.source !== "board") return log("Only owned dragons can be sold here.");
      sellUnit(drag.unit, drag);
    }

    function draggedUnitFromEvent(ev) {
      if (state.dragging) return state.dragging;
      try {
        const data = JSON.parse(ev.dataTransfer.getData("text/plain"));
        if (data.source === "shop") return { source: "shop", index: data.index, unit: state.shop[data.index] };
        if (data.source === "bench") return { source: "bench", index: data.index, unit: state.bench[data.index] };
        if (data.source === "board") {
          const unit = state.dragons.find(d => d.id === data.id);
          return { source: "board", id: data.id, unit };
        }
      } catch {}
      return null;
    }

    function dropToBench(index) {
      const drag = state.dragging;
      if (!drag?.unit) return log("Drag a dragon from the shop or bench first.");
      if (drag.source === "shop" && startBoardMergeChoice(drag.unit, drag)) return;
      if (tryAutoMergeIncoming(drag.unit, drag)) return;
      if (drag.source === "bench" && drag.index === index) {
        state.dragging = null;
        clearDragGhost();
        renderUi();
        return;
      }
      if (state.bench[index]) {
        if (drag.source !== "bench") return log("That bench slot is already occupied.");
        const targetUnit = state.bench[index];
        state.bench[index] = drag.unit;
        state.bench[drag.index] = targetUnit;
        log(`Swapped ${drag.unit.name} with ${targetUnit.name}.`);
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return;
      }
      if (!spendForShopUnit(drag, drag.unit)) {
        renderUi();
        return;
      }
      state.bench[index] = drag.source === "shop" ? makeOwnedUnit(drag.unit) : drag.unit;
      if (drag.source === "bench") state.bench[drag.index] = null;
      log(`${drag.unit.name} moved to bench slot ${index + 1}.`);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      autoMerge();
      renderUi();
    }

    function buyToBench(shopIndex) {
      const unit = state.shop[shopIndex];
      if (!unit) return;
      if (startBoardMergeChoice(unit, { source: "shop", index: shopIndex })) return;
      if (tryAutoMergeIncoming(unit, { source: "shop", index: shopIndex })) return;
      const benchIndex = state.bench.findIndex(slot => !slot);
      if (benchIndex === -1) return log("Bench is full. Drag directly onto the board or free a slot.");
      if (!spendForShopUnit({ source: "shop", index: shopIndex }, unit)) {
        renderUi();
        return;
      }
      state.bench[benchIndex] = makeOwnedUnit(unit);
      log(`Bought ${unit.name} into bench slot ${benchIndex + 1}.`);
      autoMerge();
      renderUi();
    }

    function setDragonCell(unit, row, col) {
      unit.row = row;
      unit.col = col;
      unit.x = col * CELL_W + CELL_W * 0.5;
      unit.y = row * CELL_H + CELL_H * 0.50;
    }

    function moveBoardDragon(unit, row, col) {
      if (!unit) return false;
      if (state.waveRunning) {
        log("Board is locked while a wave is running.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      if (col >= PLACE_COLS) {
        log("Board dragons can only be moved inside the green zone before a wave.");
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      const target = dragonAtCell(row, col);
      const oldRow = unit.row;
      const oldCol = unit.col;
      if (target && target.id === unit.id) {
        log(`${unit.name} stayed in place.`);
      } else if (target) {
        setDragonCell(unit, row, col);
        setDragonCell(target, oldRow, oldCol);
        log(`Swapped ${unit.name} with ${target.name}.`);
      } else {
        setDragonCell(unit, row, col);
        log(`Moved ${unit.name}.`);
      }
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      renderUi();
      return true;
    }

    function placeUnit(unit, row, col, source = null) {
      if (!unit) return log("Drag a dragon from the shop or bench first.");
      if (source?.source === "board") return moveBoardDragon(unit, row, col);
      if (state.waveRunning) return log("Board is locked while a wave is running.");
      if (col >= PLACE_COLS) return log("Dragons can only be placed in the green zone.");
      if (maybeMergeByDroppingOnBoard(unit, source, row, col)) return true;
      if (tryAutoMergeIncoming(unit, source, dragonAtCell(row, col))) return true;
      const target = dragonAtCell(row, col);
      if (target && source?.source === "bench") {
        const incoming = {
          ...unit,
          id: unit.id || state.nextId++,
          star: unit.star || 1,
          row,
          col,
          x: col * CELL_W + CELL_W * 0.5,
          y: row * CELL_H + CELL_H * 0.50,
          cooldown: unit.cooldown || 1 / statsFor(unit).attackSpeed,
        };
        syncDragonHp(incoming, false);
        state.dragons = state.dragons.filter(d => d.id !== target.id);
        state.dragons.push(incoming);
        state.bench[source.index] = target;
        log(`Swapped ${incoming.name} with ${target.name}.`);
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
        return true;
      }
      const boardCap = boardCapForLevel();
      if (state.dragons.length >= boardCap) return log(`Keeper Level ${state.keeperLevel} board cap reached (${boardCap}). Buy XP to place more dragons.`);
      if (target) return log("That cell already has a dragon.");
      if (!spendForShopUnit(source, unit)) {
        renderUi();
        return true;
      }
      const ownedUnit = source?.source === "shop" ? makeOwnedUnit(unit) : unit;
      const d = {
        ...ownedUnit,
        id: state.nextId++,
        star: ownedUnit.star || 1,
        row,
        col,
        x: col * CELL_W + CELL_W * 0.5,
        y: row * CELL_H + CELL_H * 0.50,
        cooldown: 1 / statsFor(ownedUnit).attackSpeed,
      };
      syncDragonHp(d, false);
      state.dragons.push(d);
      if (source?.source === "bench") state.bench[source.index] = null;
      log(`Placed ${d.name}.`);
      state.dragging = null;
      state.hoverCell = null;
      clearDragGhost();
      autoMerge();
      renderUi();
      return true;
    }

    function spawnEnemy(rowOverride = null, typeOverride = null) {
      const type = typeOverride || rand(availableEnemyTypes());
      const row = rowOverride ?? Math.floor(Math.random() * ROWS);
      const hpScale = type.boss ? 1 : 1 + state.wave * 0.16;
      const maxHp = Math.round(type.hp * hpScale);
      state.enemies.push({
        id: state.nextId++,
        ...type,
        row,
        x: canvas.width + 50,
        y: row * CELL_H + CELL_H * 0.6,
        maxHp,
        hp: maxHp,
        attackCooldown: 0,
      });
    }

    function laneTarget(dragon) {
      return state.enemies
        .filter(e => e.row === dragon.row && e.x > dragon.x + 18)
        .sort((a, b) => a.x - b.x)[0];
    }

    function dragonBlockingEnemy(enemy) {
      return state.dragons
        .filter(d => d.row === enemy.row && d.x <= enemy.x + 16 && Math.abs(d.x - enemy.x) <= 48)
        .sort((a, b) => b.x - a.x)[0] || null;
    }

    function enemyAttackDamage(enemy) {
      return Math.max(8, Math.round(enemy.maxHp * 0.045 + state.wave * 2));
    }

    function shoot(dragon, target) {
      const bonuses = traitBonuses();
      const s = statsFor(dragon);
      const main = dragon.elements[0];
      const crit = Math.random() < bonuses.critChance;
      const damage = Math.round(s.damage * bonuses.damageMult * (crit ? 1.8 : 1));
      state.projectiles.push({
        id: state.nextId++,
        type: main,
        row: dragon.row,
        x: dragon.x + 28,
        y: dragon.y - 10,
        speed: main === "Energy" ? 860 : 520,
        damage,
        crit,
      });
      if (main === "Water" && waterProc(bonuses.tier.Water || 0)) {
        const tier = bonuses.tier.Water || 0;
        const bonusMult = tier === 8 ? .8 : tier === 6 ? .7 : tier === 4 ? .6 : .5;
        state.projectiles.push({
          id: state.nextId++,
          type: "Water",
          row: dragon.row,
          x: dragon.x + 8,
          y: dragon.y - 10,
          speed: 520,
          damage: Math.round(damage * bonusMult),
          crit: false,
          bonusWave: true,
          delay: 0.12,
        });
      }
    }

    function waterProc(tier) {
      return Math.random() < ({2:.15,4:.30,6:.50,8:.70}[tier] || 0);
    }

    function applyTrait(projectile, enemy) {
      const bonuses = traitBonuses();
      const tier = bonuses.tier[projectile.type] || 0;
      const roll = Math.random();
      if (projectile.type === "Fire" && roll < ({2:.20,4:.35,6:.55,8:.75}[tier] || 0)) {
        enemy.burn = tier === 8 ? 4 : 3;
      }
      if (projectile.type === "Ice" && roll < ({2:.15,4:.30,6:.50,8:.70}[tier] || 0)) {
        enemy.slow = 2;
      }
      if (projectile.type === "Earth" && roll < ({2:.10,4:.20,6:.35,8:.50}[tier] || 0)) {
        enemy.stun = tier === 8 ? 0.75 : 0.5;
      }
      if (projectile.type === "Energy" && roll < ({2:.15,4:.30,6:.50,8:.70}[tier] || 0)) {
        const other = state.enemies.find(e => e.row === enemy.row && e.id !== enemy.id);
        if (other) {
          other.hp -= projectile.damage * (tier === 8 ? .65 : .5);
          state.effects.push({ type: "Energy", x: (enemy.x + other.x) / 2, y: enemy.y, life: .25 });
        }
      }
    }

    function update(dt, realDt = dt) {
      if (state.gameOver) return;
      const bonuses = traitBonuses();
      if (planningTimerActive()) {
        state.planningTimer = Math.max(0, state.planningTimer - realDt);
        if (state.planningTimer <= 0) {
          startWave(true);
          return;
        }
      }
      if (state.waveRunning) {
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0 && state.enemiesSpawned < state.enemiesToSpawn) {
          if (state.wave >= 20) {
            spawnEnemy(state.enemiesSpawned, finalBossType);
          } else {
            spawnEnemy();
          }
          state.enemiesSpawned += 1;
          state.spawnTimer = Math.max(0.26, 0.78 - state.wave * 0.018);
        }
      }

      for (const d of state.dragons) {
        const s = statsFor(d);
        const target = laneTarget(d);
        if (!target) {
          d.cooldown = Math.max(d.cooldown, 1 / s.attackSpeed);
          continue;
        }
        d.cooldown -= dt * bonuses.attackSpeedMult;
        if (d.cooldown <= 0) {
          shoot(d, target);
          d.cooldown = 1 / s.attackSpeed;
        }
      }

      for (const e of state.enemies) {
        if (e.burn) { e.hp -= e.maxHp * 0.015 * dt; e.burn -= dt; }
        if (e.slow) e.slow -= dt;
        if (e.stun) e.stun -= dt;
        e.attackCooldown = Math.max(0, (e.attackCooldown || 0) - dt);
        const blocker = dragonBlockingEnemy(e);
        if (blocker && !(e.stun > 0)) {
          if (e.attackCooldown <= 0) {
            blocker.hp -= enemyAttackDamage(e);
            e.attackCooldown = 0.85;
            state.effects.push({ type: "hitDragon", x: blocker.x, y: blocker.y - 34, life: .22 });
          }
          continue;
        }
        const speedMod = e.stun > 0 ? 0 : e.slow > 0 ? 0.65 : 1;
        e.x -= e.speed * speedMod * dt;
      }

      const dragonDeaths = state.dragons.filter(d => d.hp <= 0);
      if (dragonDeaths.length) {
        for (const d of dragonDeaths) {
          state.effects.push({ type: "dragonDeath", x: d.x, y: d.y, life: .35 });
        }
        state.dragons = state.dragons.filter(d => d.hp > 0);
        log(`${dragonDeaths[0].name} was defeated.`);
      }

      for (const p of state.projectiles) {
        if (p.delay && p.delay > 0) {
          p.delay -= dt;
          continue;
        }
        p.x += p.speed * dt;
        const enemy = state.enemies.find(e => {
          const radius = e.maxHp > 300 ? 42 : 31;
          return e.row === p.row && Math.abs(e.x - p.x) <= radius && Math.abs(e.y - p.y) <= radius;
        });
        if (enemy) {
          enemy.hp -= p.damage;
          applyTrait(p, enemy);
          p.hit = true;
          state.effects.push({ type: p.type, x: enemy.x, y: enemy.y, life: .28, crit: p.crit });
        }
      }
      state.projectiles = state.projectiles.filter(p => !p.hit && p.x < canvas.width + 80);

      const escaped = state.enemies.filter(e => e.x < 50).length;
      if (escaped) {
        state.hp = Math.max(0, state.hp - escaped);
        state.enemies = state.enemies.filter(e => e.x >= 50);
        if (state.hp <= 0) {
          completeRun("lost");
        }
      }

      state.enemies = state.enemies.filter(e => e.hp > 0);
      if (!state.gameOver && state.waveRunning && state.enemiesSpawned >= state.enemiesToSpawn && !state.enemies.length) {
        finishWave();
      }

      for (const fx of state.effects) fx.life -= dt;
      state.effects = state.effects.filter(fx => fx.life > 0);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#172016";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#59412d";
      ctx.fillRect(0, 0, 44, canvas.height);
      ctx.fillStyle = "#8a6b4c";
      for (let y = 0; y < canvas.height; y += 56) ctx.fillRect(6, y + 8, 32, 36);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const x = c * CELL_W;
          const y = r * CELL_H;
          ctx.fillStyle = (r + c) % 2 ? "#2f5130" : "#3b6338";
          ctx.fillRect(x, y, CELL_W, CELL_H);
          ctx.strokeStyle = "rgba(255,255,255,.12)";
          ctx.strokeRect(x, y, CELL_W, CELL_H);
        }
      }
      ctx.fillStyle = "rgba(112, 214, 128, .13)";
      ctx.fillRect(0, 0, CELL_W * PLACE_COLS, canvas.height);
      if (state.dragging?.source === "board") {
        const pulse = 0.45 + Math.sin(performance.now() / 85) * 0.25;
        ctx.save();
        ctx.strokeStyle = `rgba(255, 28, 28, ${pulse + 0.42})`;
        ctx.lineWidth = 9;
        ctx.shadowColor = "#ff1f1f";
        ctx.shadowBlur = 28;
        ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
        ctx.restore();
      } else if (state.dragging && state.hoverCell) {
        const { row, col } = state.hoverCell;
        ctx.save();
        ctx.fillStyle = "rgba(255, 224, 138, .24)";
        ctx.strokeStyle = "#f3c94f";
        ctx.lineWidth = 5;
        ctx.fillRect(col * CELL_W + 4, row * CELL_H + 4, CELL_W - 8, CELL_H - 8);
        ctx.strokeRect(col * CELL_W + 5, row * CELL_H + 5, CELL_W - 10, CELL_H - 10);
        ctx.restore();
      }
    }

    function drawRankIcon(x, y, star = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.lineWidth = 2;
      if (star === 1) {
        ctx.fillStyle = "#b57735";
        ctx.strokeStyle = "#5f3517";
        ctx.shadowColor = "rgba(0,0,0,.55)";
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.moveTo(0, -11);
        ctx.lineTo(12, 10);
        ctx.lineTo(-12, 10);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else if (star === 2) {
        ctx.fillStyle = "#dfe7f5";
        ctx.strokeStyle = "#8290a6";
        ctx.shadowColor = "rgba(220,230,255,.8)";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(0, -13);
        ctx.lineTo(13, 0);
        ctx.lineTo(0, 13);
        ctx.lineTo(-13, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.fillStyle = "#ffe65a";
        ctx.strokeStyle = "#fff6b8";
        ctx.shadowColor = "#ffd33f";
        ctx.shadowBlur = 16;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const angle = -Math.PI / 2 + i * Math.PI / 5;
          const radius = i % 2 === 0 ? 15 : 6;
          const px = Math.cos(angle) * radius;
          const py = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawDragonHealthBar(d, x, y) {
      if (!d.maxHp) syncDragonHp(d, false);
      const width = 54;
      const height = 8;
      const ratio = Math.max(0, Math.min(1, d.hp / d.maxHp));
      ctx.save();
      ctx.fillStyle = "rgba(33, 8, 8, .88)";
      ctx.fillRect(x, y, width, height);
      ctx.fillStyle = ratio > .55 ? "#68d66f" : ratio > .25 ? "#f3c94f" : "#ff5a5a";
      ctx.fillRect(x, y, width * ratio, height);
      ctx.strokeStyle = "rgba(255,255,255,.65)";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, width, height);
      ctx.restore();
    }

    function drawImageContained(image, boxSize) {
      const iw = image.naturalWidth || image.width || boxSize;
      const ih = image.naturalHeight || image.height || boxSize;
      const scale = Math.min(boxSize / iw, boxSize / ih);
      const drawW = iw * scale;
      const drawH = ih * scale;
      ctx.drawImage(image, -drawW / 2, -drawH / 2, drawW, drawH);
      return { width: drawW, height: drawH };
    }

    function drawDragon(d) {
      const image = img(d.star >= 2 ? d.adult : d.baby);
      const size = d.star === 3 ? 116 : d.star === 2 ? 104 : 92;
      let drawn = { width: size, height: size };
      ctx.imageSmoothingEnabled = false;
      ctx.save();
      if (state.dragging?.source === "board" && state.dragging.id === d.id) ctx.globalAlpha = .35;
      ctx.translate(d.x, d.y);
      ctx.scale(-1, 1);
      if (d.star === 3) {
        ctx.shadowColor = "#ffe65a";
        ctx.shadowBlur = 26;
        drawn = drawImageContained(image, size);
        ctx.shadowColor = "#fff4a8";
        ctx.shadowBlur = 12;
      }
      drawn = drawImageContained(image, size);
      ctx.restore();
      const topIconY = d.y - drawn.height / 2 - 14;
      const rankWidth = 30;
      const hpWidth = 54;
      const gap = 0.5;
      const clusterX = d.x - (rankWidth + gap + hpWidth) / 2;
      drawRankIcon(clusterX + rankWidth / 2, topIconY, d.star || 1);
      drawDragonHealthBar(d, clusterX + rankWidth + gap, topIconY - 4);
      const label = d.name;
      ctx.font = "800 12px Arial";
      const cellLeft = d.col * CELL_W;
      const labelPad = 8;
      const labelW = CELL_W - 18;
      const labelX = cellLeft + 9;
      const labelY = (d.row + 1) * CELL_H - 24;
      ctx.fillStyle = "rgba(0,0,0,.62)";
      ctx.fillRect(labelX, labelY, labelW, 20);
      ctx.fillStyle = "#ffe08a";
      ctx.textAlign = "center";
      ctx.save();
      ctx.beginPath();
      ctx.rect(labelX + labelPad / 2, labelY, labelW - labelPad, 20);
      ctx.clip();
      ctx.fillText(label, d.x, labelY + 15);
      ctx.restore();
      ctx.textAlign = "left";

      if (isBlinkCandidate(d)) {
        const pulse = 0.45 + Math.sin(performance.now() / 85) * 0.25;
        ctx.save();
        ctx.strokeStyle = `rgba(255, 224, 80, ${pulse + 0.35})`;
        ctx.lineWidth = 5;
        ctx.shadowColor = "#ffe050";
        ctx.shadowBlur = 18;
        ctx.strokeRect(d.col * CELL_W + 8, d.row * CELL_H + 8, CELL_W - 16, CELL_H - 16);
        ctx.restore();
      }
    }

    function drawEnemy(e) {
      const image = img(e.img);
      const size = e.size || (e.boss ? 138 : e.maxHp > 700 ? 110 : e.maxHp > 300 ? 96 : 82);
      ctx.imageSmoothingEnabled = false;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.scale(-1, 1);
      ctx.drawImage(image, -size / 2, -size / 2, size, size);
      ctx.restore();
      ctx.fillStyle = "#260c0c";
      const barW = e.boss ? 96 : 72;
      const barY = e.y - size * 0.58;
      ctx.fillRect(e.x - barW / 2, barY, barW, 8);
      ctx.fillStyle = e.stun > 0 ? "#ffe08a" : e.slow > 0 ? "#8ce7ff" : "#e85d4d";
      ctx.fillRect(e.x - barW / 2, barY, barW * Math.max(0, e.hp / e.maxHp), 8);
    }

    function drawProjectile(p) {
      if (p.delay && p.delay > 0) return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.fillStyle = elements[p.type].color;
      ctx.strokeStyle = elements[p.type].color;
      ctx.lineWidth = 4;
      if (p.type === "Fire") {
        const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 20);
        g.addColorStop(0, "#fff4a2"); g.addColorStop(.45, "#ff8a28"); g.addColorStop(1, "rgba(255,68,0,0)");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill();
      } else if (p.type === "Water") {
        if (p.bonusWave) {
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 12, -1.1, 1.1);
          ctx.stroke();
        } else {
          ctx.beginPath(); ctx.arc(0, 0, 18, -1.1, 1.1); ctx.stroke();
        }
      } else if (p.type === "Ice") {
        ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(18, 0); ctx.stroke();
      } else if (p.type === "Wind") {
        ctx.beginPath(); ctx.arc(0, 0, 16, .4, 5.2); ctx.stroke();
      } else if (p.type === "Plant") {
        ctx.beginPath(); ctx.ellipse(0, 0, 15, 7, -.4, 0, Math.PI * 2); ctx.fill();
      } else if (p.type === "Earth") {
        ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(10,-12); ctx.lineTo(16,8); ctx.lineTo(-8,13); ctx.closePath(); ctx.fill();
      } else if (p.type === "Energy") {
        ctx.beginPath(); ctx.moveTo(-16,-8); ctx.lineTo(-2,-2); ctx.lineTo(-9,12); ctx.lineTo(16,-6); ctx.stroke();
      } else {
        ctx.fillRect(-14, -8, 28, 16);
      }
      ctx.restore();
    }

    function drawEffects() {
      for (const fx of state.effects) {
        ctx.globalAlpha = Math.min(1, Math.max(0, fx.life / .35));
        ctx.strokeStyle = fx.type === "hitDragon" ? "#ff5a5a" : fx.type === "dragonDeath" ? "#ffe65a" : elements[fx.type]?.color || "#fff";
        ctx.lineWidth = fx.crit ? 5 : 3;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, (fx.type === "dragonDeath" ? 48 : 34) * (1 - fx.life), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function drawGameOver() {
      if (!state.gameOver) return;
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, .72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = state.gameResult === "won" ? "#65e66f" : "#ff5a5a";
      ctx.font = "900 92px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(state.gameResult === "won" ? "You Won" : "You Lost", canvas.width / 2, canvas.height / 2);
      ctx.restore();
    }

    function drawPlanningCountdown() {
      if (!planningTimerActive() || state.planningTimer > 10) return;
      const seconds = Math.ceil(state.planningTimer);
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, .34)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 112px Arial";
      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(45, 12, 12, .85)";
      ctx.fillStyle = seconds <= 3 ? "#ff3b30" : "#ffe08a";
      ctx.shadowColor = seconds <= 3 ? "#ff1f1f" : "#f3c94f";
      ctx.shadowBlur = 24;
      ctx.strokeText(seconds, canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillText(seconds, canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = "900 24px Arial";
      ctx.shadowBlur = 10;
      ctx.fillStyle = "#fff4c4";
      ctx.fillText("Next wave starts soon", canvas.width / 2, canvas.height / 2 + 62);
      ctx.restore();
    }

    function draw() {
      drawBoard();
      for (const d of state.dragons) drawDragon(d);
      for (const e of state.enemies) drawEnemy(e);
      for (const p of state.projectiles) drawProjectile(p);
      drawEffects();
      drawPlanningCountdown();
      drawGameOver();
    }

    function loop(ts) {
      const dt = Math.min(0.05, (ts - state.lastTs) / 1000 || 0);
      state.lastTs = ts;
      update(dt * state.gameSpeed, dt);
      draw();
      document.getElementById("hpText").textContent = state.hp;
      document.getElementById("waveText").textContent = state.wave;
      document.getElementById("waveTimerText").textContent = waveTimerText();
      document.getElementById("capText").textContent = `${state.dragons.length} / ${boardCapForLevel()}`;
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("click", ev => {
      if (state.gameOver) return;
      if (state.suppressCanvasClick) {
        state.suppressCanvasClick = false;
        return;
      }
      if (state.dragging?.source === "board") return;
      if (state.pendingMerge) {
        const rect = canvas.getBoundingClientRect();
        const x = (ev.clientX - rect.left) / rect.width * canvas.width;
        const y = (ev.clientY - rect.top) / rect.height * canvas.height;
        const row = Math.floor(y / CELL_H);
        const col = Math.floor(x / CELL_W);
        const dragon = dragonAtCell(row, col);
        if (!completeBoardMerge(dragon)) {
          log("Click one of the blinking dragons on the board to choose the upgraded copy.");
        }
        return;
      }
      log("Drag a dragon from the shop or bench onto the board to place it.");
    });

    canvas.addEventListener("mousedown", ev => {
      if (state.gameOver || state.pendingMerge || ev.button !== 0) return;
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const dragon = dragonAtPoint(x, y);
      if (!dragon) return;
      if (state.waveRunning) {
        state.suppressCanvasClick = true;
        log("Board is locked while a wave is running.");
        return;
      }
      ev.preventDefault();
      state.dragging = { source: "board", id: dragon.id, unit: dragon };
      state.suppressCanvasClick = true;
      state.hoverCell = null;
      document.body.classList.add("sell-drag");
      makeBoardDragGhost(dragon, ev.clientX, ev.clientY);
      document.getElementById("selectedText").textContent = dragon.name;
      log(`Drag ${dragon.name} into Sell Dragon to sell it.`);
    });

    document.addEventListener("mousemove", ev => {
      if (state.dragging?.source !== "board") return;
      moveBoardDragGhost(ev.clientX, ev.clientY);
      setSellZoneHover(isPointerOverSellZone(ev.clientX, ev.clientY));
    });

    document.addEventListener("mouseup", ev => {
      if (state.dragging?.source !== "board") return;
      const drag = state.dragging;
      if (isPointerOverSellZone(ev.clientX, ev.clientY)) {
        sellUnit(drag.unit, drag);
      } else if (!state.waveRunning) {
        const rect = canvas.getBoundingClientRect();
        const isOverCanvas = ev.clientX >= rect.left && ev.clientX <= rect.right && ev.clientY >= rect.top && ev.clientY <= rect.bottom;
        if (isOverCanvas) {
          const x = (ev.clientX - rect.left) / rect.width * canvas.width;
          const y = (ev.clientY - rect.top) / rect.height * canvas.height;
          const row = Math.max(0, Math.min(ROWS - 1, Math.floor(y / CELL_H)));
          const col = Math.max(0, Math.min(COLS - 1, Math.floor(x / CELL_W)));
          moveBoardDragon(drag.unit, row, col);
        } else {
          log(`${drag.unit.name} returned to the board.`);
          state.dragging = null;
          state.hoverCell = null;
          clearDragGhost();
          renderUi();
        }
      } else {
        log(`${drag.unit.name} returned to the board. Board is locked while a wave is running.`);
        state.dragging = null;
        state.hoverCell = null;
        clearDragGhost();
        renderUi();
      }
    });

    canvas.addEventListener("dragover", ev => {
      if (state.gameOver) return;
      if (state.waveRunning) {
        ev.preventDefault();
        state.hoverCell = null;
        ev.dataTransfer.dropEffect = "none";
        return;
      }
      ev.preventDefault();
      ev.dataTransfer.dropEffect = state.dragging?.source === "bench" ? "move" : "copy";
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const row = Math.max(0, Math.min(ROWS - 1, Math.floor(y / CELL_H)));
      const col = Math.max(0, Math.min(COLS - 1, Math.floor(x / CELL_W)));
      state.hoverCell = { row, col };
    });

    canvas.addEventListener("dragleave", () => {
      state.hoverCell = null;
    });

    canvas.addEventListener("drop", ev => {
      if (state.gameOver) return;
      ev.preventDefault();
      if (state.waveRunning) {
        log("Board is locked while a wave is running.");
        state.hoverCell = null;
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const drag = draggedUnitFromEvent(ev);
      const row = Math.floor(y / CELL_H);
      const col = Math.floor(x / CELL_W);
      if (drag?.source === "board") {
        log("Board dragons can only be dropped into Sell Dragon.");
        state.dragging = null;
        clearDragGhost();
        state.hoverCell = null;
        return;
      }
      placeUnit(drag?.unit, row, col, drag);
      state.hoverCell = null;
    });

    canvas.addEventListener("contextmenu", ev => {
      ev.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (ev.clientX - rect.left) / rect.width * canvas.width;
      const y = (ev.clientY - rect.top) / rect.height * canvas.height;
      const dragon = dragonAtPoint(x, y);
      if (dragon) {
        showStats(dragon, ev.clientX, ev.clientY, `Board ${dragon.star}-star`);
      } else {
        log("Right-click directly on a dragon to inspect its base stats.");
      }
    });

    document.addEventListener("click", () => {
      document.getElementById("statPopover").style.display = "none";
    });
    document.getElementById("statPopover").addEventListener("click", ev => ev.stopPropagation());
    document.getElementById("statPopover").addEventListener("wheel", ev => ev.stopPropagation(), { passive: true });

    window.addEventListener("resize", () => requestAnimationFrame(fitCanvasToScreen));

    rollShop(true);
    renderUi();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
