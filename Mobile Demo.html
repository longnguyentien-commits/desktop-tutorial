<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#05070d" />
  <link rel="manifest" href="mobile-demo.webmanifest" />
  <link rel="apple-touch-icon" href="Resource%20Asset/Unlock_Icon.png" />
  <title>Dragons vs Monsters - Mobile Demo</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #05070d;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #viewport {
      position: fixed;
      inset: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(75, 110, 181, 0.22), transparent 44%),
        #05070d;
    }

    #stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1180px;
      height: 664px;
      transform-origin: 0 0;
      background: #05070d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    #game {
      display: block;
      width: 1180px;
      height: 664px;
      border: 0;
      background: #05070d;
      image-rendering: auto;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding:
        max(20px, var(--safe-top))
        max(20px, var(--safe-right))
        max(20px, var(--safe-bottom))
        max(20px, var(--safe-left));
      background:
        radial-gradient(circle at 50% 42%, rgba(65, 102, 180, 0.3), transparent 38%),
        rgba(3, 5, 11, 0.94);
      text-align: center;
    }

    .overlay[hidden] { display: none; }

    .panel {
      width: min(520px, 88vw);
      padding: 24px;
      border: 1px solid rgba(151, 190, 255, 0.38);
      border-radius: 20px;
      background: rgba(12, 18, 34, 0.94);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }

    h1 {
      margin: 0 0 8px;
      color: #f5d58b;
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 18px;
      color: #c9d6ed;
      font-size: clamp(14px, 2.3vw, 18px);
      line-height: 1.45;
    }

    button {
      min-width: 220px;
      min-height: 54px;
      padding: 12px 24px;
      border: 1px solid #ffe09a;
      border-radius: 12px;
      color: #201508;
      background: linear-gradient(#ffe6a9, #d99b34);
      box-shadow: 0 8px 28px rgba(217, 155, 52, 0.28);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:active { transform: translateY(1px) scale(0.99); }

    button.secondary {
      border-color: rgba(166, 202, 255, 0.65);
      color: #e8f1ff;
      background: rgba(31, 48, 78, 0.92);
      box-shadow: none;
    }

    .start-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    #deviceTip {
      min-height: 18px;
      margin: 12px 0 0;
      color: #9fb0ca;
      font-size: 12px;
    }

    #fullscreenButton {
      position: fixed;
      top: max(8px, var(--safe-top));
      right: max(8px, var(--safe-right));
      z-index: 16;
      min-width: 46px;
      min-height: 46px;
      padding: 8px 12px;
      border-color: rgba(228, 238, 255, 0.72);
      color: #f5f8ff;
      background: rgba(5, 10, 21, 0.82);
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.36);
      font-size: 22px;
    }

    #fullscreenButton[hidden] { display: none; }

    #deviceHelp {
      position: fixed;
      left: max(8px, var(--safe-left));
      bottom: max(8px, var(--safe-bottom));
      z-index: 16;
      max-width: min(520px, 82vw);
      margin: 0;
      padding: 8px 12px;
      border: 1px solid rgba(155, 190, 244, 0.32);
      border-radius: 10px;
      color: #d9e6f8;
      background: rgba(5, 10, 21, 0.88);
      font-size: 12px;
      pointer-events: none;
    }

    #deviceHelp[hidden] { display: none; }

    #rotateOverlay { display: none; }

    #rotateIcon {
      display: block;
      margin: 0 auto 16px;
      font-size: 54px;
      animation: turn 1.8s ease-in-out infinite;
    }

    #hint {
      position: fixed;
      right: max(8px, var(--safe-right));
      bottom: max(7px, var(--safe-bottom));
      z-index: 10;
      padding: 5px 8px;
      border-radius: 999px;
      color: rgba(230, 238, 255, 0.72);
      background: rgba(0, 0, 0, 0.42);
      font-size: 10px;
      pointer-events: none;
    }

    @keyframes turn {
      0%, 30% { transform: rotate(0deg); }
      70%, 100% { transform: rotate(90deg); }
    }

    @media (orientation: portrait) {
      #rotateOverlay { display: grid; }
    }

    @media (orientation: landscape) and (max-height: 460px) {
      .panel { padding: 16px 22px; }
      h1 { font-size: 28px; }
      p { margin-bottom: 12px; font-size: 14px; }
      button { min-height: 48px; }
    }
  </style>
</head>
<body>
  <main id="viewport" aria-label="Dragons vs Monsters Mobile Demo">
    <div id="stage">
      <iframe
        id="game"
        src="Dragons%20vs%20Monsters.html"
        title="Dragons vs Monsters"
        allow="autoplay; fullscreen"
      ></iframe>
    </div>
  </main>

  <div id="startOverlay" class="overlay">
    <section class="panel">
      <h1>Dragons vs Monsters</h1>
      <p>Bản Mobile Demo được tối ưu để chơi ở màn hình ngang.</p>
      <div class="start-actions">
        <button id="startButton" type="button">VÀO GAME</button>
        <button id="installButton" class="secondary" type="button" hidden>CÀI TOÀN MÀN HÌNH</button>
      </div>
      <p id="deviceTip"></p>
    </section>
  </div>

  <div id="rotateOverlay" class="overlay">
    <section class="panel">
      <span id="rotateIcon" aria-hidden="true">▭</span>
      <h1>Hãy xoay ngang thiết bị</h1>
      <p>Game sử dụng bố cục 16:9 để giữ nguyên trải nghiệm chiến đấu.</p>
    </section>
  </div>

  <div id="hint">Mobile Demo · Landscape</div>
  <button id="fullscreenButton" type="button" aria-label="Bật toàn màn hình" title="Bật toàn màn hình" hidden>⛶</button>
  <p id="deviceHelp" hidden></p>

  <script>
    (() => {
      // Keep the iframe at the game's mobile breakpoint so coarse-pointer
      // devices receive the intended landscape battle layout.
      const BASE_WIDTH = 1180;
      const BASE_HEIGHT = 664;
      const viewport = document.getElementById('viewport');
      const stage = document.getElementById('stage');
      const startOverlay = document.getElementById('startOverlay');
      const startButton = document.getElementById('startButton');
      const installButton = document.getElementById('installButton');
      const fullscreenButton = document.getElementById('fullscreenButton');
      const deviceTip = document.getElementById('deviceTip');
      const deviceHelp = document.getElementById('deviceHelp');
      const ua = navigator.userAgent || '';
      const isIos = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isInAppBrowser = /FBAN|FBAV|Instagram|Zalo|Line\//i.test(ua);
      let deferredInstallPrompt = null;
      let wakeLock = null;

      function isStandalone() {
        return window.matchMedia('(display-mode: fullscreen)').matches ||
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true;
      }

      function isFullscreen() {
        return Boolean(document.fullscreenElement || document.webkitFullscreenElement || isStandalone());
      }

      function fullscreenAvailable() {
        const root = document.documentElement;
        return Boolean(root.requestFullscreen || root.webkitRequestFullscreen);
      }

      function deviceInstruction() {
        if (isInAppBrowser) return 'Hãy mở link bằng Chrome hoặc Safari để dùng toàn màn hình.';
        if (isIos && !isStandalone()) return 'iPhone: Safari → Chia sẻ → Thêm vào Màn hình chính để ẩn thanh trình duyệt.';
        if (!fullscreenAvailable() && !isStandalone()) return 'Trình duyệt này không hỗ trợ toàn màn hình. Hãy mở bằng Chrome/Safari.';
        return 'Xoay ngang và chạm Vào Game để bật toàn màn hình.';
      }

      function updateFullscreenControls(showFailureHelp = false) {
        const needsFullscreen = startOverlay.hidden && !isFullscreen();
        fullscreenButton.hidden = !needsFullscreen || !fullscreenAvailable();
        deviceHelp.hidden = !needsFullscreen || (!showFailureHelp && !isIos && !isInAppBrowser);
        if (!deviceHelp.hidden) deviceHelp.textContent = deviceInstruction();
      }

      function fitStage() {
        const rect = viewport.getBoundingClientRect();
        const scale = Math.min(rect.width / BASE_WIDTH, rect.height / BASE_HEIGHT, 1);
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const left = Math.round(Math.max(0, (rect.width - BASE_WIDTH * scale) / 2) * dpr) / dpr;
        const top = Math.round(Math.max(0, (rect.height - BASE_HEIGHT * scale) / 2) * dpr) / dpr;
        stage.style.transform = `translate3d(${left}px, ${top}px, 0) scale(${scale})`;
      }

      async function requestGameFullscreen() {
        const root = document.documentElement;
        try {
          if (root.requestFullscreen) {
            await root.requestFullscreen();
          } else if (root.webkitRequestFullscreen) {
            root.webkitRequestFullscreen();
          } else {
            return false;
          }
          return isFullscreen();
        } catch (_) {
          return false;
        }
      }

      async function requestWakeLock() {
        if (!('wakeLock' in navigator) || document.visibilityState !== 'visible') return;
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (_) {
          wakeLock = null;
        }
      }

      async function enterGame() {
        const fullscreenPromise = requestGameFullscreen();
        startOverlay.hidden = true;
        const enteredFullscreen = await fullscreenPromise;

        try {
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape');
          }
        } catch (_) {
          // Orientation lock requires platform support and is optional.
        }

        await requestWakeLock();
        updateFullscreenControls(!enteredFullscreen);
        fitStage();
      }

      startButton.addEventListener('click', enterGame);
      fullscreenButton.addEventListener('click', async () => {
        const enteredFullscreen = await requestGameFullscreen();
        if (enteredFullscreen && screen.orientation?.lock) {
          try { await screen.orientation.lock('landscape'); } catch (_) {}
        }
        updateFullscreenControls(!enteredFullscreen);
        fitStage();
      });

      installButton.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        if (choice.outcome === 'accepted') installButton.hidden = true;
        deferredInstallPrompt = null;
      });

      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installButton.hidden = false;
      });
      window.addEventListener('appinstalled', () => {
        deferredInstallPrompt = null;
        installButton.hidden = true;
      });
      document.addEventListener('fullscreenchange', () => updateFullscreenControls(false));
      document.addEventListener('webkitfullscreenchange', () => updateFullscreenControls(false));
      window.addEventListener('resize', fitStage, { passive: true });
      window.addEventListener('orientationchange', () => setTimeout(fitStage, 120), { passive: true });
      window.visualViewport?.addEventListener('resize', fitStage, { passive: true });
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('gesturestart', event => event.preventDefault(), { passive: false });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && startOverlay.hidden) requestWakeLock();
      });

      if ('serviceWorker' in navigator && /^https?:$/.test(location.protocol)) {
        navigator.serviceWorker.register('./mobile-demo-sw.js').catch(() => {});
      }

      deviceTip.textContent = deviceInstruction();
      fitStage();
    })();
  </script>
</body>
</html>
